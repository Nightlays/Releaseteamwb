<script>
  (() => {
    const SHELL_VARIANT_KEY = 'rb_shell_design_mode_v1';
    const STABLE_SHELL_URL = 'index-stable.html';
    const VALID_MODES = new Set(['experimental', 'stable']);
    const params = new URLSearchParams(window.location.search);
    const queryMode = params.get('mode');
    const previewMode = params.get('preview') === '1';
    let storedMode = null;

    try {
      storedMode = localStorage.getItem(SHELL_VARIANT_KEY);
    } catch (e) {}

    const currentMode = VALID_MODES.has(queryMode)
      ? queryMode
      : (VALID_MODES.has(storedMode) ? storedMode : 'experimental');

    if (!previewMode) {
      try {
        localStorage.setItem(SHELL_VARIANT_KEY, currentMode);
      } catch (e) {}
    }

    if (currentMode === 'stable') {
      params.set('mode', 'stable');
      const query = params.toString();
      const nextUrl = query ? `${STABLE_SHELL_URL}?${query}` : STABLE_SHELL_URL;
      window.location.replace(nextUrl);
    }
  })();
</script>

  <style id="fullscreen-ui-overrides">
/* ===== Edge-to-edge fullscreen UI (no extra FS buttons) ===== */
html, body { height: 100%; }
body { margin: 0; overflow: auto; }
.topbar { position: sticky; top: 0; z-index: 30; border-bottom: 1px solid rgba(0,0,0,.04); }
.topbar .inner { max-width: 100%; padding-left: 20px; padding-right: 20px; }
.wrap { max-width: 100%; padding-left: 20px; padding-right: 20px; }
.tabs { flex-wrap: wrap; }
.card { border-radius: 16px; }
.panel { grid-template-columns: repeat(12, minmax(0, 1fr)); }
.grid { grid-template-columns: repeat(4, minmax(280px, 1fr)); }
.chart-wrap { height: 420px; }
@media (max-width: 1400px){ .grid{ grid-template-columns: repeat(3, minmax(280px,1fr)); } }
@media (max-width: 1100px){ .grid{ grid-template-columns: repeat(2, minmax(280px,1fr)); } }
@media (max-width: 780px){
  .panel{ grid-template-columns: 1fr !important; }
  .panel .field{ grid-column: 1 / -1 !important; }
  .grid{ grid-template-columns: 1fr !important; }
  .chart-wrap{ height: 300px; }
}
/* Make charts and tables fill the viewport width nicely */
#runChartWrap { height: 420px; }
#runTable { font-size: 13px; }
</style>


<style id="typography-and-controls-normalize">
/* ===== Readability & Alignment Normalize ===== */
:root{
  --font-ui: Inter, "SF Pro Text", -apple-system, Segoe UI, Roboto, Ubuntu, "Helvetica Neue", Arial, system-ui, sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  --fg:#1b1233; --muted:#6d5d86; --soft:#f3ebff;
  --btn-h: 42px;               /* единая высота кнопок/инпутов */
  --inp-pad-y: 9px;            /* вертикальный паддинг инпутов */
  --inp-pad-x: 12px;           /* горизонтальный паддинг инпутов */
  --radius: 12px;
}
html, body { font-family: var(--font-ui); color: var(--fg); }
body, input, button, select { font-size: 14.5px; line-height: 1.35; letter-spacing: 0; }
h1,h2,h3 { letter-spacing: -0.01em; }
small, .muted { color: var(--muted); }

/* Контролы: одинаковая высота, базовая сетка по базовой линии */
input[type="text"], input[type="number"], input[type="search"], select {
  height: var(--btn-h);
  padding: var(--inp-pad-y) var(--inp-pad-x);
  border-radius: var(--radius);
  border: 1px solid #eadbff;
  background: #fcfaff;
  outline: none;
  box-shadow: 0 2px 0 rgba(123,31,162,0.02) inset;
}
input::placeholder{ color: #a596c7; opacity: .9; }

button, .btn {
  height: var(--btn-h);
  padding: 0 14px;
  border-radius: var(--radius);
  font-weight: 600;
  display: inline-flex; align-items: center; justify-content: center;
  transform: translateZ(0);
}
button .icon{ margin-right: 6px; }

/* Согласованные размеры всех «пилюль» кнопок в панелях */
.panel .btn, .panel button, .tabs .btn, .tabs button,
.card .btn, .card button {
  min-height: var(--btn-h);
  line-height: 1;              /* чтобы не прыгали */
}

/* Выравнивание групп кнопок и полей по baseline */
.controls-row, .panel .row, .panel .actions, .tabs, .filters, .card .actions {
  display: flex; flex-wrap: wrap; gap: 10px 12px; align-items: center;
}
/* Блоки с подписью левее — подправить вертикальный отступ */
.label-inline { margin-top: 2px; color: var(--muted); font-size: 12.5px; }

/* Читаемость: слегка увеличенный контраст */
.card, .panel { color: var(--fg); }
.card p, .panel p, label { font-size: 13px; color: var(--muted); }
th { font-weight: 600; }
table { font-size: 13.5px; }

/* Улучшение кликабельности маленьких кнопок в правой части блока */
.pill, .chip, .mini {
  height: var(--btn-h);
  padding: 0 12px;
  border-radius: 999px;

<style id="dp-shell-css">

/* ═══ SHELL CSS — Дом Питона v4 (React) ═══════════════════════════════════ */
:root {
  --topbar-h: 56px;
  --sidebar-w: 252px;
  --sidebar-w-collapsed: 56px;
  --nav-item-h: 38px;
  --nav-radius: 7px;
  --nav-active-bg: color-mix(in srgb, var(--wb) 14%, var(--btn-bg) 86%);
  --nav-hover-bg:  color-mix(in srgb, var(--wb) 7%,  var(--btn-bg) 93%);
  --sidebar-bg:    color-mix(in srgb, var(--card) 90%, var(--wb) 10%);
}
html, body { height: 100%; overflow: hidden; margin: 0; padding: 0; }

/* ── Topbar ─────────────────────────────── */
.dp-topbar {
  position: sticky; top: 0; z-index: 30;
  height: var(--topbar-h);
  display: flex; align-items: center;
  padding: 0 clamp(12px,1.2vw,18px);
  gap: 8px;
  background: color-mix(in srgb, var(--card) 86%, transparent);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
}
.dp-brand {
  display: flex; align-items: center; gap: 9px; flex-shrink: 0;
  text-decoration: none;
}
.dp-brand-mark {
  width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  background: linear-gradient(135deg, color-mix(in srgb, var(--card) 84%, var(--wb) 16%) 0%, color-mix(in srgb, var(--card) 62%, var(--wb-deep) 38%) 100%);
  border: 1px solid color-mix(in srgb, var(--line-strong) 75%, transparent);
  box-shadow: 0 8px 18px color-mix(in srgb, var(--wb) 22%, transparent),
              inset 0 1px 0 rgba(255,255,255,.24);
}
.dp-mark-art,
.dp-menu-trigger-art {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.dp-mark-art--reference {
  object-position: center;
  transform: scale(1.04);
  transform-origin: center;
  animation: dpMarkFloat 7.2s ease-in-out infinite;
}
.ph-mascot {
  display: block;
  width: 100%;
  height: 100%;
  overflow: visible;
}
.ph-mascot * {
  vector-effect: non-scaling-stroke;
  transform-box: fill-box;
  transform-origin: center;
}
.ph-mascot__float {
  animation: phFloat 6.6s ease-in-out infinite;
}
.ph-mascot__head {
  animation: phHeadDrift 7.2s ease-in-out infinite;
}
.ph-mascot__blink {
  transform-origin: center;
  animation: phBlink 8.4s ease-in-out infinite;
}
.ph-mascot__tongue {
  transform-origin: top center;
  animation: phTongue 9.2s ease-in-out infinite;
}
.ph-mascot__aura {
  animation: phAuraPulse 5.8s ease-in-out infinite;
}
.ph-mascot__orb {
  animation: phOrbDrift 4.8s ease-in-out infinite;
}
.ph-mascot__codebit {
  animation: phCodeFloat 7.8s linear infinite;
}
.ph-mascot__codebit--b { animation-delay: -2.2s; }
.ph-mascot__codebit--c { animation-delay: -4.4s; }
.ph-mascot__hood-line {
  animation: phHoodGlow 6.4s ease-in-out infinite;
}
.ph-mascot__accent {
  animation: phAccentPulse 3.2s ease-in-out infinite;
}
.ph-mascot--thinking .ph-mascot__float {
  animation-name: phThinkingFloat;
  animation-duration: 4.8s;
}
.ph-mascot--thinking .ph-mascot__accent {
  animation-duration: 2.2s;
}
.ph-mascot--success .ph-mascot__aura {
  animation-duration: 3.6s;
}
.ph-mascot--success .ph-mascot__accent {
  animation-name: phSuccessSpark;
}
.ph-mascot--oops .ph-mascot__float {
  animation-name: phOopsFloat;
  animation-duration: 4.2s;
}
.ph-mascot--oops .ph-mascot__head {
  animation-duration: 3.8s;
}
.ph-mascot--idle {
  filter: saturate(.92) brightness(.98);
}
.ph-mascot--idle .ph-mascot__float {
  animation-duration: 9.8s;
}
.ph-mascot--idle .ph-mascot__blink {
  animation-duration: 11.6s;
}
.ph-mascot--mini .ph-mascot__codebit,
.ph-mascot--mini .ph-mascot__accent,
.ph-mascot--mini .ph-mascot__orb {
  display: none;
}
.ph-mascot--mini .ph-mascot__float {
  animation-duration: 7.4s;
}
.ph-mascot--hero .ph-mascot__float {
  animation-duration: 7.8s;
}
.ph-mascot--hero .ph-mascot__accent {
  animation-duration: 2.8s;
}
.dp-brand-mark .ph-mascot,
.dp-sidebar-mark .ph-mascot {
  width: 100%;
  height: 100%;
}
.dp-brand-mark,
.dp-sidebar-mark { position: relative; isolation: isolate; }
.dp-brand-mark::after,
.dp-sidebar-mark::after {
  content: "";
  position: absolute;
  inset: -18%;
  background: radial-gradient(circle at 30% 28%, rgba(255,255,255,.24), transparent 34%);
  mix-blend-mode: screen;
  opacity: .56;
  animation: dpMarkShine 5.8s ease-in-out infinite;
  pointer-events: none;
  z-index: 1;
}
.dp-brand-text { line-height: 1; }
.dp-brand-name {
  font-size: 14.5px; font-weight: 800; letter-spacing: -.28px;
  color: var(--text); font-family: 'Inter', system-ui, sans-serif;
}
.dp-brand-sub {
  font-size: 10.5px; font-weight: 600; color: color-mix(in srgb, var(--muted) 82%, var(--text) 18%); margin-top: 2px;
  letter-spacing: .08px;
}
.dp-topbar-mascot,
.dp-topbar-mascot-copy,
.dp-topbar-mascot-kicker,
.dp-topbar-mascot-title,
.dp-topbar-mascot-note,
.dp-sidebar-mascot-panel {
  display: none !important;
}
.dp-topbar-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }

/* Role chip */
.dp-role-chip {
  display: inline-flex; align-items: center;
  height: 26px; padding: 0 10px; border-radius: 999px;
  font-size: 10.5px; font-weight: 700; letter-spacing: .35px;
  text-transform: uppercase;
  background: var(--grad); color: #fff;
  font-family: 'Inter', system-ui, sans-serif;
}

/* Icon button (3-dot menu, nav-toggle) */
.dp-icon-btn {
  display: flex; align-items: center; justify-content: center;
  width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
  background: color-mix(in srgb, var(--btn-bg) 90%, transparent);
  border: 1px solid var(--line);
  color: var(--text); cursor: pointer;
  transition: background .12s, border-color .12s, transform .12s, box-shadow .12s;
}
.dp-icon-btn:hover {
  background: var(--nav-hover-bg); border-color: var(--line-strong);
}
.dp-icon-btn:focus-visible {
  outline: none;
  border-color: color-mix(in srgb, var(--wb-deep) 68%, var(--line-strong) 32%);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--wb) 16%, transparent);
}
.dp-icon-btn svg { opacity: .7; transition: opacity .12s; }
.dp-icon-btn:hover svg { opacity: 1; }
.dp-menu-trigger {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: color-mix(in srgb, var(--btn-bg) 94%, transparent);
  border: 1px solid color-mix(in srgb, var(--line-strong) 54%, var(--line) 46%);
  box-shadow: 0 6px 16px color-mix(in srgb, var(--wb) 10%, transparent);
}
.dp-menu-trigger:hover,
.dp-menu-trigger:focus-visible {
  transform: translateY(-1px);
  background: color-mix(in srgb, var(--wb) 9%, var(--btn-bg) 91%);
  border-color: color-mix(in srgb, var(--line-strong) 78%, transparent);
  box-shadow: 0 10px 22px color-mix(in srgb, var(--wb) 14%, transparent);
}
.dp-menu-trigger[aria-expanded="true"] {
  background: color-mix(in srgb, var(--wb) 12%, var(--btn-bg) 88%);
  border-color: color-mix(in srgb, var(--wb-deep) 56%, var(--line-strong) 44%);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--wb) 14%, transparent);
}
.dp-menu-trigger svg {
  width: 19px;
  height: 19px;
  opacity: .94;
}

/* Shell menu dropdown */
.dp-shell-menu-wrap { position: relative; }
.dp-shell-menu {
  position: absolute; top: calc(100% + 8px); right: 0;
  width: min(248px, 92vw);
  background: color-mix(in srgb, var(--card) 98%, transparent);
  border: 1px solid color-mix(in srgb, var(--line-strong) 50%, var(--line) 50%); border-radius: 14px;
  backdrop-filter: blur(24px);
  box-shadow: 0 20px 48px color-mix(in srgb, var(--bg) 36%, transparent),
              0 4px 12px color-mix(in srgb, var(--bg) 58%, transparent);
  padding: 8px; display: flex; flex-direction: column; gap: 3px; z-index: 50;
}
.dp-shell-menu-item {
  display: flex; align-items: center; gap: 8px;
  width: 100%; min-height: 42px; padding: 9px 12px; border-radius: 9px;
  font-size: 14px; font-weight: 600; color: color-mix(in srgb, var(--text) 92%, var(--bg) 8%);
  background: transparent; border: none; cursor: pointer; text-align: left;
  font-family: 'Inter', system-ui, sans-serif;
  transition: background .1s, color .1s, box-shadow .1s;
}
.dp-shell-menu-item svg { flex-shrink: 0; opacity: .88; }
.dp-shell-menu-item:hover,
.dp-shell-menu-item:focus-visible {
  background: color-mix(in srgb, var(--wb) 10%, var(--card) 90%);
  color: var(--text);
  outline: none;
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--line-strong) 45%, transparent);
}
.dp-shell-menu-item.danger { color: color-mix(in srgb, var(--bad, #e53e3e) 85%, var(--text) 15%); }
.dp-shell-menu-item.danger:hover { background: color-mix(in srgb, var(--bad, #e53e3e) 10%, var(--card) 90%); }
.dp-shell-menu-divider { height: 1px; background: var(--line); margin: 3px 6px; }

/* Theme submenu */
.dp-theme-menu {
  position: absolute; top: calc(100% + 8px); right: 0;
  width: min(200px, 92vw);
  background: color-mix(in srgb, var(--card) 98%, transparent);
  border: 1px solid var(--line); border-radius: 10px;
  backdrop-filter: blur(20px);
  box-shadow: 0 10px 28px color-mix(in srgb, var(--bg) 44%, transparent);
  padding: 4px; z-index: 60;
}
.dp-theme-option {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 7px 10px; border-radius: 7px; border: none;
  font-size: 13px; font-weight: 500; color: var(--text);
  background: transparent; cursor: pointer;
  font-family: 'Inter', system-ui, sans-serif;
  transition: background .1s;
}
.dp-theme-option:hover { background: var(--nav-hover-bg); }
.dp-theme-option.active { font-weight: 700; }
.dp-theme-swatch {
  width: 14px; height: 14px; border-radius: 50%;
  border: 1px solid var(--line);
}

/* ── Layout: grid ─────────────────────────── */
.dp-shell {
  display: grid;
  grid-template-columns: var(--sidebar-w) minmax(0, 1fr);
  height: calc(100vh - var(--topbar-h));
  overflow: hidden;
  transition: grid-template-columns 300ms cubic-bezier(.4,0,.2,1);
}
.dp-shell.collapsed {
  grid-template-columns: var(--sidebar-w-collapsed) minmax(0, 1fr);
}

/* ── Sidebar ──────────────────────────────── */
.dp-sidebar {
  background: color-mix(in srgb, var(--card) 90%, var(--wb) 10%);
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  height: 100%; overflow: hidden;
  position: sticky; top: var(--topbar-h);
  transition: opacity 220ms ease;
}
.dp-sidebar-head {
  padding: 16px 14px 14px; flex-shrink: 0;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, color-mix(in srgb, var(--card) 95%, var(--wb) 5%), color-mix(in srgb, var(--card) 91%, var(--wb) 9%));
}
.dp-sidebar-head-top { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.dp-sidebar-mark {
  width: 40px; height: 40px; border-radius: 11px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  background: linear-gradient(135deg, color-mix(in srgb, var(--card) 78%, var(--wb) 22%) 0%, color-mix(in srgb, var(--card) 60%, var(--wb-deep) 40%) 100%);
  border: 1px solid color-mix(in srgb, var(--line-strong) 70%, transparent);
  box-shadow: 0 6px 16px color-mix(in srgb, var(--wb) 18%, transparent),
              inset 0 1px 0 rgba(255,255,255,.2);
}
.dp-sidebar-title {
  font-size: 16px; font-weight: 800; letter-spacing: -.22px;
  color: var(--text); font-family: 'Inter', system-ui, sans-serif;
}
.dp-sidebar-sub {
  font-size: 12.5px; color: color-mix(in srgb, var(--muted) 76%, var(--text) 24%); line-height: 1.5; margin-top: 6px;
  font-weight: 550;
}
.dp-sidebar-mascot-panel {
  margin-top: 14px;
  position: relative;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 142px;
  gap: 10px;
  min-height: 138px;
  padding: 12px 12px 10px;
  border-radius: 16px;
  border: 1px solid color-mix(in srgb, var(--line-strong) 42%, transparent);
  background:
    radial-gradient(circle at top right, color-mix(in srgb, var(--wb) 20%, transparent), transparent 44%),
    linear-gradient(145deg, color-mix(in srgb, var(--card) 90%, var(--wb) 10%) 0%, color-mix(in srgb, var(--card) 76%, var(--wb-deep) 24%) 100%);
  box-shadow:
    0 14px 28px color-mix(in srgb, var(--bg) 12%, transparent),
    inset 0 1px 0 rgba(255,255,255,.18);
  overflow: hidden;
  isolation: isolate;
}
.dp-sidebar-mascot-panel::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(90deg, rgba(255,255,255,.14) 0, rgba(255,255,255,0) 36%),
    repeating-linear-gradient(90deg, rgba(94,242,255,.05) 0 1px, transparent 1px 18px);
  pointer-events: none;
}
.dp-sidebar-mascot-copy {
  position: relative;
  z-index: 1;
  min-width: 0;
}
.dp-sidebar-mascot-kicker {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: color-mix(in srgb, var(--muted) 70%, var(--text) 30%);
}
.dp-sidebar-mascot-title {
  margin-top: 6px;
  font-size: 14px;
  font-weight: 800;
  line-height: 1.2;
  color: var(--text);
}
.dp-sidebar-mascot-note {
  margin-top: 6px;
  font-size: 11.5px;
  line-height: 1.45;
  font-weight: 600;
  color: color-mix(in srgb, var(--muted) 76%, var(--text) 24%);
}
.dp-sidebar-mascot-state {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 9px;
  padding: 5px 9px;
  border-radius: 999px;
  font-size: 10.5px;
  font-weight: 800;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: #fff;
  background: linear-gradient(135deg, color-mix(in srgb, var(--wb) 78%, transparent), color-mix(in srgb, var(--wb-deep) 84%, transparent));
  box-shadow: 0 6px 18px color-mix(in srgb, var(--wb) 20%, transparent);
}
.dp-sidebar-mascot-state::before {
  content: '';
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #8dfcb8;
  box-shadow: 0 0 0 5px rgba(141,252,184,.12);
}
.dp-sidebar-mascot-visual {
  position: relative;
  z-index: 1;
  min-height: 114px;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid color-mix(in srgb, var(--line-strong) 40%, transparent);
  background:
    radial-gradient(circle at 16% 18%, rgba(255,255,255,.14), transparent 28%),
    linear-gradient(145deg, rgba(9, 18, 40, .62), rgba(25, 33, 78, .26));
  box-shadow: inset 0 1px 0 rgba(255,255,255,.1);
}
.dp-sidebar-mascot-visual::before {
  content: '';
  position: absolute;
  inset: -12% -8% auto auto;
  width: 98px;
  height: 98px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(95, 235, 255, .22) 0%, rgba(95, 235, 255, 0) 72%);
  filter: blur(8px);
  animation: dpMascotAura 5.2s ease-in-out infinite;
  pointer-events: none;
}
.dp-sidebar-mascot-visual::after {
  content: '';
  position: absolute;
  right: 10px;
  top: 12px;
  width: 38px;
  height: 38px;
  border-radius: 999px;
  background: radial-gradient(circle at 35% 30%, rgba(255,255,255,.98), rgba(255,210,120,.96) 28%, rgba(245,164,58,.86) 58%, rgba(245,164,58,0) 78%);
  box-shadow: 0 0 0 6px rgba(252, 207, 132, .12), 0 10px 22px rgba(255, 198, 89, .26);
  animation: dpMascotOrb 4.2s cubic-bezier(.4,0,.2,1) infinite;
  pointer-events: none;
}
.dp-sidebar-mascot-code {
  position: absolute;
  left: 10px;
  bottom: 10px;
  z-index: 2;
  padding: 5px 8px;
  border-radius: 999px;
  background: rgba(7, 11, 28, .56);
  border: 1px solid rgba(133, 218, 255, .18);
  color: #b8f4ff;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  backdrop-filter: blur(8px);
  box-shadow: 0 10px 18px rgba(8, 18, 34, .14);
}
.dp-sidebar-mascot-art {
  position: absolute;
  inset: 0;
  z-index: 1;
  width: 100%;
  height: 100%;
  transform: scale(1.03);
  filter: saturate(1.05) contrast(1.02) drop-shadow(0 10px 20px rgba(10, 12, 30, .22));
  animation: dpMascotFloat 6.8s ease-in-out infinite;
  transition: filter .28s ease, transform .28s ease;
}
.dp-sidebar-mascot-svg {
  width: 100%;
  height: 100%;
  display: block;
}
.dp-sidebar-mascot-panel.is-neutral .dp-sidebar-mascot-state::before { background: #8dfcb8; box-shadow: 0 0 0 5px rgba(141,252,184,.12); }
.dp-sidebar-mascot-panel.is-neutral .dp-sidebar-mascot-visual::before { background: radial-gradient(circle, rgba(95, 235, 255, .22) 0%, rgba(95, 235, 255, 0) 72%); }

.dp-sidebar-mascot-panel.is-thinking .dp-sidebar-mascot-state {
  background: linear-gradient(135deg, rgba(49, 146, 255, .96), rgba(86, 208, 255, .92));
}
.dp-sidebar-mascot-panel.is-thinking .dp-sidebar-mascot-state::before { background: #d7f7ff; box-shadow: 0 0 0 5px rgba(215,247,255,.16); }
.dp-sidebar-mascot-panel.is-thinking .dp-sidebar-mascot-visual::before { background: radial-gradient(circle, rgba(63, 208, 255, .3) 0%, rgba(63, 208, 255, 0) 74%); }
.dp-sidebar-mascot-panel.is-thinking .dp-sidebar-mascot-art {
  transform: scale(1.05) translateY(-2px);
  filter: saturate(1.12) brightness(1.02) drop-shadow(0 12px 22px rgba(10, 20, 48, .28));
  animation: dpMascotThink 3.8s ease-in-out infinite;
}

.dp-sidebar-mascot-panel.is-success .dp-sidebar-mascot-state {
  background: linear-gradient(135deg, rgba(20, 191, 113, .96), rgba(79, 221, 145, .92));
}
.dp-sidebar-mascot-panel.is-success .dp-sidebar-mascot-state::before { background: #e7ffef; box-shadow: 0 0 0 5px rgba(79,221,145,.16); }
.dp-sidebar-mascot-panel.is-success .dp-sidebar-mascot-visual::before { background: radial-gradient(circle, rgba(82, 238, 150, .28) 0%, rgba(82, 238, 150, 0) 72%); }
.dp-sidebar-mascot-panel.is-success .dp-sidebar-mascot-art {
  transform: scale(1.04);
  filter: saturate(1.16) brightness(1.05) drop-shadow(0 12px 22px rgba(17, 66, 34, .24));
}

.dp-sidebar-mascot-panel.is-oops .dp-sidebar-mascot-state {
  background: linear-gradient(135deg, rgba(250, 161, 54, .98), rgba(255, 112, 112, .92));
}
.dp-sidebar-mascot-panel.is-oops .dp-sidebar-mascot-state::before { background: #fff0cc; box-shadow: 0 0 0 5px rgba(250,161,54,.16); }
.dp-sidebar-mascot-panel.is-oops .dp-sidebar-mascot-visual::before { background: radial-gradient(circle, rgba(255, 121, 121, .24) 0%, rgba(255, 121, 121, 0) 74%); }
.dp-sidebar-mascot-panel.is-oops .dp-sidebar-mascot-art {
  transform: scale(1.03) translateX(-2px);
  filter: saturate(1.08) brightness(1.01) drop-shadow(0 12px 24px rgba(83, 29, 18, .24));
  animation: dpMascotOops 4.6s ease-in-out infinite;
}

.dp-sidebar-mascot-panel.is-idle .dp-sidebar-mascot-state {
  background: linear-gradient(135deg, rgba(111, 122, 178, .94), rgba(148, 162, 214, .88));
}
.dp-sidebar-mascot-panel.is-idle .dp-sidebar-mascot-state::before { background: #edf2ff; box-shadow: 0 0 0 5px rgba(237,242,255,.14); }
.dp-sidebar-mascot-panel.is-idle .dp-sidebar-mascot-visual::before { background: radial-gradient(circle, rgba(180, 206, 255, .2) 0%, rgba(180, 206, 255, 0) 70%); }
.dp-sidebar-mascot-panel.is-idle .dp-sidebar-mascot-art {
  transform: scale(1);
  filter: saturate(.92) brightness(.98) drop-shadow(0 10px 18px rgba(16, 21, 40, .18));
  animation: dpMascotIdle 8.6s ease-in-out infinite;
}

@keyframes phFloat {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-3px) scale(1.01); }
}
@keyframes phThinkingFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-2px) rotate(-1deg); }
  75% { transform: translateY(-3px) rotate(1deg); }
}
@keyframes phOopsFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  20% { transform: translateY(-1px) rotate(-1.5deg); }
  45% { transform: translateY(-2px) rotate(1.5deg); }
  70% { transform: translateY(-1px) rotate(-1deg); }
}
@keyframes phHeadDrift {
  0%, 100% { transform: rotate(0deg); }
  50% { transform: rotate(-1.2deg); }
}
@keyframes phBlink {
  0%, 44%, 48%, 100% { transform: scaleY(0); opacity: 0; }
  45%, 47% { transform: scaleY(1); opacity: 1; }
}
@keyframes phTongue {
  0%, 78%, 100% { transform: scaleY(.2); opacity: 0; }
  82%, 88% { transform: scaleY(1); opacity: 1; }
}
@keyframes phAuraPulse {
  0%, 100% { opacity: .55; transform: scale(.96); }
  50% { opacity: .9; transform: scale(1.04); }
}
@keyframes phOrbDrift {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(-5px, 4px) scale(1.05); }
}
@keyframes phCodeFloat {
  0% { transform: translateY(0); opacity: .42; }
  50% { transform: translateY(-6px); opacity: .9; }
  100% { transform: translateY(-12px); opacity: .12; }
}
@keyframes phHoodGlow {
  0%, 100% { opacity: .56; }
  50% { opacity: .95; }
}
@keyframes phAccentPulse {
  0%, 100% { transform: scale(.94); opacity: .72; }
  50% { transform: scale(1.06); opacity: 1; }
}
@keyframes phSuccessSpark {
  0%, 100% { transform: scale(.9) rotate(0deg); opacity: .7; }
  50% { transform: scale(1.1) rotate(12deg); opacity: 1; }
}

@keyframes dpMarkFloat {
  0%, 100% { transform: scale(1.72) translateY(0); }
  50% { transform: scale(1.72) translateY(-2px); }
}
@keyframes dpMarkShine {
  0%, 100% { transform: translateX(-8px); opacity: .48; }
  50% { transform: translateX(10px); opacity: .78; }
}
@keyframes dpMascotFloat {
  0%, 100% { transform: scale(1.08) translate3d(0, 0, 0); }
  50% { transform: scale(1.1) translate3d(0, -3px, 0); }
}
@keyframes dpMascotThink {
  0%, 100% { transform: scale(1.12) translateY(-1px); }
  50% { transform: scale(1.14) translateY(-5px); }
}
@keyframes dpMascotOops {
  0%, 100% { transform: scale(1.09) translateX(-2px); }
  25% { transform: scale(1.09) translateX(-5px); }
  50% { transform: scale(1.09) translateX(2px); }
  75% { transform: scale(1.09) translateX(-3px); }
}
@keyframes dpMascotIdle {
  0%, 100% { transform: scale(1.05) translateY(0); }
  50% { transform: scale(1.035) translateY(1px); }
}
@keyframes dpMascotAura {
  0%, 100% { transform: scale(.92); opacity: .52; }
  50% { transform: scale(1.08); opacity: .82; }
}
@keyframes dpMascotOrb {
  0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
  50% { transform: translate3d(0, -5px, 0) scale(1.08); }
}
.dp-sidebar-toggle {
  width: 100%; min-height: 36px; margin-top: 12px; padding: 0 12px;
  border-radius: 8px; font-size: 12.5px; font-weight: 700; color: color-mix(in srgb, var(--muted) 74%, var(--text) 26%);
  display: flex; align-items: center; justify-content: space-between;
  background: color-mix(in srgb, var(--btn-bg) 94%, var(--bg) 6%);
  border: 1px solid color-mix(in srgb, var(--line) 65%, transparent);
  cursor: pointer; font-family: 'Inter', system-ui, sans-serif;
  transition: color .12s, background .12s, border-color .12s, box-shadow .12s;
}
.dp-sidebar-toggle:hover {
  color: var(--text);
  background: color-mix(in srgb, var(--wb) 8%, var(--btn-bg) 92%);
  border-color: var(--line);
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--wb) 10%, transparent);
}

/* Nav list */
.dp-nav {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 6px 6px 10px; display: flex; flex-direction: column; gap: 1px;
}
.dp-nav::-webkit-scrollbar { width: 3px; }
.dp-nav::-webkit-scrollbar-thumb { background: color-mix(in srgb, var(--line) 70%, transparent); border-radius: 2px; }
.dp-nav-section {
  padding: 14px 10px 4px; font-size: 10.5px; font-weight: 800;
  letter-spacing: .7px; text-transform: uppercase;
  color: color-mix(in srgb, var(--muted) 72%, var(--text) 28%); opacity: .86; user-select: none; pointer-events: none;
  flex-shrink: 0;
}
.dp-nav-section:first-child { padding-top: 6px; }
.dp-nav-btn {
  position: relative; display: flex; align-items: center; gap: 10px;
  width: 100%; min-height: var(--nav-item-h); max-height: var(--nav-item-h);
  padding: 0 10px 0 6px; border-radius: var(--nav-radius);
  font-family: 'Inter', system-ui, sans-serif; font-size: 14.5px; font-weight: 700;
  color: color-mix(in srgb, var(--text) 90%, transparent);
  background: transparent; border: 1px solid transparent;
  cursor: pointer; text-align: left; overflow: hidden;
  flex-shrink: 0; transition: background .1s, color .1s, border-color .1s, box-shadow .1s;
}
.dp-nav-btn:hover {
  background: color-mix(in srgb, var(--wb) 9%, var(--btn-bg) 91%);
  color: var(--text);
  border-color: color-mix(in srgb, var(--line-strong) 42%, transparent);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
}
.dp-nav-btn.active {
  background: var(--grad); color: #fff; font-weight: 600;
  border-color: transparent;
  box-shadow: 0 4px 14px color-mix(in srgb, var(--wb) 32%, transparent);
}
.dp-nav-btn.active::before {
  display: none; /* no left bar in gradient mode */
}
.dp-nav-icon {
  flex: 0 0 40px; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 12px;
  background: color-mix(in srgb, var(--btn-bg) 88%, var(--card) 12%);
  border: 1px solid color-mix(in srgb, var(--line-strong) 34%, transparent);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
  overflow: hidden;
  transition: background .12s, border-color .12s, box-shadow .12s, transform .12s;
}
.dp-nav-icon svg,
.dp-nav-icon img {
  width: 100%;
  height: 100%;
  display: block;
  flex: 0 0 100%;
  object-fit: cover;
  object-position: center;
}
.dp-nav-icon svg {
  opacity: .96;
  transition: opacity .12s, transform .12s;
  stroke: currentColor;
  stroke-width: 1.85;
  transform: scale(.88);
  transform-origin: center;
}
.dp-nav-btn:hover .dp-nav-icon {
  background: color-mix(in srgb, var(--wb) 12%, var(--btn-bg) 88%);
  border-color: color-mix(in srgb, var(--line-strong) 56%, transparent);
  transform: translateY(-1px);
}
.dp-nav-btn:hover .dp-nav-icon svg { opacity: 1; transform: scale(.92); }
.dp-nav-btn.active .dp-nav-icon svg { opacity: 1; stroke: #fff; transform: scale(.92); }
.dp-nav-btn.active .dp-nav-icon {
  background: rgba(255,255,255,.16);
  border-color: rgba(255,255,255,.22);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.14), 0 8px 16px rgba(29, 12, 55, .18);
}
.dp-nav-label {
  flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap; font-size: 14.5px; font-weight: inherit; color: inherit;
  line-height: 1.3;
  letter-spacing: -.01em;
}

body.theme-wb-light .dp-shell-menu,
body.theme-ocean-glass .dp-shell-menu {
  box-shadow: 0 18px 42px color-mix(in srgb, var(--wb) 14%, transparent), 0 4px 16px rgba(20, 12, 38, 0.10);
}
body.theme-wb-light .dp-shell-menu-item,
body.theme-wb-light .dp-theme-option {
  color: color-mix(in srgb, var(--text) 94%, black 6%);
}
body.theme-wb-light .dp-shell-menu-item:hover,
body.theme-wb-light .dp-shell-menu-item:focus-visible,
body.theme-wb-light .dp-theme-option:hover,
body.theme-wb-light .dp-theme-option:focus-visible {
  background: color-mix(in srgb, var(--wb) 8%, white 92%);
  color: var(--text);
}
/* Collapsed sidebar */
.dp-shell.collapsed .dp-sidebar-head { padding: 10px 6px; }
.dp-shell.collapsed .dp-sidebar-head-top { justify-content: center; }
.dp-shell.collapsed .dp-sidebar-title,
.dp-shell.collapsed .dp-sidebar-sub,
.dp-shell.collapsed .dp-sidebar-mascot-panel,
.dp-shell.collapsed .dp-sidebar-toggle-label { display: none; }
.dp-shell.collapsed .dp-sidebar { overflow: visible; }
.dp-shell.collapsed .dp-sidebar-toggle {
  justify-content: center; padding: 0; margin-top: 8px;
  border: 1px solid color-mix(in srgb, var(--line-strong) 55%, transparent);
  background: color-mix(in srgb, var(--card) 92%, var(--wb) 8%);
  min-height: 34px; height: 34px;
  position: relative;
  overflow: visible;
}
.dp-shell.collapsed .dp-sidebar-toggle:hover,
.dp-shell.collapsed .dp-sidebar-toggle:focus-visible {
  background: color-mix(in srgb, var(--wb) 12%, var(--card) 88%);
  border-color: color-mix(in srgb, var(--line-strong) 90%, transparent);
}
.dp-shell.collapsed .dp-nav { padding: 6px 6px 10px; overflow-y: auto; overflow-x: visible; }
.dp-shell.collapsed .dp-nav-section { display: none; }
.dp-shell.collapsed .dp-nav-btn {
  min-height: 58px; max-height: 58px; padding: 0; justify-content: center; gap: 0;
  margin: 2px 0;
  overflow: visible;
  border-radius: 16px;
  border-color: color-mix(in srgb, var(--line-strong) 42%, transparent);
  background: color-mix(in srgb, var(--card) 96%, var(--wb) 4%);
  color: color-mix(in srgb, var(--text) 92%, transparent);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 8px 18px rgba(28, 12, 44, .04);
}
.dp-shell.collapsed .dp-nav-label { display: none; }
.dp-shell.collapsed .dp-nav-icon {
  flex: 0 0 100%;
  width: 100%;
  height: 100%;
  border-radius: inherit;
  background: color-mix(in srgb, var(--btn-bg) 90%, white 10%);
  border-color: color-mix(in srgb, var(--line-strong) 54%, transparent);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.12), 0 8px 18px rgba(36, 18, 56, .06);
}
.dp-shell.collapsed .dp-nav-icon svg {
  opacity: 1;
  stroke-width: 1.95;
  transform: scale(.92);
}
.dp-shell.collapsed .dp-nav-btn.active { background: var(--grad); }
.dp-shell.collapsed .dp-nav-btn:hover .dp-nav-icon,
.dp-shell.collapsed .dp-nav-btn:focus-visible .dp-nav-icon {
  background: color-mix(in srgb, var(--wb) 12%, white 88%);
  border-color: color-mix(in srgb, var(--wb-deep) 44%, var(--line-strong) 56%);
}
.dp-shell.collapsed .dp-nav-btn:hover .dp-nav-icon svg,
.dp-shell.collapsed .dp-nav-btn:focus-visible .dp-nav-icon svg,
.dp-shell.collapsed .dp-nav-btn.active .dp-nav-icon svg {
  transform: scale(.96);
}
.dp-shell.collapsed .dp-nav-btn.active .dp-nav-icon {
  background: rgba(255,255,255,.18);
  border-color: rgba(255,255,255,.24);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 12px 22px rgba(45, 17, 68, .16);
}
.dp-shell.collapsed .dp-nav-btn::after,
.dp-shell.collapsed .dp-sidebar-toggle::after {
  content: attr(data-label);
  position: absolute;
  left: calc(100% + 10px);
  top: 50%;
  transform: translateY(-50%) translateX(-4px);
  opacity: 0;
  pointer-events: none;
  white-space: nowrap;
  padding: 7px 10px;
  border-radius: 10px;
  background: color-mix(in srgb, var(--card) 98%, transparent);
  color: var(--text);
  border: 1px solid color-mix(in srgb, var(--line-strong) 60%, var(--line) 40%);
  box-shadow: 0 14px 30px color-mix(in srgb, var(--bg) 20%, transparent), 0 4px 10px color-mix(in srgb, var(--bg) 40%, transparent);
  font-size: 12.5px;
  font-weight: 700;
  line-height: 1.2;
  z-index: 8;
  transition: opacity .12s ease, transform .12s ease;
}
.dp-shell.collapsed .dp-nav-btn::before,
.dp-shell.collapsed .dp-sidebar-toggle::before {
  content: '';
  position: absolute;
  left: calc(100% + 4px);
  top: 50%;
  transform: translateY(-50%) translateX(-4px);
  opacity: 0;
  pointer-events: none;
  width: 8px;
  height: 8px;
  background: color-mix(in srgb, var(--card) 98%, transparent);
  border-left: 1px solid color-mix(in srgb, var(--line-strong) 60%, var(--line) 40%);
  border-top: 1px solid color-mix(in srgb, var(--line-strong) 60%, var(--line) 40%);
  transform-origin: center;
  rotate: -45deg;
  z-index: 8;
  transition: opacity .12s ease, transform .12s ease;
}
.dp-shell.collapsed .dp-nav-btn:hover::after,
.dp-shell.collapsed .dp-nav-btn:hover::before,
.dp-shell.collapsed .dp-nav-btn:focus-visible::after,
.dp-shell.collapsed .dp-nav-btn:focus-visible::before,
.dp-shell.collapsed .dp-sidebar-toggle:hover::after,
.dp-shell.collapsed .dp-sidebar-toggle:hover::before,
.dp-shell.collapsed .dp-sidebar-toggle:focus-visible::after,
.dp-shell.collapsed .dp-sidebar-toggle:focus-visible::before {
  opacity: 1;
  transform: translateY(-50%) translateX(0);
}
body.theme-wb-light .dp-shell.collapsed .dp-nav-btn,
body.theme-ocean-glass .dp-shell.collapsed .dp-nav-btn {
  box-shadow: 0 6px 14px rgba(20, 12, 38, 0.05);
}
body.theme-wb-light .dp-nav-icon,
body.theme-ocean-glass .dp-nav-icon {
  background: color-mix(in srgb, #ffffff 92%, var(--wb) 8%);
  border-color: color-mix(in srgb, var(--line-strong) 42%, transparent);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.8), 0 8px 16px rgba(96, 63, 128, .06);
}
body.theme-wb-light .dp-nav-btn:hover .dp-nav-icon,
body.theme-wb-light .dp-nav-btn:focus-visible .dp-nav-icon,
body.theme-ocean-glass .dp-nav-btn:hover .dp-nav-icon,
body.theme-ocean-glass .dp-nav-btn:focus-visible .dp-nav-icon {
  background: color-mix(in srgb, var(--wb) 10%, #ffffff 90%);
}
body.theme-wb-light .dp-sidebar-toggle {
  background: color-mix(in srgb, white 96%, var(--wb) 4%);
  color: color-mix(in srgb, var(--text) 92%, black 8%);
  border-color: color-mix(in srgb, var(--line) 82%, transparent);
}
body.theme-wb-light .dp-sidebar-toggle:hover,
body.theme-wb-light .dp-sidebar-toggle:focus-visible {
  background: color-mix(in srgb, var(--wb) 8%, white 92%);
  color: var(--text);
  border-color: color-mix(in srgb, var(--line-strong) 58%, var(--line) 42%);
  box-shadow: 0 6px 16px rgba(64, 33, 79, 0.08);
}

/* ── Content area ────────────────────────── */
.dp-content {
  min-width: 0; height: calc(100vh - var(--topbar-h));
  overflow: hidden; display: flex; flex-direction: column;
}
.dp-iframe {
  flex: 1; width: 100%; border: 0; display: block; background: transparent;
}

/* ── Team Modal ──────────────────────────── */
.dp-modal-backdrop {
  position: fixed; inset: 0; z-index: 80;
  background: color-mix(in srgb, var(--scrim) 88%, var(--bg) 12%);
  backdrop-filter: blur(10px) saturate(112%);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
}
.dp-modal {
  width: min(900px, 96vw); max-height: 88vh;
  background:
    linear-gradient(
      180deg,
      color-mix(in srgb, var(--card) 94%, var(--bg) 6%) 0%,
      color-mix(in srgb, var(--card) 98%, var(--bg) 2%) 100%
    );
  border: 1px solid color-mix(in srgb, var(--line-strong) 24%, var(--line) 76%);
  border-radius: 16px;
  backdrop-filter: blur(24px);
  box-shadow: 0 32px 80px color-mix(in srgb, var(--bg) 28%, transparent),
              0 8px 24px color-mix(in srgb, var(--bg) 48%, transparent);
  display: flex; flex-direction: column; overflow: hidden;
}
.dp-modal-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: 20px 22px 0; gap: 12px; flex-shrink: 0;
  background:
    linear-gradient(
      180deg,
      color-mix(in srgb, var(--card) 88%, var(--wb) 12%),
      color-mix(in srgb, var(--card) 96%, var(--bg) 4%)
    );
}
.dp-modal-head-text {}
.dp-modal-title {
  font-size: 17px; font-weight: 700; letter-spacing: -.2px;
  color: var(--text); font-family: 'Inter', system-ui, sans-serif; margin: 0;
}
.dp-modal-note { font-size: 13px; color: var(--muted); margin-top: 3px; }
.dp-modal-close {
  width: 38px; height: 38px; border-radius: 12px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: color-mix(in srgb, var(--card) 92%, var(--bg) 8%);
  border: 1px solid color-mix(in srgb, var(--line-strong) 48%, var(--line) 52%);
  color: color-mix(in srgb, var(--text) 96%, black 4%);
  cursor: pointer; font-size: 14px;
  transition: background .12s, border-color .12s, transform .12s, box-shadow .12s;
}
.dp-modal-close svg {
  width: 16px;
  height: 16px;
  display: block;
  stroke: currentColor;
  opacity: .96;
}
.dp-modal-close:hover,
.dp-modal-close:focus-visible {
  background: color-mix(in srgb, var(--wb) 10%, var(--card) 90%);
  border-color: color-mix(in srgb, var(--line-strong) 82%, transparent);
  box-shadow: 0 8px 18px color-mix(in srgb, var(--wb) 12%, transparent);
  transform: translateY(-1px);
  outline: none;
}

/* Modal tabs */
.dp-modal-tabs {
  display: flex; gap: 4px; padding: 12px 22px 0;
  border-bottom: 1px solid var(--line); flex-shrink: 0;
  background: color-mix(in srgb, var(--card) 96%, var(--bg) 4%);
}
.dp-modal-tab {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px 10px;
  border: none; border-bottom: 2px solid transparent;
  font-size: 13px; font-weight: 500; color: var(--muted);
  background: transparent; cursor: pointer;
  font-family: 'Inter', system-ui, sans-serif;
  transition: color .15s, border-color .15s;
  margin-bottom: -1px;
}
.dp-modal-tab svg { opacity: .55; transition: opacity .15s; }
.dp-modal-tab:hover { color: var(--text); }
.dp-modal-tab:hover svg { opacity: .8; }
.dp-modal-tab.active {
  color: var(--wb-deep); font-weight: 600;
  border-bottom-color: var(--wb-deep);
}
.dp-modal-tab.active svg { opacity: 1; stroke: var(--wb-deep); }
.dp-tab-count {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 18px; height: 16px; padding: 0 5px; border-radius: 999px;
  font-size: 10px; font-weight: 700;
  background: color-mix(in srgb, var(--wb) 16%, var(--btn-bg) 84%);
  color: color-mix(in srgb, var(--wb-deep) 85%, var(--text) 15%);
}

/* Modal body */
.dp-modal-body { flex: 1; overflow: hidden; }
.dp-modal-pane {
  height: 100%;
  overflow-y: auto;
  padding: 18px 22px 20px;
  background: color-mix(in srgb, var(--card) 97%, var(--bg) 3%);
}
.dp-modal-pane::-webkit-scrollbar { width: 5px; }
.dp-modal-pane::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

/* Team table */
.dp-team-table-wrap {
  border: 1px solid color-mix(in srgb, var(--line-strong) 22%, var(--line) 78%);
  border-radius: 14px;
  overflow: hidden;
  background: color-mix(in srgb, var(--card) 99%, var(--bg) 1%);
  box-shadow: inset 0 1px 0 var(--card-sheen);
}
.dp-team-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.dp-team-table thead th {
  padding: 10px 14px; text-align: left;
  font-size: 11.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em;
  color: color-mix(in srgb, var(--text) 58%, var(--muted) 42%);
  background: color-mix(in srgb, var(--card) 90%, var(--wb) 10%);
  border-bottom: 1px solid var(--line);
}
.dp-team-table tbody tr {
  border-bottom: 1px solid color-mix(in srgb, var(--line) 55%, transparent);
  transition: background .12s;
  background: color-mix(in srgb, var(--card) 98%, var(--bg) 2%);
}
.dp-team-table tbody tr:last-child { border-bottom: none; }
.dp-team-table tbody tr:hover { background: color-mix(in srgb, var(--wb) 8%, var(--card) 92%); }
.dp-team-table tbody tr.current { background: color-mix(in srgb, var(--wb) 14%, var(--card) 86%); }
.dp-team-table td {
  padding: 12px 14px;
  vertical-align: middle;
  color: color-mix(in srgb, var(--text) 96%, black 4%);
  background: inherit;
}
.dp-team-table td strong {
  font-size: 13.5px;
  font-weight: 800;
  color: var(--text);
}
.dp-tt-name {
  font-weight: 700;
  font-size: 14px;
  color: color-mix(in srgb, var(--text) 98%, black 2%);
  display: flex;
  align-items: center;
  gap: 7px;
}
.dp-tt-you {
  font-size: 10px; font-weight: 600; padding: 1px 7px; border-radius: 999px;
  background: color-mix(in srgb, var(--wb-deep) 15%, var(--btn-bg) 85%);
  color: var(--wb-deep); border: 1px solid color-mix(in srgb, var(--wb-deep) 30%, transparent);
  letter-spacing: .2px;
}
/* Role badge colors by role */
.dp-role-badge {
  display: inline-flex; align-items: center; padding: 3px 11px;
  border-radius: 999px; font-size: 11.5px; font-weight: 700;
  background: var(--grad); color: #fff; white-space: nowrap;
}
.dp-role-badge[data-role="manager"]  { background: linear-gradient(135deg,#0ea5e9,#38bdf8); }
.dp-role-badge[data-role="analyst"]  { background: linear-gradient(135deg,#f59e0b,#fbbf24); color: #1a0a00; }
.dp-role-badge[data-role="viewer"]   { background: color-mix(in srgb, var(--muted) 20%, var(--btn-bg) 80%); color: var(--muted); border: 1px solid var(--line); }
.dp-role-badge[data-role="admin"]    { background: linear-gradient(135deg,#6366f1,#818cf8); }
.dp-tt-modules { display: flex; flex-wrap: wrap; gap: 4px; }
.dp-tt-tag {
  display: inline-flex; align-items: center; padding: 4px 9px;
  border-radius: 999px; font-size: 11.5px; font-weight: 600;
  background: color-mix(in srgb, var(--wb) 14%, var(--btn-bg) 86%);
  border: 1px solid color-mix(in srgb, var(--wb-deep) 24%, var(--line) 76%);
  color: color-mix(in srgb, var(--wb-deep) 68%, var(--text) 32%);
  white-space: nowrap;
}
.dp-table-footer { margin-top: 10px; text-align: right; font-size: 12px; color: var(--muted); }

/* Roles panel */
.dp-roles-layout {
  display: grid; grid-template-columns: 160px 1fr; gap: 0;
  border: 1px solid color-mix(in srgb, var(--line-strong) 22%, var(--line) 78%);
  border-radius: 14px; overflow: hidden; min-height: 340px;
  background: color-mix(in srgb, var(--card) 99%, var(--bg) 1%);
  box-shadow: inset 0 1px 0 var(--card-sheen);
}
.dp-col-side {
  border-right: 1px solid var(--line);
  background: color-mix(in srgb, var(--card) 95%, var(--wb) 5%);
}
.dp-col-head {
  padding: 11px 14px; font-size: 11.5px; font-weight: 800; text-transform: uppercase;
  letter-spacing: .08em; color: color-mix(in srgb, var(--text) 58%, var(--muted) 42%); border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  background: color-mix(in srgb, var(--card) 98%, var(--wb) 2%);
}
.dp-col-side .dp-col-head { background: color-mix(in srgb, var(--card) 96%, var(--wb) 4%); }
.dp-col-actions { display: flex; gap: 4px; }
.dp-col-actions .dp-btn-sm {
  padding: 3px 9px; font-size: 11.5px; border-radius: 5px; height: auto; font-weight: 600;
}
.dp-col-list { padding: 6px; overflow-y: auto; height: calc(100% - 41px); }
.dp-col-list::-webkit-scrollbar { width: 3px; }
.dp-col-list::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }

.dp-role-btn {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  padding: 9px 11px; border-radius: 8px; font-size: 13.5px; font-weight: 600;
  color: color-mix(in srgb, var(--text) 96%, black 4%);
  background: color-mix(in srgb, var(--btn-bg) 94%, var(--bg) 6%);
  border: none; cursor: pointer;
  font-family: 'Inter', system-ui, sans-serif; text-align: left;
  transition: background .12s;
}
.dp-role-btn:hover { background: color-mix(in srgb, var(--wb) 9%, var(--btn-bg) 91%); }
.dp-role-btn.active { background: var(--grad); color: #fff; font-weight: 700; }
.dp-role-count {
  font-size: 11px; font-weight: 700; opacity: .9;
  background: rgba(255,255,255,.18); padding: 1px 6px; border-radius: 999px;
}
.dp-role-btn:not(.active) .dp-role-count {
  background: color-mix(in srgb, var(--line) 80%, transparent); color: var(--muted);
}

.dp-col-main {
  display: flex;
  flex-direction: column;
  background: color-mix(in srgb, var(--card) 98%, var(--bg) 2%);
}
.dp-module-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 6px; padding: 14px; flex: 1;
}
.dp-access-item {
  display: flex; align-items: center; gap: 8px; padding: 9px 11px;
  border-radius: 7px; border: 1px solid var(--line);
  background: color-mix(in srgb, var(--btn-bg) 94%, var(--bg) 6%);
  font-size: 13px; font-weight: 600; color: color-mix(in srgb, var(--text) 94%, black 6%); cursor: pointer;
  transition: border-color .12s, background .12s;
}
.dp-access-item:hover { border-color: var(--line-strong); }
.dp-access-item input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--wb); flex-shrink: 0; cursor: pointer; }
.dp-access-item:has(input:checked) {
  border-color: color-mix(in srgb, var(--wb-deep) 28%, var(--line) 72%);
  background: color-mix(in srgb, var(--wb) 14%, var(--btn-bg) 86%);
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--wb) 12%, transparent);
}
.dp-save-row {
  padding: 12px 14px; border-top: 1px solid var(--line);
  background: color-mix(in srgb, var(--card) 95%, var(--wb) 5%);
}

/* Users panel */
.dp-create-strip {
  background: color-mix(in srgb, var(--card) 97%, var(--bg) 3%);
  border: 1px solid color-mix(in srgb, var(--line-strong) 22%, var(--line) 78%);
  border-radius: 14px; padding: 14px 16px; margin-bottom: 16px;
  box-shadow: inset 0 1px 0 var(--card-sheen);
}
.dp-create-strip-head {
  font-size: 11.5px; font-weight: 800; color: color-mix(in srgb, var(--text) 58%, var(--muted) 42%); text-transform: uppercase;
  letter-spacing: .08em; margin-bottom: 10px;
}
.dp-create-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; align-items: end;
}
.dp-users-layout {
  display: grid; grid-template-columns: 180px 1fr; gap: 0;
  border: 1px solid color-mix(in srgb, var(--line-strong) 22%, var(--line) 78%);
  border-radius: 14px; overflow: hidden; min-height: 340px;
  background: color-mix(in srgb, var(--card) 99%, var(--bg) 1%);
  box-shadow: inset 0 1px 0 var(--card-sheen);
}
.dp-user-btn {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  padding: 9px 11px; border-radius: 7px; font-size: 13.5px; font-weight: 600;
  color: color-mix(in srgb, var(--text) 96%, black 4%); background: color-mix(in srgb, var(--btn-bg) 94%, var(--bg) 6%); border: none; cursor: pointer; gap: 6px;
  font-family: 'Inter', system-ui, sans-serif; text-align: left;
  transition: background .12s;
}
.dp-user-btn:hover { background: color-mix(in srgb, var(--wb) 9%, var(--btn-bg) 91%); }
.dp-user-btn.active { background: var(--grad); color: #fff; font-weight: 700; }
.dp-user-rolebadge {
  font-size: 10px; padding: 1px 5px; border-radius: 4px; white-space: nowrap; flex-shrink: 0;
  background: rgba(255,255,255,.2);
  color: inherit;
}
.dp-user-btn:not(.active) .dp-user-rolebadge {
  background: color-mix(in srgb, var(--line) 80%, transparent);
  color: color-mix(in srgb, var(--text) 56%, var(--muted) 44%);
}
.dp-edit-col {
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  background: color-mix(in srgb, var(--card) 98%, var(--bg) 2%);
}
.dp-edit-section { padding: 14px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
.dp-field { display: flex; flex-direction: column; gap: 4px; }
.dp-field label {
  font-size: 11.5px;
  font-weight: 800;
  color: color-mix(in srgb, var(--text) 58%, var(--muted) 42%);
  text-transform: uppercase;
  letter-spacing: .08em;
}
.dp-field input, .dp-field select {
  min-height: 40px;
  padding: 8px 10px; border-radius: 8px; border: 1px solid color-mix(in srgb, var(--line-strong) 18%, var(--line) 82%);
  background: color-mix(in srgb, var(--btn-bg) 94%, var(--bg) 6%); color: color-mix(in srgb, var(--text) 96%, black 4%); font-size: 13.5px;
  font-family: 'Inter', system-ui, sans-serif; outline: none;
  transition: border-color .12s, box-shadow .12s;
}
.dp-field input:focus, .dp-field select:focus {
  border-color: var(--line-strong);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--wb) 12%, transparent);
}
.dp-toggle-row {
  display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13.5px; font-weight: 600; color: var(--text);
}
.dp-toggle-row input { width: 15px; height: 15px; accent-color: var(--wb); cursor: pointer; }

body.theme-wb-light .dp-modal,
body.theme-wb-light .dp-team-table-wrap,
body.theme-wb-light .dp-roles-layout,
body.theme-wb-light .dp-users-layout,
body.theme-wb-light .dp-create-strip {
  box-shadow:
    0 18px 42px rgba(64, 33, 79, 0.10),
    inset 0 1px 0 rgba(255,255,255,.95);
}
body.theme-wb-light .dp-team-table tbody tr,
body.theme-wb-light .dp-col-main,
body.theme-wb-light .dp-edit-col,
body.theme-wb-light .dp-create-strip,
body.theme-wb-light .dp-access-item,
body.theme-wb-light .dp-role-btn:not(.active),
body.theme-wb-light .dp-user-btn:not(.active),
body.theme-wb-light .dp-field input,
body.theme-wb-light .dp-field select {
  background: color-mix(in srgb, white 96%, var(--wb) 4%);
}
body.theme-wb-light .dp-team-table thead th,
body.theme-wb-light .dp-col-head,
body.theme-wb-light .dp-create-strip-head,
body.theme-wb-light .dp-field label {
  color: color-mix(in srgb, var(--text) 74%, var(--muted) 26%);
}
body.theme-wb-light .dp-tt-tag {
  background: color-mix(in srgb, var(--wb) 10%, white 90%);
  color: color-mix(in srgb, var(--wb-deep) 70%, var(--text) 30%);
}

/* General buttons */
.dp-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
  font-family: 'Inter', system-ui, sans-serif; cursor: pointer;
  transition: background .12s, border-color .12s, transform .1s;
  border: none; white-space: nowrap;
}
.dp-btn:hover { transform: translateY(-1px); }
.dp-btn-primary { background: var(--grad); color: #fff; box-shadow: 0 4px 14px color-mix(in srgb, var(--wb) 32%, transparent); }
.dp-btn-primary:hover { filter: brightness(1.06); }
.dp-btn-secondary { background: var(--btn-bg); color: var(--text); border: 1px solid var(--line); }
.dp-btn-secondary:hover { border-color: var(--line-strong); }
.dp-btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }

/* Auth screen */
.dp-auth {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  padding: 28px;
}
.dp-auth.hidden { display: none; }
.dp-auth-shell {
  width: min(1120px, 100%);
  display: grid;
  grid-template-columns: minmax(0, 1.08fr) minmax(360px, .92fr);
  gap: 24px;
  align-items: center;
}
.dp-auth-stage {
  position: relative;
  min-height: 560px;
  padding: 30px;
  border-radius: 28px;
  border: 1px solid color-mix(in srgb, var(--line-strong) 32%, transparent);
  background:
    radial-gradient(circle at 16% 18%, color-mix(in srgb, var(--wb) 14%, transparent), transparent 32%),
    radial-gradient(circle at 84% 24%, rgba(92, 229, 255, .16), transparent 26%),
    linear-gradient(155deg, color-mix(in srgb, var(--card) 92%, var(--wb) 8%), color-mix(in srgb, var(--card) 78%, var(--wb-deep) 22%));
  box-shadow: var(--shadow-lg);
  overflow: hidden;
}
.dp-auth-stage::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(90deg, rgba(255,255,255,.10), transparent 34%),
    linear-gradient(transparent 0 calc(100% - 1px), rgba(255,255,255,.03) calc(100% - 1px) 100%),
    linear-gradient(90deg, transparent 0 calc(100% - 1px), rgba(255,255,255,.03) calc(100% - 1px) 100%);
  background-size: auto, 100% 38px, 38px 100%;
  pointer-events: none;
}
.dp-auth-stage-copy {
  position: relative;
  z-index: 1;
  max-width: 420px;
}
.dp-auth-kicker {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: color-mix(in srgb, var(--muted) 58%, var(--text) 42%);
}
.dp-auth-hero-title {
  margin-top: 12px;
  font-size: clamp(38px, 5vw, 60px);
  line-height: .95;
  font-weight: 900;
  letter-spacing: -.05em;
  color: var(--text);
}
.dp-auth-hero-note {
  margin-top: 14px;
  max-width: 440px;
  font-size: 15px;
  line-height: 1.65;
  font-weight: 550;
  color: color-mix(in srgb, var(--muted) 68%, var(--text) 32%);
}
.dp-auth-hero-visual {
  position: absolute;
  right: clamp(8px, 1.8vw, 28px);
  bottom: 6px;
  width: min(48%, 470px);
  aspect-ratio: 1 / 1.08;
  z-index: 1;
  filter: drop-shadow(0 24px 48px rgba(18, 16, 46, .18));
}
.dp-auth-card {
  background: color-mix(in srgb, var(--card) 90%, transparent);
  border: 1px solid var(--line); border-radius: 18px;
  padding: 36px 32px; width: min(400px, 92vw);
  backdrop-filter: blur(20px);
  box-shadow: var(--shadow-lg);
}
.dp-auth-title { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 4px; font-family: 'Inter', system-ui, sans-serif; }
.dp-auth-note { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
.dp-auth-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.dp-auth-field label { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: .3px; }
.dp-auth-field input {
  padding: 10px 14px; border-radius: 10px; border: 1px solid var(--line);
  background: color-mix(in srgb, var(--btn-bg) 80%, transparent);
  color: var(--text); font-size: 14px; font-family: 'Inter', system-ui, sans-serif;
  outline: none; transition: border-color .15s, box-shadow .15s;
}
.dp-auth-field input:focus { border-color: var(--wb); box-shadow: 0 0 0 3px color-mix(in srgb, var(--wb) 25%, transparent); }
.dp-auth-error { color: #ef4444; font-size: 12.5px; min-height: 18px; margin-bottom: 8px; }
.dp-auth-btn { width: 100%; padding: 11px; background: var(--grad); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Inter', system-ui, sans-serif; transition: filter .15s; }
.dp-auth-btn:hover { filter: brightness(1.07); }

/* Toast */
.dp-toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 16px; border-radius: 12px;
  background: color-mix(in srgb, var(--card) 96%, transparent);
  border: 1px solid var(--line);
  backdrop-filter: blur(20px);
  box-shadow: var(--shadow-md);
  min-width: 240px; max-width: 360px;
  transform: translateY(120%); opacity: 0;
  transition: transform .3s cubic-bezier(.2,1,.4,1), opacity .3s ease;
  pointer-events: none;
}
.dp-toast.show { transform: translateY(0); opacity: 1; pointer-events: auto; }
.dp-toast-kind {

(() => {

  const RB_FALLBACK_CONFIG = {
    roles: [
      { id: 'superadmin', label: 'Суперадмин' },
      { id: 'admin', label: 'Администратор' },

        'Графики.html',
        'Анализ релизов за квартал.html',
        'SWAT релиз.html',

      ],
      analyst: [
        'dashboard_run_module.html',
        'Графики.html',
        'Анализ релизов за квартал.html',
        'BiUser.html',
        'Популярные устройства.html'
      ],
      viewer: ['dashboard_run_module.html']
    },
    userAccess: {}
  };

  let rbConfigSource = null;
  let rbConfigFileHandle = null;
  let rbConfigMeta = {
    mode: 'fallback',
    canPersist: typeof window.showSaveFilePicker === 'function',
    sourceUrl: RB_CONFIG_URL
  };

  function sanitizeUserRecord(raw) {
    const login = typeof raw?.login === 'string' ? raw.login.trim() : '';
    const pass = typeof raw?.pass === 'string' ? raw.pass.trim() : '';
    if (!login || !pass) return null;
    let role = typeof raw?.role === 'string' && raw.role.trim() ? raw.role.trim() : 'viewer';
    if (login !== 'Nightlays' && role === 'superadmin') role = 'admin';
    return { login, pass, role };
  }

  function sanitizeRoleRecord(raw) {
    const id = typeof raw?.id === 'string' ? raw.id.trim() : '';
    if (!id) return null;
    const label = typeof raw?.label === 'string' && raw.label.trim() ? raw.label.trim() : id;
    return { id, label };
  }

  function sanitizeRoleList(list) {
    const source = Array.isArray(list) && list.length ? list : RB_FALLBACK_CONFIG.roles;
    const seen = new Set();
    const normalized = source
      .map(sanitizeRoleRecord)
      .filter(Boolean)
      .filter((role) => {
        const key = role.id.toLowerCase();
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    return normalized.length ? normalized : RB_FALLBACK_CONFIG.roles.map(role => ({ ...role }));
  }

  function sanitizeAccessList(list) {
    if (!Array.isArray(list)) return [];
    const normalized = Array.from(
      new Set(
        list
          .map((entry) => String(entry || '').trim())
          .filter(Boolean)
      )
    );
    return normalized.includes('*') ? ['*'] : normalized;
  }

  function sanitizeRoleAccessMap(raw = {}, roles = RB_FALLBACK_CONFIG.roles) {
    const source = raw && typeof raw === 'object' ? raw : {};
    const defaults = { ...RB_FALLBACK_CONFIG.roleAccess };
    const normalized = {};
    roles.forEach((role) => {
      normalized[role.id] = sanitizeAccessList(source[role.id] ?? defaults[role.id] ?? []);
    });
    Object.entries(source).forEach(([roleId, list]) => {
      const key = String(roleId || '').trim();
      if (!key) return;
      normalized[key] = sanitizeAccessList(list);
    });
    return normalized;
  }

  function sanitizeUserAccessMap(raw = {}) {
    const source = raw && typeof raw === 'object' ? raw : {};
    return Object.entries(source).reduce((acc, [login, cfg]) => {
      const safeLogin = String(login || '').trim();
      if (!safeLogin) return acc;
      acc[safeLogin] = {
        useRole: cfg?.useRole !== false,
        access: sanitizeAccessList(cfg?.access)
      };
      return acc;
    }, {});
  }

  function sanitizeUsersArray(list, fallback = RB_FALLBACK_CONFIG.users) {
    const source = Array.isArray(list) && list.length ? list : fallback;
    const normalized = new Map();
    source
      .map(sanitizeUserRecord)
      .filter(Boolean)
      .forEach((user) => {
        normalized.set(user.login.toLowerCase(), user);
      });
    return Array.from(normalized.values());
  }

  function loadCustomUsers() {
    try {
      const raw = localStorage.getItem(RB_CUSTOM_USERS_KEY);
      if (!raw) return [];
      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) return [];
      return parsed.map(sanitizeUserRecord).filter(Boolean);
    } catch (e) {
      return [];
    }
  }

  function saveCustomUsers(users) {
    const normalized = Array.isArray(users) ? users.map(sanitizeUserRecord).filter(Boolean) : [];
    localStorage.setItem(RB_CUSTOM_USERS_KEY, JSON.stringify(normalized));
    return normalized;
  }

  function mergeUsers(baseUsers, customUsers = []) {
    const merged = new Map();
    [...(Array.isArray(baseUsers) ? baseUsers : []), ...(Array.isArray(customUsers) ? customUsers : [])]
      .map(sanitizeUserRecord)
      .filter(Boolean)
      .forEach((user) => {
        merged.set(user.login.toLowerCase(), user);
      });
    return Array.from(merged.values());
  }

  function buildSerializableConfig(cfg) {
    const safe = cfg && typeof cfg === 'object' ? cfg : {};
    const roles = sanitizeRoleList(safe.roles);
    const users = sanitizeUsersArray(safe.users, RB_FALLBACK_CONFIG.users);
    const roleAccess = sanitizeRoleAccessMap(safe.roleAccess || {}, roles);
    const userAccess = sanitizeUserAccessMap(safe.userAccess || {});
    return { roles, users, roleAccess, userAccess };
  }

  function normalizeConfig(cfg, { includeLocalDrafts = true } = {}) {
    const safe = buildSerializableConfig(cfg);
    const roles = safe.roles;
    const users = includeLocalDrafts
      ? mergeUsers(safe.users, loadCustomUsers())
      : safe.users;
    const roleAccess = { ...RB_FALLBACK_CONFIG.roleAccess, ...safe.roleAccess };
    const userAccess = { ...safe.userAccess };
    return { roles, users, roleAccess, userAccess };
  }

  function updateConfigMeta(patch = {}) {
    rbConfigMeta = {
      ...rbConfigMeta,
      ...patch
    };
    window.RB_CONFIG_META = { ...rbConfigMeta };
    return window.RB_CONFIG_META;
  }

  function refreshConfigSnapshot(source = rbConfigSource, options = {}) {
    const normalized = normalizeConfig(source, options);
    window.RB_CONFIG = normalized;
    window.RB_CONFIG_PROMISE = Promise.resolve(normalized);
    window.dispatchEvent(new CustomEvent('rb-users-updated', { detail: { users: normalized.users } }));
    return normalized;
  }

  function downloadConfigFile(payload) {
    const blob = new Blob([`${JSON.stringify(payload, null, 2)}\n`], { type: 'application/json' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = RB_CONFIG_URL;
    document.body.appendChild(link);
    link.click();
    link.remove();
    window.setTimeout(() => URL.revokeObjectURL(link.href), 0);
  }

  async function fetchConfigFrom(url) {
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  function normalizeRbacProxyBase(raw) {
    try {
      const abs = new URL(String(raw || '').trim(), window.location.href);
      return abs.toString().replace(/\/+$/, '');
    } catch (e) {
      return '';
    }
  }

  function readRbacRemoteProxyConfig() {
    if (window.__RB_PROXY_CONFIG?.base) {
      return {
        base: normalizeRbacProxyBase(window.__RB_PROXY_CONFIG.base),
        mode: window.__RB_PROXY_CONFIG.mode === 'prefix' ? 'prefix' : 'query',
        useProxy: window.__RB_PROXY_CONFIG.useProxy !== false
      };
    }
    try {
      const raw = localStorage.getItem(RB_PROXY_RUNTIME_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        const base = normalizeRbacProxyBase(parsed?.base || '');
        if (base) {
          return {
            base,
            mode: parsed?.mode === 'prefix' ? 'prefix' : 'query',
            useProxy: parsed?.useProxy !== false
          };
        }
      }
    } catch (e) {}
    return {
      base: normalizeRbacProxyBase(RB_DEFAULT_PROXY_BASE),
      mode: 'query',
      useProxy: true
    };
  }

  function buildRbacProxiedUrl(rawUrl) {
    const cfg = readRbacRemoteProxyConfig();
    if (!cfg?.useProxy || !cfg.base) return '';
    const base = `${cfg.base}/`;
    const clean = String(rawUrl || '').replace(/^https?:\/\//, '');
    const isGAS = /^https:\/\/script\.google\.com\/macros\//i.test(String(rawUrl || ''));
    if (isGAS || cfg.mode === 'prefix') {
      return `${base}prefix/https://${clean}`;
    }
    return `${base}?url=${encodeURIComponent(rawUrl)}`;
  }

  async function rbacRemoteFetch(rawUrl, options = {}) {
    const init = {
      method: options.method || 'GET',
      headers: {
        Accept: 'application/json',
        ...(options.headers || {})
      },
      body: options.body,
      cache: 'no-store',
      credentials: 'omit',
      redirect: 'follow',
      mode: 'cors'
    };
    try {
      return await fetch(rawUrl, init);
    } catch (directError) {
      const proxiedUrl = buildRbacProxiedUrl(rawUrl);
      if (!proxiedUrl) throw directError;
      return fetch(proxiedUrl, init);
    }
  }

  async function fetchConfigFromAppScript() {
    const url = `${RB_REMOTE_CONFIG_URL}?op=get&name=${encodeURIComponent(RB_REMOTE_CONFIG_NAME)}`;
    const res = await rbacRemoteFetch(url, { method: 'GET' });
    const text = await res.text();
    if (!res.ok && res.status !== 302) {
      throw new Error(`Apps Script GET HTTP ${res.status}`);
    }
    if (!text.trim()) return null;
    let parsed = null;
    try {
      parsed = JSON.parse(text);
    } catch (e) {
      throw new Error('Apps Script вернул невалидный JSON');
    }
    if (Array.isArray(parsed)) return parsed.length ? parsed : null;
    return parsed && typeof parsed === 'object' ? parsed : null;
  }

  async function persistConfigViaAppScript(payload) {
    const url = `${RB_REMOTE_CONFIG_URL}?name=${encodeURIComponent(RB_REMOTE_CONFIG_NAME)}`;
    const body = JSON.stringify(payload ?? {}, null, 2);
    const res = await rbacRemoteFetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body
    });
    const text = await res.text();
    if (!res.ok && res.status !== 302) {
      throw new Error(`Apps Script SAVE HTTP ${res.status}: ${text.slice(0, 180)}`);
    }
    try {
      const parsed = JSON.parse(text);
      if (parsed && parsed.ok === false) {
        throw new Error(parsed.error || 'Apps Script save error');
      }
    } catch (e) {
      if (text.trim() && !/<!DOCTYPE html/i.test(text)) {
        throw e;
      }
    }
    return payload;
  }

  async function pickExistingConfigFileHandle() {
    if (typeof window.showOpenFilePicker !== 'function') return null;
    const handles = await window.showOpenFilePicker({
      multiple: false,
      types: [{
        description: 'RBAC JSON',
        accept: { 'application/json': ['.json'] }
      }]
    });
    return Array.isArray(handles) ? handles[0] || null : null;
  }

  async function ensureConfigFileHandle() {
    if (rbConfigFileHandle) return rbConfigFileHandle;
    try {
      rbConfigFileHandle = await pickExistingConfigFileHandle();
    } catch (error) {
      if (error?.name !== 'AbortError') throw error;
    }
    if (rbConfigFileHandle) return rbConfigFileHandle;
    if (typeof window.showSaveFilePicker !== 'function') return null;
    rbConfigFileHandle = await window.showSaveFilePicker({
      suggestedName: RB_CONFIG_URL,
      types: [{
        description: 'RBAC JSON',
        accept: { 'application/json': ['.json'] }
      }]
    });
    return rbConfigFileHandle;
  }

  async function persistConfigViaFile(payload) {
    const handle = await ensureConfigFileHandle();
    if (!handle) {
      throw new Error('Браузер не поддерживает запись общего JSON-файла');
    }
    const permission = await (typeof handle.queryPermission === 'function'
      ? handle.queryPermission({ mode: 'readwrite' })
      : Promise.resolve('granted'));
    const granted = permission === 'granted'
      ? permission
      : (typeof handle.requestPermission === 'function'
        ? await handle.requestPermission({ mode: 'readwrite' })
        : permission);
    if (granted !== 'granted') {
      throw new Error('Нет доступа на запись в `rb_roles_access.json`');
    }
    const writable = await handle.createWritable();
    await writable.write(`${JSON.stringify(payload, null, 2)}\n`);
    await writable.close();
    return payload;
  }

  window.loadRbConfig = function loadRbConfig() {
    if (window.RB_CONFIG_PROMISE) return window.RB_CONFIG_PROMISE;
    window.RB_CONFIG_PROMISE = (async () => {
      try {
        const remoteCfg = await fetchConfigFromAppScript();
        if (remoteCfg) {
          rbConfigSource = remoteCfg;
          updateConfigMeta({
            mode: 'apps-script',
            canPersist: true,
            sourceUrl: RB_REMOTE_CONFIG_URL
          });
          return refreshConfigSnapshot(remoteCfg);
        }
      } catch (e) {}

      try {
        const fileCfg = await fetchConfigFrom(RB_CONFIG_URL);
        rbConfigSource = fileCfg;
        updateConfigMeta({
          mode: 'shared-file',
          canPersist: typeof window.showSaveFilePicker === 'function',
          sourceUrl: RB_CONFIG_URL
        });
        return refreshConfigSnapshot(fileCfg);
      } catch (e) {}

      rbConfigSource = null;
      updateConfigMeta({
        mode: 'fallback',
        canPersist: typeof window.showSaveFilePicker === 'function',
        sourceUrl: RB_CONFIG_URL
      });
      return refreshConfigSnapshot(null);
    })();
    return window.RB_CONFIG_PROMISE;
  };

  window.getRbCustomUsers = loadCustomUsers;
  window.getRbConfigMeta = function getRbConfigMeta() {
    return { ...rbConfigMeta };
  };
  window.saveRbConfigSource = async function saveRbConfigSource(nextConfig) {
    const payload = buildSerializableConfig(nextConfig);
    let savedPayload = null;
    let lastError = null;

    try {
      savedPayload = await persistConfigViaAppScript(payload);
      updateConfigMeta({
        mode: 'apps-script',
        canPersist: true,
        sourceUrl: RB_REMOTE_CONFIG_URL
      });
    } catch (error) {
      lastError = error;
    }

    if (!savedPayload) {
      try {
      savedPayload = await persistConfigViaFile(payload);
      updateConfigMeta({
        mode: 'shared-file',
        canPersist: true,
        sourceUrl: RB_CONFIG_URL
      });
      } catch (error) {
        if (error?.name === 'AbortError') {
          throw new Error('Сохранение общего `rb_roles_access.json` отменено. Изменения остались только в текущем браузере.');
        }
        lastError = error;
      }
    }

    if (!savedPayload) {
      downloadConfigFile(payload);
      const message = lastError?.message
        || 'Не удалось сохранить общий RBAC-конфиг автоматически';
      throw new Error(`${message}. Я скачал новый \`rb_roles_access.json\`, замените им текущий файл.`);
    }

    rbConfigSource = savedPayload;
    const config = refreshConfigSnapshot(savedPayload, { includeLocalDrafts: false });
    return {
      config,
      meta: { ...rbConfigMeta }
    };
  };
  window.addRbCustomUser = function addRbCustomUser(rawUser) {
    const nextUser = sanitizeUserRecord(rawUser);
    if (!nextUser) {
      throw new Error('Заполните никнейм и пароль пользователя');
    }
    if (nextUser.login === 'Nightlays') {
      throw new Error('Логин Nightlays зарезервирован');
    }
    const existingUsers = refreshConfigSnapshot().users || [];
    const exists = existingUsers.some(user => user.login.toLowerCase() === nextUser.login.toLowerCase());
    if (exists) {
      throw new Error('Пользователь с таким никнеймом уже существует');
    }
    const customUsers = loadCustomUsers();
    customUsers.push(nextUser);
    saveCustomUsers(customUsers);
    return refreshConfigSnapshot();
  };
  window.updateRbCustomUser = function updateRbCustomUser(login, patch = {}) {
    const targetLogin = String(login || '').trim();
    if (!targetLogin) return refreshConfigSnapshot();
    const customUsers = loadCustomUsers();
    const allUsers = refreshConfigSnapshot().users || [];
    const baseUser = allUsers.find((user) => user.login.toLowerCase() === targetLogin.toLowerCase()) || null;
    let changed = false;
    const nextUsers = customUsers.map((user) => {
      if (user.login.toLowerCase() !== targetLogin.toLowerCase()) return user;
      changed = true;
      const nextRole = typeof patch.role === 'string' && patch.role.trim() ? patch.role.trim() : user.role;
      const nextPass = typeof patch.pass === 'string' && patch.pass.trim() ? patch.pass.trim() : user.pass;
      return sanitizeUserRecord({ ...user, role: nextRole, pass: nextPass }) || user;
    });
    if (!changed && baseUser) {
      const nextRole = typeof patch.role === 'string' && patch.role.trim() ? patch.role.trim() : baseUser.role;
      const nextPass = typeof patch.pass === 'string' && patch.pass.trim() ? patch.pass.trim() : baseUser.pass;
      const overrideUser = sanitizeUserRecord({ ...baseUser, role: nextRole, pass: nextPass });
      if (overrideUser) {
        nextUsers.push(overrideUser);
        changed = true;
      }
    }
    if (changed) saveCustomUsers(nextUsers);
    return refreshConfigSnapshot();
  };
})();

</script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const loadConfig = window.loadRbConfig ? window.loadRbConfig() : Promise.resolve({});
  loadConfig.then((cfg) => {
    const INITIAL_USERS = Array.isArray(cfg?.users) ? cfg.users : [];

  const AUTH_KEY = 'rb_auth_ok_v1';
  const ROLE_KEY = 'rb_role_v1';
  const USER_KEY = 'rb_user_v1';
  const USER_ROLE_KEY = 'rb_user_roles_v1';

  const form = document.getElementById('rbAuthForm');
  const loginInput = document.getElementById('rbAuthLogin');
  const passInput = document.getElementById('rbAuthPass');
  const err = document.getElementById('rbAuthError');
  const screen = document.getElementById('rbAuthScreen');
  const btnLogout = document.getElementById('rbAuthLogout');

  function isAuthed() {
    return localStorage.getItem(AUTH_KEY) === '1';
  }

  function showAuth() {
    if (screen) screen.classList.remove('hidden');
    document.body.classList.add('rb-locked');
    document.body.classList.remove('authed');
  }

  function hideAuth() {
    if (screen) screen.classList.add('hidden');
    document.body.classList.remove('rb-locked');
    document.body.classList.add('authed');
  }

  function getStoredUserRole(loginVal) {
    const configRole = getUsers().find((user) => user.login === loginVal)?.role || null;
    if (configRole) return configRole;
    try {
      const raw = localStorage.getItem(USER_ROLE_KEY);
      if (!raw) return null;
      const map = JSON.parse(raw);
      return map?.[loginVal] || null;
    } catch (e) {
      return null;
    }
  }

  function setRole(role, loginVal) {
    const roleId = role || 'viewer';
    localStorage.setItem(ROLE_KEY, roleId);
    if (loginVal) localStorage.setItem(USER_KEY, loginVal);
    document.body.dataset.role = roleId;
    document.body.classList.toggle('role-admin', roleId === 'admin');
    document.body.classList.toggle('role-superadmin', roleId === 'superadmin');
    window.dispatchEvent(new CustomEvent('rb-role-changed', { detail: { role: roleId, user: loginVal } }));
  }

  function getUsers() {
    return Array.isArray(window.RB_CONFIG?.users) && window.RB_CONFIG.users.length
      ? window.RB_CONFIG.users
      : INITIAL_USERS;
  }

  function checkCredentials(loginVal, passVal) {
    return getUsers().find(u => u.login === loginVal && u.pass === passVal);
  }

  if (form) {
    form.addEventListener('submit', e => {
      e.preventDefault();
      const l = (loginInput?.value || '').trim();
      const p = (passInput?.value || '').trim();

      if (!l || !p) {
        if (err) {
          err.textContent = 'Заполните логин и пароль';
          err.style.display = 'block';
        }
        return;
      }

      const user = checkCredentials(l, p);
      if (user) {
        localStorage.setItem(AUTH_KEY, '1');
        const storedRole = getStoredUserRole(user.login);
        let roleToSet = user.login === 'Nightlays' ? 'superadmin' : (storedRole || user.role || 'viewer');
        if (user.login !== 'Nightlays' && roleToSet === 'superadmin') roleToSet = 'admin';
        setRole(roleToSet, user.login);
        if (err) err.style.display = 'none';
        hideAuth();
      } else {
        if (err) {
          err.textContent = 'Неверный логин или пароль';
          err.style.display = 'block';
        }
      }
    });
  }

  if (btnLogout) {
    btnLogout.addEventListener('click', () => {
      localStorage.removeItem(AUTH_KEY);
      localStorage.removeItem(ROLE_KEY);
      localStorage.removeItem(USER_KEY);
      document.body.classList.remove('role-admin');
      document.body.classList.remove('role-superadmin');
      document.body.dataset.role = 'viewer';
      showAuth();
    });
  }

  // Первичная инициализация после загрузки DOM
  if (isAuthed()) {
    hideAuth();
    const savedUser = localStorage.getItem(USER_KEY) || '';
    const configuredRole = getStoredUserRole(savedUser) || localStorage.getItem(ROLE_KEY) || 'viewer';
    let roleToSet = savedUser === 'Nightlays' ? 'superadmin' : configuredRole;
    if (savedUser !== 'Nightlays' && roleToSet === 'superadmin') roleToSet = 'admin';
    setRole(roleToSet, savedUser);
  } else {
    showAuth();
  }

  });
});
</script>

<script>

const { h, render: preactRender, Fragment } = preact;
const { useState, useEffect, useRef, useCallback, useMemo } = preactHooks;
const html = htm.bind(h);

// ── Constants ──────────────────────────────────────────────────────────────
const THEME_KEY = 'rb_shell_theme_v1';
const SIDEBAR_KEY = 'rb_shell_sidebar_collapsed_v1';
const ROLE_KEY = 'rb_role_v1';
const USER_KEY = 'rb_user_v1';
const ACCESS_KEY = 'rb_role_access_v1';

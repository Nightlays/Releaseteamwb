<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnHub — Портал обучения</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<style>
:root{--p:#6C5CE7;--ph:#5A4BD1;--pl:#A29BFE;--pbg:#F0EEFF;--s:#00CEC9;--ok:#00B894;--warn:#FDCB6E;--err:#E17055;--info:#74B9FF;--bg:#fff;--bg2:#F8F9FA;--bg3:#E9ECEF;--tx:#2D3436;--tx2:#636E72;--tx3:#B2BEC3;--r:12px;--sh:0 1px 3px rgba(0,0,0,.08);--shm:0 4px 12px rgba(0,0,0,.1);--shl:0 8px 24px rgba(0,0,0,.15)}
[data-theme=dark]{--p:#A29BFE;--ph:#8B82F8;--pl:#6C5CE7;--pbg:#2D2B55;--bg:#1E1E2E;--bg2:#252536;--bg3:#363650;--tx:#CDD6F4;--tx2:#A6ADC8;--tx3:#585B70;--sh:0 1px 3px rgba(0,0,0,.3);--shm:0 4px 12px rgba(0,0,0,.4)}
[data-theme=corporate]{--p:#0984E3;--ph:#0773C5;--pl:#74B9FF;--pbg:#E8F4FD;--s:#74B9FF}
[data-theme=warm]{--p:#E17055;--ph:#D35C43;--pl:#FAB1A0;--pbg:#FFF0EC;--s:#FDCB6E}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:var(--bg2);color:var(--tx);overflow:hidden;height:100vh}
#root{height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
.navbar{height:64px;background:var(--bg);border-bottom:1px solid var(--bg3);display:flex;align-items:center;padding:0 20px;gap:16px;z-index:100;flex-shrink:0;box-shadow:var(--sh)}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;color:var(--p);cursor:pointer}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--p),var(--s));border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:800}
.search{flex:1;max-width:360px;position:relative}
.search input{width:100%;padding:9px 16px 9px 36px;border:1px solid var(--bg3);border-radius:20px;font-size:13px;background:var(--bg2);color:var(--tx);outline:0;transition:.2s;font-family:inherit}
.search input:focus{border-color:var(--p);background:var(--bg);box-shadow:0 0 0 3px var(--pbg)}
.search-i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:13px}
.search-dd{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg);border-radius:var(--r);box-shadow:var(--shl);z-index:300;border:1px solid var(--bg3);max-height:360px;overflow-y:auto}
.search-dd-item{padding:10px 14px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:10px;transition:.1s;border-bottom:1px solid var(--bg3)}
.search-dd-item:hover{background:var(--pbg);color:var(--p)}
.search-dd-item:last-child{border-bottom:none}
.search-dd-sec{padding:6px 14px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);font-weight:700;background:var(--bg2)}
.nav-r{display:flex;align-items:center;gap:8px;margin-left:auto}
.nav-btn{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg2);border:1px solid var(--bg3);cursor:pointer;font-size:16px;transition:.2s;position:relative;color:var(--tx2)}
.nav-btn:hover{background:var(--pbg);color:var(--p)}
.badge-c{position:absolute;top:-3px;right:-3px;background:var(--err);color:#fff;font-size:10px;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;border:2px solid var(--bg)}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--pl));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:14px;cursor:pointer;border:2px solid transparent;transition:.2s}
.avatar:hover{border-color:var(--p)}
.themes{display:flex;gap:4px;padding:4px;background:var(--bg2);border-radius:20px;border:1px solid var(--bg3)}
.tdot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.2s}
.tdot:hover,.tdot.on{border-color:var(--tx);transform:scale(1.15)}
.app-body{display:flex;flex:1;overflow:hidden}
.side{width:220px;background:var(--bg);border-right:1px solid var(--bg3);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;transition:width .3s}
.side.mini{width:60px}
.side-sec{padding:18px 12px 6px;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx3);font-weight:700}
.side.mini .side-sec{text-align:center;padding:14px 4px 4px;font-size:8px}
.side-item{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 6px;color:var(--tx2);cursor:pointer;font-size:13px;border-radius:6px;transition:.15s;font-weight:500;white-space:nowrap;overflow:hidden}
.side-item:hover{background:var(--pbg);color:var(--p)}
.side-item.on{background:var(--pbg);color:var(--p);font-weight:600}
.side-item i{font-size:16px;flex-shrink:0;width:22px;text-align:center;font-style:normal}
.side.mini .side-item{padding:9px;justify-content:center;margin:1px 3px}
.side.mini .side-item span{display:none}
.side-tog{padding:10px;text-align:center;cursor:pointer;color:var(--tx3);border-top:1px solid var(--bg3);margin-top:auto;font-size:16px;transition:.2s}
.side-tog:hover{color:var(--p);background:var(--pbg)}
.main{flex:1;overflow-y:auto;padding:24px 28px}
.card{background:var(--bg);border-radius:var(--r);box-shadow:var(--sh);transition:.2s;overflow:hidden}
.card:hover{box-shadow:var(--shm)}
.card-c{cursor:pointer}.card-c:hover{transform:translateY(-2px)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;border:none;font-family:inherit;white-space:nowrap}
.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:var(--ph)}
.btn-s{background:var(--s);color:#fff}.btn-s:hover{opacity:.9}
.btn-ok{background:var(--ok);color:#fff}
.btn-o{background:transparent;color:var(--p);border:1.5px solid var(--p)}.btn-o:hover{background:var(--pbg)}
.btn-g{background:transparent;color:var(--tx2)}.btn-g:hover{background:var(--bg2)}
.btn-d{background:var(--err);color:#fff}.btn-d:hover{opacity:.9}
.btn-sm{padding:5px 10px;font-size:11px}
.pbar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .5s ease}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-t{font-size:17px;font-weight:600}
.sec-l{font-size:12px;color:var(--p);cursor:pointer;font-weight:500}
.stat{background:var(--bg);border-radius:var(--r);padding:18px;box-shadow:var(--sh);transition:.2s}
.stat:hover{box-shadow:var(--shm);transform:translateY(-2px)}
.stat-i{width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:10px}
.stat-v{font-size:26px;font-weight:700}.stat-l{font-size:12px;color:var(--tx2);margin-top:2px}
.cov{height:130px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background-size:cover!important;background-position:center!important;background-repeat:no-repeat!important}
.cov-i{font-size:40px;opacity:.4}
.cov-upload{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0);transition:.2s;cursor:pointer}
.cov-upload:hover{background:rgba(0,0,0,.45)}
.cov-upload:hover .cov-upload-lbl{opacity:1}
.cov-upload-lbl{opacity:0;color:#fff;font-size:12px;font-weight:600;text-align:center;transition:.2s;pointer-events:none}
.cbdg{position:absolute;top:10px;left:10px;background:rgba(255,255,255,.92);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;color:var(--p)}
.cbody{padding:14px}
.ctitle{font-size:14px;font-weight:600;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.cdesc{font-size:11px;color:var(--tx2);margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cmeta{display:flex;gap:10px;font-size:11px;color:var(--tx2)}
.fchip{padding:6px 14px;border-radius:20px;font-size:12px;border:1px solid var(--bg3);cursor:pointer;transition:.15s;background:var(--bg);color:var(--tx2);font-weight:500;font-family:inherit}
.fchip:hover{border-color:var(--p);color:var(--p)}
.fchip.on{background:var(--p);color:#fff;border-color:var(--p)}
.modal-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fi .15s}
.modal{background:var(--bg);border-radius:16px;padding:28px;width:480px;max-width:90vw;box-shadow:var(--shl);animation:si .2s;max-height:90vh;overflow-y:auto}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes si{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.modal h3{font-size:18px;font-weight:700;margin-bottom:18px}
.modal-ft{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.fg{margin-bottom:14px}
.fl{display:block;font-size:12px;font-weight:600;margin-bottom:5px;color:var(--tx2)}
.fi{width:100%;padding:9px 14px;border:1.5px solid var(--bg3);border-radius:6px;font-size:13px;background:var(--bg);color:var(--tx);outline:0;transition:.2s;font-family:inherit}
.fi:focus{border-color:var(--p);box-shadow:0 0 0 3px var(--pbg)}
.fi::placeholder{color:var(--tx3)}
select.fi{cursor:pointer}
textarea.fi{resize:vertical;min-height:80px}
.toast-c{position:fixed;top:76px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:8px;color:#fff;font-size:13px;font-weight:500;box-shadow:var(--shm);display:flex;align-items:center;gap:8px;animation:sli .3s;min-width:260px}
@keyframes sli{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast-ok{background:var(--ok)}.toast-err{background:var(--err)}.toast-info{background:var(--info)}
.empty{text-align:center;padding:50px 20px;color:var(--tx2)}
.empty-i{font-size:56px;margin-bottom:12px;opacity:.5}
.empty-t{font-size:16px;font-weight:600;margin-bottom:6px;color:var(--tx)}
.empty-d{font-size:13px;margin-bottom:16px}
.con-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--bg);border-bottom:1px solid var(--bg3)}
.con-lay{display:flex;flex:1;overflow:hidden}
.con-tree{width:260px;background:var(--bg);border-right:1px solid var(--bg3);overflow-y:auto;padding:12px 0;flex-shrink:0}
.tree-lbl{padding:10px 14px 6px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);font-weight:700}
.tree-it{display:flex;align-items:center;gap:6px;padding:7px 14px;cursor:pointer;font-size:12px;color:var(--tx2);transition:.15s;border-left:3px solid transparent}
.tree-it:hover{background:var(--pbg);color:var(--p)}
.tree-it.on{background:var(--pbg);color:var(--p);font-weight:600;border-left-color:var(--p)}
.tree-it.mod{font-weight:600;color:var(--tx);font-size:13px}
.tree-it.les{padding-left:26px}.tree-it.stp{padding-left:42px;font-size:11px}
.tree-add{display:flex;align-items:center;gap:4px;padding:5px 14px;font-size:11px;color:var(--p);cursor:pointer;transition:.15s}
.tree-add:hover{background:var(--pbg)}
.tree-add.les{padding-left:26px}.tree-add.stp{padding-left:42px}
.con-ed{flex:1;overflow-y:auto;padding:20px 28px;background:var(--bg2)}
.ed-bar{display:flex;gap:2px;padding:6px 10px;background:var(--bg);border-radius:6px;margin-bottom:14px;flex-wrap:wrap;box-shadow:var(--sh)}
.ed-btn{padding:5px 8px;border-radius:4px;cursor:pointer;font-size:12px;color:var(--tx2);background:none;border:none;transition:.15s;font-family:inherit}
.ed-btn:hover{background:var(--pbg);color:var(--p)}
.ed-area{min-height:200px;background:var(--bg);border:1.5px solid var(--bg3);border-radius:6px;padding:18px;font-size:14px;line-height:1.6;outline:0;box-shadow:var(--sh)}
.ed-area:focus{border-color:var(--p);box-shadow:0 0 0 3px var(--pbg)}
.stypes{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.stype{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;font-size:12px;border:1.5px solid var(--bg3);cursor:pointer;transition:.15s;background:var(--bg);font-family:inherit;color:var(--tx2)}
.stype:hover{border-color:var(--p);color:var(--p)}
.stype.on{background:var(--p);color:#fff;border-color:var(--p)}
.sset{margin-top:16px;padding:16px;background:var(--bg);border-radius:var(--r);box-shadow:var(--sh)}
.srow{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px}
.srow input[type=checkbox]{accent-color:var(--p);width:15px;height:15px;cursor:pointer}
.cv{display:flex;height:100%}
.cv-side{width:280px;background:var(--bg);border-right:1px solid var(--bg3);overflow-y:auto;flex-shrink:0}
.cv-mh{display:flex;align-items:center;gap:6px;padding:10px 14px;font-weight:600;font-size:13px;cursor:pointer;border-bottom:1px solid var(--bg3);background:var(--bg2)}
.cv-st{display:flex;align-items:center;gap:8px;padding:8px 14px 8px 22px;font-size:12px;cursor:pointer;transition:.15s;color:var(--tx2);border-left:3px solid transparent}
.cv-st:hover{background:var(--bg2)}.cv-st.on{background:var(--pbg);color:var(--p);font-weight:600;border-left-color:var(--p)}
.cv-st.done{color:var(--ok)}
.cv-ck{width:20px;height:20px;border-radius:50%;border:2px solid var(--bg3);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.cv-ck.ok{background:var(--ok);border-color:var(--ok);color:#fff}
.cv-ck.cur{border-color:var(--p);color:var(--p)}
.cv-main{flex:1;overflow-y:auto}.cv-cnt{max-width:740px;margin:0 auto;padding:28px}
.quiz-b{background:var(--bg2);border-radius:var(--r);padding:20px;margin:20px 0;border:1px solid var(--bg3)}
.quiz-q{font-size:15px;font-weight:600;margin-bottom:14px}
.quiz-o{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg);border-radius:6px;margin-bottom:6px;cursor:pointer;border:2px solid transparent;transition:.15s;font-size:13px}
.quiz-o:hover{border-color:var(--pl)}.quiz-o.sel{border-color:var(--p);background:var(--pbg)}
.quiz-o.ok{border-color:var(--ok);background:#e6f9f0}.quiz-o.no{border-color:var(--err);background:#fde8e4}
.quiz-r{width:18px;height:18px;border-radius:50%;border:2px solid var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.quiz-o.sel .quiz-r,.quiz-o.ok .quiz-r{border-color:var(--p)}
.quiz-o.sel .quiz-r::after,.quiz-o.ok .quiz-r::after{content:'';width:8px;height:8px;border-radius:50%;background:var(--p)}
.quiz-o.ok .quiz-r{border-color:var(--ok)}.quiz-o.ok .quiz-r::after{background:var(--ok)}
.quiz-o.no .quiz-r{border-color:var(--err)}.quiz-o.no .quiz-r::after{content:'';width:8px;height:8px;border-radius:50%;background:var(--err)}
.quiz-mark{margin-left:auto;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;min-width:18px}
.quiz-tip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;background:var(--bg);border:1px solid var(--bg3);font-size:11px;color:var(--tx2);font-weight:600;margin-bottom:10px}
.quiz-tip.ok{color:#00875a;border-color:#b8e6cf;background:#f0fbf5}
.quiz-tip.no{color:#c0392b;border-color:#f0b8b1;background:#fff5f3}
.quiz-skip{color:var(--tx2)}
.quiz-skip:hover{color:var(--err);border-color:#f0b8b1;background:#fff5f3}
.acc-toggle{display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--tx2);font-weight:600}
.acc-toggle:hover{color:var(--p)}
.step-state{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid var(--bg3);background:var(--bg);color:var(--tx2)}
.step-state.ok{color:#00875a;border-color:#b8e6cf;background:#f0fbf5}
.step-state.no{color:#c0392b;border-color:#f0b8b1;background:#fff5f3}
.step-state.skip{color:#8a6d3b;border-color:#f3dfb2;background:#fffaf0}
.quiz-res{margin-top:14px;padding:12px 16px;border-radius:6px;font-size:13px;font-weight:500}
.quiz-res.ok{background:#e6f9f0;color:#00875a}.quiz-res.no{background:#fde8e4;color:#c0392b}
.prof-h{background:linear-gradient(135deg,var(--p),var(--pl));border-radius:16px;padding:28px;color:#fff;display:flex;align-items:center;gap:20px;margin-bottom:20px}
.prof-av{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;border:3px solid rgba(255,255,255,.4);flex-shrink:0}
.ach{background:var(--bg);border-radius:var(--r);padding:18px;text-align:center;box-shadow:var(--sh);transition:.2s;border:2px solid transparent}
.ach:hover{box-shadow:var(--shm);transform:translateY(-2px)}
.ach.got{border-color:var(--warn)}.ach.lock{opacity:.4;filter:grayscale(.4)}
.team-c{background:var(--bg);border-radius:var(--r);padding:16px;box-shadow:var(--sh);display:flex;align-items:center;gap:14px;transition:.2s;cursor:pointer;border-left:4px solid transparent}
.team-c:hover{box-shadow:var(--shm)}.team-c.lag{border-left-color:var(--err)}
.rbdg{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600}
.tbl{width:100%;border-collapse:collapse;background:var(--bg);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.tbl th{background:var(--bg2);padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--tx2);font-weight:600;border-bottom:1px solid var(--bg3)}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--bg3);font-size:13px}
.tbl tr:last-child td{border-bottom:none}.tbl tr:hover td{background:var(--bg2)}
.login-pg{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#6C5CE7 0%,#A29BFE 50%,#00CEC9 100%);padding:20px}
.login-c{background:var(--bg);border-radius:16px;padding:44px 36px;width:400px;max-width:100%;box-shadow:var(--shl)}
.dd{position:relative}.dd-m{position:absolute;top:calc(100% + 8px);right:0;background:var(--bg);border-radius:var(--r);box-shadow:var(--shl);min-width:220px;z-index:200;border:1px solid var(--bg3);overflow:hidden}
.dd-i{padding:10px 16px;cursor:pointer;font-size:13px;transition:.1s;color:var(--tx2)}.dd-i:hover{background:var(--pbg);color:var(--p)}
.dd-sep{height:1px;background:var(--bg3);margin:4px 0}
.notif-dd{position:absolute;top:calc(100% + 8px);right:0;background:var(--bg);border-radius:var(--r);box-shadow:var(--shl);width:340px;z-index:200;border:1px solid var(--bg3);max-height:400px;overflow-y:auto}
.notif-it{padding:12px 16px;border-bottom:1px solid var(--bg3);font-size:12px;cursor:pointer;transition:.1s;display:flex;gap:10px;align-items:flex-start}

<div id="root"></div>

<!-- ====== FIREBASE CONFIG ======
  Чтобы получить эти данные:
  1. Откройте https://console.firebase.google.com
  2. Нажмите на шестерёнку (Project Settings) рядом с названием проекта
  3. Прокрутите вниз до раздела "Your apps"
  4. Нажмите "</>" (Web) → Register app → введите имя "LearnHub"
  5. Скопируйте объект firebaseConfig и вставьте ниже
  6. В Firebase Console → Build → Realtime Database → Create database → Start in test mode
-->
<script>
window.LH_MEMORY = window.LH_MEMORY || Object.create(null);
window.LH_VOLATILE_KEYS = new Set([]); // courses are NOT volatile — they must persist
window.LH_MAX_LOCAL_VALUE_BYTES = 2000000; // 2MB per key
window.LH_GAS_URL = (function(){ try{ return localStorage.getItem('lh_gasUrl') || ''; }catch(e){ return ''; } })();

window.pruneLearnHubLocalCacheForQuota = function(){};
window.pruneLearnHubLocalCacheForQuota();
window.lhCacheWrite = function(key, value){
  window.LH_MEMORY[key] = value;
  try{
    const raw = JSON.stringify(value);
    if(raw.length <= window.LH_MAX_LOCAL_VALUE_BYTES){
      localStorage.setItem('lh_'+key, raw);
    }
    // If too large for localStorage, data is still in LH_MEMORY and remote stores (GAS/Firebase)
  }catch(e){
    // localStorage quota exceeded — data lives in LH_MEMORY and remote stores
  }
};

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyB6k8qI7dtj3tTeiVzYcAROHd3gedY97Ys",
  authDomain: "learnhub-portal.firebaseapp.com",
  databaseURL: "https://learnhub-portal-default-rtdb.firebaseio.com",
  projectId: "learnhub-portal",
  storageBucket: "learnhub-portal.firebasestorage.app",
  messagingSenderId: "253599129852",
  appId: "1:253599129852:web:cc4c35dd6eebe16f3db779",
  measurementId: "G-BLQCFBG4E4"
};
window.fbDB = null;
window.fbReady = false;

// Keys stored as {id: record} objects in Firebase (not flat arrays).
// This allows per-record writes and real-time listeners per user/role.
window.FB_OBJ_KEYS = ['users', 'roles', 'enrollments', 'notifications'];

(function initFirebase(){
  try {
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    window.fbDB = firebase.database();
    window.fbReady = true;
    console.log('[LearnHub] Firebase connected ✅');
  } catch(e) {
    console.warn('[LearnHub] Firebase offline, using localStorage only:', e.message);
  }
})();

// Convert Firebase value to local format (object→array for collections)
window.fbToLocal = function(k, v){
  if(window.FB_OBJ_KEYS.includes(k) && v && typeof v === 'object' && !Array.isArray(v)){
    return Object.values(v);
  }
  return v;
};

// Convert local array to Firebase format (array→object for collections)
window.fbFromLocal = function(k, v){
  if(window.FB_OBJ_KEYS.includes(k) && Array.isArray(v)){
    const obj = {};
    v.forEach(function(item){
      if(!item) return;
      if(item.id) {
        obj[item.id] = item;
      } else if(k === 'enrollments' && item.userId && item.courseId) {
        var eid = item.userId + '_' + item.courseId;
        obj[eid] = Object.assign({}, item, {id: eid});
      }
    });
    return obj;
  }
  return v;
};

// Sync all Firebase data → localStorage, returns promise
window.fbSync = function(){
  return new Promise(function(resolve){
    if(!window.fbReady || !window.fbDB){ resolve(); return; }
    window.fbDB.ref('lh').once('value').then(function(snap){
      const data = snap.val();
      if(data){
        Object.keys(data).forEach(function(k){
          try{
            const v = window.fbToLocal(k, data[k]);
            window.lhCacheWrite(k, v);
          }catch(e){}
        });
      }
      resolve();
    }).catch(function(e){ console.warn('[LearnHub] FB sync error:', e); resolve(); });
  });
};

// Write a single user record to Firebase (used for targeted saves)
window.fbSaveUser = function(user){
  if(!window.fbReady || !window.fbDB || !user || !user.id) return;
  window.fbDB.ref('lh/users/'+user.id).set(user).catch(function(e){ console.warn('[LearnHub] FB user save error:', e); });
};

// Write a single role record to Firebase
window.fbSaveRole = function(role){
  if(!window.fbReady || !window.fbDB || !role || !role.id) return;
  window.fbDB.ref('lh/roles/'+role.id).set(role).catch(function(e){ console.warn('[LearnHub] FB role save error:', e); });
};

// Delete a single user from Firebase
window.fbDeleteUser = function(userId){
  if(!window.fbReady || !window.fbDB || !userId) return;
  window.fbDB.ref('lh/users/'+userId).remove().catch(function(e){ console.warn('[LearnHub] FB user delete error:', e); });
};

// Delete a single role from Firebase
window.fbDeleteRole = function(roleId){
  if(!window.fbReady || !window.fbDB || !roleId) return;
  window.fbDB.ref('lh/roles/'+roleId).remove().catch(function(e){ console.warn('[LearnHub] FB role delete error:', e); });
};

// Write a single enrollment record to Firebase (key = userId_courseId)
window.fbSaveEnrollment = function(enrollment){
  if(!window.fbReady || !window.fbDB || !enrollment || !enrollment.userId || !enrollment.courseId) return;
  var id = enrollment.userId + '_' + enrollment.courseId;
  window.fbDB.ref('lh/enrollments/'+id).set(Object.assign({}, enrollment, {id: id})).catch(function(e){ console.warn('[LearnHub] FB enrollment save error:', e); });
};

// Write a single notification record to Firebase
window.fbSaveNotification = function(notif){
  if(!window.fbReady || !window.fbDB || !notif || !notif.id) return;
  window.fbDB.ref('lh/notifications/'+notif.id).set(notif).catch(function(e){ console.warn('[LearnHub] FB notification save error:', e); });
};

// Subscribe to real-time changes on users/roles (calls callback with updated array)
window.fbWatch = function(key, callback){
  if(!window.fbReady || !window.fbDB) return function(){};
  var ref = window.fbDB.ref('lh/'+key);
  var handler = ref.on('value', function(snap){
    var data = snap.val();
    if(data === null){
      // Firebase has no data — don't overwrite local data with empty
      // Just notify callback with existing local value so UI stays consistent
      var existing = Object.prototype.hasOwnProperty.call(window.LH_MEMORY, key)
        ? window.LH_MEMORY[key]
        : null;
      if(existing !== null && callback) callback(Array.isArray(existing) ? existing : []);
      return;
    }
    var arr = window.fbToLocal(key, data);
    window.lhCacheWrite(key, arr);
    if(callback) callback(arr);
  });
  return function(){ ref.off('value', handler); };
};

// ---- GAS storage for courses ----
window.gasLoadCourses = async function(){
  var url = window.LH_GAS_URL;
  if(!url) return null;
  try{
    var res = await fetch(url.replace(/\/+$/, '') + '?op=get&name=learnhub_courses.json');
    if(!res.ok) return null;
    var data = await res.json();
    return Array.isArray(data) ? data : null;
  }catch(e){
    console.warn('[LearnHub] GAS load courses error:', e.message);
    return null;
  }
};

window.gasSaveCourses = function(courses){
  var url = window.LH_GAS_URL;
  if(!url) return;
  fetch(url.replace(/\/+$/, '') + '?name=learnhub_courses.json', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(courses)
  }).catch(function(e){ console.warn('[LearnHub] GAS save courses error:', e.message); });
};
</script>

<script type="text/babel">
const{useState,useEffect,useCallback,createContext,useContext,useRef,useMemo}=React;
const CTX=createContext();
const useApp=()=>useContext(CTX);

// Storage (localStorage + Firebase Realtime DB sync)
// users/roles are stored as {id:record} objects in Firebase for per-record efficiency
const S={
  g:(k,d)=>{
    if(Object.prototype.hasOwnProperty.call(window.LH_MEMORY, k)) return window.LH_MEMORY[k];
    try{
      const v=localStorage.getItem('lh_'+k);
      if(v){
        const parsed = JSON.parse(v);
        window.LH_MEMORY[k] = parsed;
        return parsed;
      }
    }catch(e){}
    return d;
  },
  s:(k,v)=>{
    window.lhCacheWrite(k, v);
    if(window.fbReady&&window.fbDB){
      const fbVal=window.fbFromLocal(k,v);
      window.fbDB.ref('lh/'+k).set(fbVal).catch(e=>console.warn('[LearnHub] FB write:',e));
    }
    if((k==='courses'||k==='courses_custom')&&Array.isArray(v)){
      window.gasSaveCourses(v);
    }
  }
};

window.fbFetchKey = function(key){
  return new Promise(function(resolve){
    if(!window.fbReady || !window.fbDB){ resolve(null); return; }
    window.fbDB.ref('lh/'+key).once('value').then(function(snap){
      var data = snap.val();
      resolve(data == null ? null : window.fbToLocal(key, data));
    }).catch(function(e){
      console.warn('[LearnHub] FB fetch key error:', key, e);
      resolve(null);
    });
  });
};

const asArray = (value)=>Array.isArray(value) ? value.filter(Boolean) : (value && typeof value === 'object' ? Object.values(value).filter(Boolean) : []);
const hasData = (value)=>Array.isArray(value) ? value.length > 0 : !!(value && (typeof value !== 'object' || Object.keys(value).length));
const normalizeStep = (step, stepIndex = 0)=>({
  ...(step || {}),
  id: String(step?.id || `s-auto-${stepIndex}`),
  title: String(step?.title || `Шаг ${stepIndex + 1}`),
  type: step?.type || 'text',
  content: step?.content ?? '',
  points: Number.isFinite(Number(step?.points)) ? Number(step.points) : 10,
  required: step?.required !== false,
  order: Number.isFinite(Number(step?.order)) ? Number(step.order) : stepIndex
});
const normalizeLesson = (lesson, lessonIndex = 0)=>({
  ...(lesson || {}),
  id: String(lesson?.id || `l-auto-${lessonIndex}`),
  title: String(lesson?.title || `Урок ${lessonIndex + 1}`),
  order: Number.isFinite(Number(lesson?.order)) ? Number(lesson.order) : lessonIndex,
  steps: asArray(lesson?.steps).map((step, stepIndex)=>normalizeStep(step, stepIndex))
});
const normalizeExamQuestion = (question, questionIndex = 0)=>({
  ...(question || {}),
  id: String(question?.id || `eq-auto-${questionIndex}`),
  question: String(question?.question || ''),
  questionType: question?.questionType === 'multi' ? 'multi' : 'single',
  points: Number.isFinite(Number(question?.points)) ? Number(question.points) : 10,
  options: asArray(question?.options).map((option, optionIndex)=>({
    ...(option || {}),
    id: String(option?.id || `eo-auto-${questionIndex}-${optionIndex}`),
    text: String(option?.text || `Вариант ${optionIndex + 1}`),
    isCorrect: !!option?.isCorrect
  }))
});
const normalizeFinalExam = (finalExam)=>{
  const questions = asArray(finalExam?.questions).map((question, questionIndex)=>normalizeExamQuestion(question, questionIndex));
  const rawQuestionsPerAttempt = Number(finalExam?.questionsPerAttempt);
  const questionsPerAttempt = questions.length
    ? Math.max(1, Math.min(questions.length, Number.isFinite(rawQuestionsPerAttempt) ? rawQuestionsPerAttempt : questions.length))
    : 0;
  return {
    enabled: !!finalExam?.enabled,
    passingScore: Number.isFinite(Number(finalExam?.passingScore)) ? Number(finalExam.passingScore) : 70,
    timeLimit: Number.isFinite(Number(finalExam?.timeLimit)) ? Number(finalExam.timeLimit) : 20,
    randomizeQuestions: !!finalExam?.randomizeQuestions,
    questionsPerAttempt,
    questions
  };
};
const normalizeModule = (module, moduleIndex = 0)=>({
  ...(module || {}),
  id: String(module?.id || `m-auto-${moduleIndex}`),
  title: String(module?.title || `Модуль ${moduleIndex + 1}`),
  order: Number.isFinite(Number(module?.order)) ? Number(module.order) : moduleIndex,
  lessons: asArray(module?.lessons).map((lesson, lessonIndex)=>normalizeLesson(lesson, lessonIndex))
});
const normalizeCourseTree = (course)=>course ? ({
  ...(course || {}),
  finalExam: normalizeFinalExam(course?.finalExam),
  modules: asArray(course?.modules).map((module, moduleIndex)=>normalizeModule(module, moduleIndex))
}) : course;
const normalizeCourseCollection = (courses)=>asArray(courses).map(course=>normalizeCourseTree(course));
const getCourseModules = (course)=>asArray(course?.modules).map((module, moduleIndex)=>normalizeModule(module, moduleIndex));
const getModuleLessons = (module)=>asArray(module?.lessons).map((lesson, lessonIndex)=>normalizeLesson(lesson, lessonIndex));
const getLessonSteps = (lesson)=>asArray(lesson?.steps).map((step, stepIndex)=>normalizeStep(step, stepIndex));

async function hydrateCriticalLearningData(){
  const criticalKeys = ['courses','enrollments','stepProgress','notifications','achievements','userAchievements','submissions','users','roles'];
  for(const key of criticalKeys){
    const localValue = S.g(key, null);
    if(hasData(localValue)) continue;
    // Try Firebase first (freshest), then GAS for courses, then give up
    const remoteValue = await window.fbFetchKey(key);
    if(hasData(remoteValue)){
      window.lhCacheWrite(key, remoteValue);
    } else if(key === 'courses' || key === 'courses_custom'){
      const gasValue = await window.gasLoadCourses();
      if(hasData(gasValue)) window.lhCacheWrite(key, gasValue);
    }
  }

  const baseCourses = asArray(S.g('courses', []));
  const legacyLocal = asArray(S.g('courses_custom', []));
  const legacyRemote = asArray(await window.fbFetchKey('courses_custom'));
  const legacyGas = asArray(await window.gasLoadCourses());
  const mergedMap = new Map();
  [...baseCourses, ...legacyLocal, ...legacyRemote, ...legacyGas].forEach(course=>{
    if(course && course.id) mergedMap.set(course.id, course);
  });
  if(mergedMap.size){
    window.LH_MEMORY.coursesMerged = normalizeCourseCollection(Array.from(mergedMap.values()));
  }
}

// Course cover helpers
const getCoverStyle=(c)=>c?.coverImage
  ?{backgroundImage:`url(${c.coverImage})`,backgroundSize:'cover',backgroundPosition:'center'}
  :{background:c?.coverGradient||'#6C5CE7'};

// Upload image → base64
const readImageFile=(file)=>new Promise((res,rej)=>{
  const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(file);
});

// Gradients
const GRADS=['linear-gradient(135deg,#6C5CE7,#A29BFE)','linear-gradient(135deg,#00CEC9,#81ECEC)','linear-gradient(135deg,#E17055,#FDCB6E)','linear-gradient(135deg,#00B894,#55EFC4)','linear-gradient(135deg,#74B9FF,#0984E3)','linear-gradient(135deg,#FDCB6E,#F9CA24)'];
const CATS=['Менеджмент','Безопасность','Аналитика','Soft Skills','Технологии'];
const STYPES=[{id:'text',l:'Текст',i:'📝'},{id:'video',l:'Видео',i:'🎥'},{id:'code',l:'Код',i:'💻'},{id:'quiz',l:'Тест',i:'❓'},{id:'survey',l:'Опрос',i:'📋'},{id:'open',l:'Открытый вопрос',i:'✍️'},{id:'exam',l:'Экзамен',i:'🎓'},{id:'file',l:'Файл',i:'📎'},{id:'ai',l:'ИИ проверка',i:'🤖'}];
const ICONS={text:'📝',video:'🎥',code:'💻',quiz:'❓',survey:'📋',open:'✍️',exam:'🎓',file:'📎',ai:'🤖'};
const ROLE_MAP={'admin':'Администратор','manager':'Руководитель','instructor':'Инструктор','employee':'Сотрудник'};
const ENROLLMENT_STATUS_LABELS={pending:'Ожидает подтверждения',active:'В процессе',completed:'Завершён',rejected:'Отклонён'};
const QUESTION_STEPS=new Set(['quiz','survey','open','ai']);
const STEP_ANSWER_TYPES=new Set(['quiz','survey','open','ai']);
const STEP_ANSWERS_KEY='stepAnswers';
const EXAM_SESSIONS_KEY='examSessions';
const normalizeLogin=(value)=>String(value||'').trim().toLowerCase();
const getOptionKey=(option,index)=>String(option?.id||index);
const getQuestionModeLabel=(type)=>type==='multi'?'Несколько ответов':'Один ответ';
const generateId=(prefix)=>`${prefix}${Date.now()}${Math.random().toString(36).slice(2,6)}`;
const isValidEmail=(value)=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(value||'').trim().toLowerCase());
const getAllUsers=()=>asArray(S.g('users',[]));
const getAllEnrollments=()=>asArray(S.g('enrollments',[]));
const getAllStepAnswers=()=>asArray(S.g(STEP_ANSWERS_KEY,[]));
const getAllStepProgress=()=>asArray(S.g('stepProgress',[]));
const saveStepAnswers=(items)=>S.s(STEP_ANSWERS_KEY,items);
const saveStepProgress=(items)=>S.s('stepProgress',items);
const getEnrollmentApproverId=(member,users=getAllUsers())=>{
  if(member?.managerId&&users.some(u=>u.id===member.managerId)) return member.managerId;
  const admin=users.find(u=>u.role==='admin');
  return admin?.id||null;
};
const getEnrollmentRecord=(userId,courseId,enrollments=getAllEnrollments())=>enrollments.find(e=>e.userId===userId&&e.courseId===courseId)||null;
const upsertEnrollmentRecord=(record,enrollments=getAllEnrollments())=>{
  const merged={id:record.userId+'_'+record.courseId,...record};
  const next=[...enrollments];
  const index=next.findIndex(e=>e.userId===record.userId&&e.courseId===record.courseId);
  if(index>=0) next[index]={...next[index],...merged};
  else next.push(merged);
  window.lhCacheWrite('enrollments',next);
  window.fbSaveEnrollment(merged);
  return next;
};
const getStepAnswerRecord=(userId,courseId,stepId,answers=getAllStepAnswers())=>answers.find(a=>a.userId===userId&&a.courseId===courseId&&a.stepId===stepId)||null;
const getStepProgressRecord=(userId,courseId,stepId,progress=getAllStepProgress())=>progress.find(p=>p.userId===userId&&p.courseId===courseId&&p.stepId===stepId)||null;
const upsertStepAnswerRecord=(record,answers=getAllStepAnswers())=>{
  const next=[...answers];
  const index=next.findIndex(a=>a.userId===record.userId&&a.courseId===record.courseId&&a.stepId===record.stepId);
  const normalized={
    id: record.id || `sa_${record.userId}_${record.courseId}_${record.stepId}`,
    selectedKeys: [],
    textAnswer: '',
    submitted: false,
    skipped: false,
    correct: null,
    updatedAt: new Date().toISOString(),
    ...record
  };
  if(index>=0) next[index]={...next[index],...normalized};
  else next.push(normalized);
  saveStepAnswers(next);
  return next;
};
const upsertStepProgressRecord=(record,progress=getAllStepProgress())=>{
  const next=[...progress];
  const index=next.findIndex(p=>p.userId===record.userId&&p.courseId===record.courseId&&p.stepId===record.stepId);
  const normalized={
    userId:record.userId,
    courseId:record.courseId,
    stepId:record.stepId,
    status:'completed',
    completedAt:new Date().toISOString(),
    score:null,
    ...record
  };
  if(index>=0) next[index]={...next[index],...normalized};
  else next.push(normalized);
  saveStepProgress(next);
  return next;
};
const formatEnrollmentActionText=(status)=>{
  if(status==='pending') return 'Заявка отправлена';
  if(status==='rejected') return 'Заявка отклонена';
  return 'Записаться';
};
const formatCertificateCourseTitle=(title)=>{
  const raw=String(title||'').trim();
  if(raw.length<=48)return raw;
  const shortened=raw.replace(/\s+/g,' ').trim();
  return shortened.length<=48?shortened:shortened.slice(0,45).trimEnd()+'...';
};
const buildCertificateShareText=(user,course,enr)=>{
  return [
    'Сертификат LearnHub',
    `${user.firstName} ${user.lastName}`,
    `Курс: ${course.title}`,
    `Дата завершения: ${enr.completedAt?new Date(enr.completedAt).toLocaleDateString('ru-RU'):'—'}`
  ].join('\n');
};
const isQuestionStepType=(type)=>QUESTION_STEPS.has(type);
const normalizeSelectedKeys=(value)=>Array.isArray(value)?value.map(String):[];
const getEnrollmentStatusTone=(status)=>{
  if(status==='completed') return {bg:'#e6f9f0',color:'#00875a',label:'Пройден'};
  if(status==='pending') return {bg:'#fff8e0',color:'#b7791f',label:'Ожидает подтверждения'};
  if(status==='rejected') return {bg:'#fff0ec',color:'#c0392b',label:'Отклонён'};
  return {bg:'var(--pbg)',color:'var(--p)',label:'В процессе'};
};
const getStepAnswerStatus=(record)=>{
  if(record?.skipped) return 'skip';
  if(record?.submitted&&record?.correct===false) return 'no';
  if(record?.submitted) return 'ok';
  return '';
};
const buildQuestionPayload=(type,rawContent)=>{
  try{
    const parsed=rawContent?JSON.parse(rawContent):null;
    if(parsed&&typeof parsed==='object'){
      const normalizedOptions=asArray(parsed.options).length?parsed.options:[{id:'o1',text:'',isCorrect:false}];
      return {
        question:'',
        questionType:'single',
        points:10,
        attempts:3,
        explanation:'',
        placeholder:'',
        ...parsed,
        options:normalizedOptions
      };
    }
  }catch(e){}

};
const getQuestionCorrectKeys=(payload)=>new Set(asArray(payload?.options).map((option,index)=>({option,index})).filter(({option})=>option?.isCorrect).map(({option,index})=>getOptionKey(option,index)));
const isAnswerSelectionCorrect=(payload,selectedKeys)=>{
  const selected=new Set(normalizeSelectedKeys(selectedKeys));
  const correct=getQuestionCorrectKeys(payload);
  if(correct.size!==selected.size)return false;
  for(const key of correct){ if(!selected.has(key)) return false; }
  return true;
};
const getCertificateSharePayload=(user,course,enrollment)=>{
  const title=`Сертификат LearnHub — ${formatCertificateCourseTitle(course.title)}`;
  return {
    title,
    text:buildCertificateShareText(user,course,enrollment),
    url:window.location.href
  };
};
const flattenCourseSteps=(course)=>{
  const steps=[];
  asArray(course?.modules).forEach(module=>{
    asArray(module?.lessons).forEach(lesson=>{
      asArray(lesson?.steps).forEach(step=>{
        steps.push({...step,modTitle:module.title,lesTitle:lesson.title});
      });
    });
  });
  return steps;
};
const getCourseCompletionProgress=(userId,courseId,steps,progress=getAllStepProgress())=>{
  const total=steps.length||0;
  const done=steps.filter(step=>getStepProgressRecord(userId,courseId,step.id,progress)).length;
  return total>0?Math.round((done/total)*100):0;
};

function CatalogPage(){

    return()=>{ unsubCourses(); unsubEnrollments(); };
  },[]);
  const publishedCourses=courses.filter(c=>c.status==='published');
  const filtered=publishedCourses.filter(c=>(cat==='Все'||c.category===cat)&&c.title.toLowerCase().includes(q.toLowerCase()));
  const enroll=(cid)=>{
    if(enrs.find(e=>e.userId===user.id&&e.courseId===cid)){addToast('info','Заявка или запись уже есть');return}
    const approverId=getEnrollmentApproverId(user);

    window.fbSaveNotification(nUser);
    const allNotifs=[nUser,...S.g('notifications',[])];
    if(approverId){
      const requester=`${user.firstName} ${user.lastName}`.trim();
      const nApprover={id:'n'+Date.now()+'a',text:`${requester} запросил(а) запись на курс "${courseTitle}"`,icon:'📝',time:'только что',read:false,forUserId:approverId};
      window.fbSaveNotification(nApprover);
      allNotifs.unshift(nApprover);
    }
    window.lhCacheWrite('notifications',allNotifs);
    addToast('ok',approverId?'Заявка отправлена на согласование руководителю':'Заявка отправлена');
  };
  return(<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>

    </div>
    <div style={{display:'flex',gap:6,marginBottom:18,flexWrap:'wrap'}}>
      {['Все',...CATS].map(c=><button key={c} className={`fchip ${cat===c?'on':''}`} onClick={()=>setCat(c)}>{c}</button>)}
    </div>
    {filtered.length===0?<div className="empty"><div className="empty-i">🔍</div><div className="empty-t">Курсы не найдены</div></div>:
    <div className="grid3">{filtered.map(c=>{const enr=enrs.find(e=>e.userId===user.id&&e.courseId===c.id);const totalSteps=(()=>{let n=0;c.modules?.forEach(m=>m.lessons?.forEach(l=>n+=(l.steps?.length||0)));return n})();
      return<div key={c.id} className="card">
        <div className="cov" style={{...getCoverStyle(c),height:150}}>{!c.coverImage&&<span className="cov-i">{c.icon||'📚'}</span>}<span className="cbdg">{c.category}</span></div>
        <div className="cbody">
          <div className="ctitle">{c.title}</div><div className="cdesc">{c.description}</div>
          <div className="cmeta" style={{marginBottom:10}}><span>📝 {c.modules?.length||0} мод.</span><span>📄 {totalSteps} шагов</span></div>

              :<button className="btn btn-o btn-sm" disabled>{formatEnrollmentActionText(enr.status)}</button>

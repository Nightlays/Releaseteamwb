// ---- TEAM ----
function TeamPage(){
  const{user,go,toast:addToast}=useApp();
  const allUsers=S.g('users',[]);
  const users=allUsers.filter(u=>u.id!==user.id);
  const courses=S.g('courses',[]).filter(c=>c.status==='published');
  const[allEnrs,setAllEnrs]=useState(getAllEnrollments());
  const[showAssign,setShowAssign]=useState(false);
  const[assignUser,setAssignUser]=useState('');
  const[assignCourse,setAssignCourse]=useState('');
  const[tab,setTab]=useState('overview');
  useEffect(()=>{
    const unsub=window.fbWatch('enrollments',arr=>{if(Array.isArray(arr))setAllEnrs(arr);});
    return unsub;
  },[]);

  const getTeamStats=(uid)=>{
    const enrs=allEnrs.filter(e=>e.userId===uid);
    const done=enrs.filter(e=>e.status==='completed').length;
    const total=enrs.length;
    const avg=total>0?Math.round(enrs.reduce((s,e)=>s+e.progress,0)/total):0;
    return{done,total,avg,enrs};
  };

  const team=users.map(u=>({...u,...getTeamStats(u.id)}));
  const avgAll=team.length?Math.round(team.reduce((s,t)=>s+t.avg,0)/team.length):0;
  const lag=team.filter(t=>t.avg<30&&t.total>0).length;
  const totalDone=team.reduce((s,t)=>s+t.done,0);
  const pendingRequests=allEnrs.filter(e=>e.status==='pending'&&e.approverId===user.id);

  const doAssign=()=>{
    if(!assignUser||!assignCourse){addToast('err','Выберите сотрудника и курс');return}
    const enrs=getAllEnrollments();
    if(enrs.find(e=>e.userId===assignUser&&e.courseId===assignCourse)){addToast('info','Уже назначен');setShowAssign(false);return}
    const newRec={id:assignUser+'_'+assignCourse,userId:assignUser,courseId:assignCourse,progress:0,status:'active',startedAt:new Date().toISOString()};
    const next=[...enrs,newRec];
    window.lhCacheWrite('enrollments',next);
    window.fbSaveEnrollment(newRec);
    setAllEnrs(next);
    const u=allUsers.find(x=>x.id===assignUser);const c=courses.find(x=>x.id===assignCourse);
    const nEmp={id:'n'+Date.now()+'e',text:`Вам назначен курс "${c?.title||'Курс'}"`,icon:'📋',time:'только что',read:false,forUserId:assignUser};
    const nMgr={id:'n'+Date.now(),text:`Курс "${c?.title}" назначен ${u?.firstName||''} ${u?.lastName||''}`,icon:'📋',time:'только что',read:false,forUserId:user.id};
    window.fbSaveNotification(nEmp);
    window.fbSaveNotification(nMgr);
    window.lhCacheWrite('notifications',[nEmp,nMgr,...S.g('notifications',[])]);
    addToast('ok','Курс назначен!');setShowAssign(false);
  };
  const decideRequest=(request,status)=>{
    const updatedEnr={
      ...request,
      id: request.id || (request.userId+'_'+request.courseId),
      status,
      progress:status==='active'?request.progress||0:0,
      startedAt:status==='active'?(request.startedAt||new Date().toISOString()):null,
      reviewedAt:new Date().toISOString()
    };
    const next=allEnrs.map(enrollment=>enrollment.userId===request.userId&&enrollment.courseId===request.courseId?updatedEnr:enrollment);
    window.lhCacheWrite('enrollments',next);
    window.fbSaveEnrollment(updatedEnr);
    setAllEnrs(next);
    const member=allUsers.find(item=>item.id===request.userId);
    const course=courses.find(item=>item.id===request.courseId)||S.g('courses',[]).find(item=>item.id===request.courseId);
    const notif={
      id:'n'+Date.now(),
      text:`Ваша заявка на курс "${course?.title||'Курс'}" ${status==='active'?'одобрена ✅':'отклонена ❌'}`,
      icon:status==='active'?'✅':'❌',
      time:'только что',
      read:false,
      forUserId:request.userId
    };
    window.fbSaveNotification(notif);
    window.lhCacheWrite('notifications',[notif,...S.g('notifications',[])]);
    addToast('ok',status==='active'?`Запись ${member?.firstName||'сотрудника'} подтверждена`:`Заявка отклонена`);
  };

  return(<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
      <div><h1 style={{fontSize:22,fontWeight:700}}>Моя команда</h1><p style={{fontSize:12,color:'var(--tx2)',marginTop:3}}>{team.length} сотрудников</p></div>
      <button className="btn btn-p" onClick={()=>setShowAssign(true)}>+ Назначить курс</button>
    </div>
    <div className="grid4" style={{marginBottom:16}}>
      <div className="stat"><div className="stat-i" style={{background:'var(--pbg)',color:'var(--p)'}}>👥</div><div className="stat-v">{team.length}</div><div className="stat-l">Сотрудников</div></div>
      <div className="stat"><div className="stat-i" style={{background:'#e6f9f0',color:'var(--ok)'}}>📊</div><div className="stat-v" style={{color:'var(--ok)'}}>{avgAll}%</div><div className="stat-l">Ср. прогресс</div></div>
      <div className="stat"><div className="stat-i" style={{background:'#e8f4fd',color:'var(--info)'}}>✅</div><div className="stat-v">{totalDone}</div><div className="stat-l">Курсов завершено</div></div>
      <div className="stat"><div className="stat-i" style={{background:'#fde8e4',color:'var(--err)'}}>⚠️</div><div className="stat-v" style={{color:'var(--err)'}}>{lag}</div><div className="stat-l">Отстающих</div></div>
    </div>
    <Tabs tabs={[{id:'overview',label:'Обзор',icon:'👥'},{id:'requests',label:`Запросы (${pendingRequests.length})`,icon:'⏳'},{id:'leaderboard',label:'Рейтинг',icon:'🏅'}]} active={tab} onChange={setTab}/>
    {tab==='overview'&&<div className="grid2">{team.map(m=>{const isLag=m.avg<30&&m.total>0;
      return<div key={m.id} className={`team-c ${isLag?'lag':''}`}>
        <div style={{width:44,height:44,borderRadius:'50%',background:GRADS[parseInt(m.id.replace('u',''))%GRADS.length],display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:600,fontSize:14,flexShrink:0}}>{m.firstName[0]}{m.lastName[0]}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:600,fontSize:14}}>{m.firstName} {m.lastName}</div>
          <span className="rbdg" style={{background:m.role==='manager'?'#F0EEFF':'#e6f9f0',color:m.role==='manager'?'#6C5CE7':'#00B894'}}>{ROLE_MAP[m.role]||m.role}</span>
          <div style={{fontSize:11,color:'var(--tx2)',marginTop:4}}>{m.total} курсов · {m.done} завершено</div>
        </div>
        <div style={{display:'flex',gap:16,alignItems:'center'}}>
          <div style={{textAlign:'center'}}><div style={{fontSize:18,fontWeight:700,color:isLag?'var(--err)':m.avg>80?'var(--ok)':'var(--p)'}}>{m.avg}%</div><div style={{fontSize:10,color:'var(--tx2)'}}>Прогресс</div></div>
          <div style={{textAlign:'center'}}><div style={{fontSize:18,fontWeight:700,color:'var(--warn)'}}>⭐ {m.xp}</div><div style={{fontSize:10,color:'var(--tx2)'}}>XP</div></div>
        </div>
      </div>})}</div>}
    {tab==='requests'&&(
      pendingRequests.length===0
        ?<div className="empty"><div className="empty-i">⏳</div><div className="empty-t">Нет заявок на подтверждение</div><div className="empty-d">Новые записи на курсы появятся здесь.</div></div>
        :<div style={{display:'flex',flexDirection:'column',gap:12}}>
          {pendingRequests.map(request=>{
            const member=allUsers.find(item=>item.id===request.userId);
            const course=S.g('courses',[]).find(item=>item.id===request.courseId);
            return <div key={`${request.userId}_${request.courseId}`} className="card" style={{padding:18}}>
              <div style={{display:'flex',justifyContent:'space-between',gap:12,alignItems:'flex-start'}}>
                <div>
                  <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>{course?.title||'Курс не найден'}</div>
                  <div style={{fontSize:12,color:'var(--tx2)',marginBottom:6}}>
                    {member?`${member.firstName} ${member.lastName} · ${member.email}`:'Сотрудник не найден'}
                  </div>
                  <div style={{fontSize:11,color:'var(--tx3)'}}>Запрос отправлен {request.requestedAt?new Date(request.requestedAt).toLocaleString('ru-RU'):'—'}</div>
                </div>
                <span className="rbdg" style={{background:'#fff8e0',color:'#b7791f'}}>Ожидает подтверждения</span>
              </div>
              <div style={{display:'flex',gap:8,marginTop:14}}>
                <button className="btn btn-ok btn-sm" onClick={()=>decideRequest(request,'active')}>✅ Подтвердить</button>
                <button className="btn btn-d btn-sm" onClick={()=>decideRequest(request,'rejected')}>❌ Отклонить</button>
              </div>
            </div>;
          })}
        </div>
    )}
    {tab==='leaderboard'&&<Leaderboard/>}
    <Modal open={showAssign} title="Назначить курс" onClose={()=>setShowAssign(false)} footer={<><button className="btn btn-g" onClick={()=>setShowAssign(false)}>Отмена</button><button className="btn btn-p" onClick={doAssign}>Назначить</button></>}>
      <div className="fg"><label className="fl">Сотрудник</label><select className="fi" value={assignUser} onChange={e=>setAssignUser(e.target.value)}><option value="">Выберите...</option>{users.map(u=><option key={u.id} value={u.id}>{u.firstName} {u.lastName} ({u.email})</option>)}</select></div>
      <div className="fg"><label className="fl">Курс</label><select className="fi" value={assignCourse} onChange={e=>setAssignCourse(e.target.value)}><option value="">Выберите...</option>{courses.map(c=><option key={c.id} value={c.id}>{c.title}</option>)}</select></div>
    </Modal>
  </div>);
}

// ---- ANALYTICS ----
function AnalyticsPage(){
  const{user}=useApp();
  const users=S.g('users',[]);
  const courses=S.g('courses',[]);
  const enrs=S.g('enrollments',[]);
  const totalEnrs=enrs.length;
  const completedEnrs=enrs.filter(e=>e.status==='completed').length;
  const completionRate=totalEnrs>0?Math.round((completedEnrs/totalEnrs)*100):0;
  const avgProgress=totalEnrs>0?Math.round(enrs.reduce((s,e)=>s+e.progress,0)/totalEnrs):0;

  // Course stats
  const courseStats=courses.filter(c=>c.status==='published').map(c=>{
    const ce=enrs.filter(e=>e.courseId===c.id);
    const done=ce.filter(e=>e.status==='completed').length;
    const avg=ce.length>0?Math.round(ce.reduce((s,e)=>s+e.progress,0)/ce.length):0;
    return{...c,enrolled:ce.length,done,avg};
  }).sort((a,b)=>b.enrolled-a.enrolled);

  // Activity by role
  const roleStats=Object.entries(ROLE_MAP).map(([key,label])=>{
    const roleUsers=users.filter(u=>u.role===key);
    const roleEnrs=enrs.filter(e=>roleUsers.some(u=>u.id===e.userId));
    const avg=roleEnrs.length>0?Math.round(roleEnrs.reduce((s,e)=>s+e.progress,0)/roleEnrs.length):0;
    return{role:label,count:roleUsers.length,avg,enrs:roleEnrs.length};
  });

  return(<div>
    <h1 style={{fontSize:22,fontWeight:700,marginBottom:4}}>Аналитика</h1>
    <p style={{fontSize:12,color:'var(--tx2)',marginBottom:18}}>Статистика платформы обучения</p>
    <div className="grid4" style={{marginBottom:20}}>
      <div className="stat"><div className="stat-i" style={{background:'var(--pbg)',color:'var(--p)'}}>👥</div><div className="stat-v">{users.length}</div><div className="stat-l">Пользователей</div></div>
      <div className="stat"><div className="stat-i" style={{background:'#e6f9f0',color:'var(--ok)'}}>📊</div><div className="stat-v" style={{color:'var(--ok)'}}>{completionRate}%</div><div className="stat-l">Завершаемость</div></div>
      <div className="stat"><div className="stat-i" style={{background:'#e8f4fd',color:'var(--info)'}}>📈</div><div className="stat-v">{avgProgress}%</div><div className="stat-l">Ср. прогресс</div></div>
      <div className="stat"><div className="stat-i" style={{background:'#fff3e0',color:'var(--warn)'}}>📚</div><div className="stat-v">{totalEnrs}</div><div className="stat-l">Записей на курсы</div></div>
    </div>

    <div className="grid2" style={{marginBottom:20}}>
      <div>
        <div className="sec-h"><h2 className="sec-t">Популярные курсы</h2></div>
        <div className="card" style={{overflow:'hidden'}}>
          {courseStats.map((c,i)=><div key={c.id} style={{padding:'12px 16px',borderBottom:'1px solid var(--bg3)',display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:36,height:36,borderRadius:8,background:c.coverGradient,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>{c.icon||'📚'}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:500,fontSize:13}}>{c.title}</div>
              <div style={{display:'flex',gap:12,fontSize:11,color:'var(--tx2)',marginTop:2}}>
                <span>👥 {c.enrolled}</span><span>✅ {c.done}</span><span>📊 {c.avg}%</span>
              </div>
            </div>
            <div style={{width:80}}><PBar v={c.avg} c={c.avg>70?'var(--ok)':c.avg>40?'var(--warn)':'var(--err)'}/></div>
          </div>)}
        </div>
      </div>
      <div>
        <div className="sec-h"><h2 className="sec-t">Активность по ролям</h2></div>
        <div className="card" style={{overflow:'hidden'}}>
          {roleStats.map(r=><div key={r.role} style={{padding:'14px 16px',borderBottom:'1px solid var(--bg3)'}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <span style={{fontWeight:500,fontSize:13}}>{r.role}</span>
              <span style={{fontSize:12,color:'var(--tx2)'}}>{r.count} чел. · {r.enrs} записей</span>
            </div>
            <PBar v={r.avg} c="var(--p)"/><div style={{fontSize:11,color:'var(--tx2)',marginTop:3}}>Ср. прогресс: {r.avg}%</div>
          </div>)}
        </div>
        <div style={{marginTop:16}}>
          <div className="sec-h"><h2 className="sec-t">Топ по XP</h2></div>
          <Leaderboard compact/>
        </div>
      </div>
    </div>
  </div>);
}

// ---- ADMIN USERS (with edit) ----
function AdminUsersPage(){
  const{toast:addToast}=useApp();
  const[users,setUsers]=useState(S.g('users',[]));
  const[roles,setRoles]=useState(S.g('roles',[]));
  const[show,setShow]=useState(false);
  const[editUser,setEditUser]=useState(null);
  const[f,setF]=useState({fn:'',ln:'',em:'',pw:'',role:'employee',mid:''});

  // Real-time Firebase listeners: keep users+roles in sync across all tabs/devices
  useEffect(()=>{
    const unsubUsers=window.fbWatch('users',arr=>{ if(arr)setUsers(arr); });
    const unsubRoles=window.fbWatch('roles',arr=>{ if(arr)setRoles(arr); });
    return()=>{ unsubUsers(); unsubRoles(); };
  },[]);

  const openAdd=()=>{setEditUser(null);setF({fn:'',ln:'',em:'',pw:'',role:'employee',mid:''});setShow(true)};
  const openEdit=(u)=>{setEditUser(u);setF({fn:u.firstName,ln:u.lastName,em:u.email,pw:'',role:u.role,mid:u.managerId||''});setShow(true)};

  const submit=()=>{
    if(!f.fn||!f.em){addToast('err','Заполните имя и email');return}
    if(editUser){
      // Update in place + targeted Firebase write
      const updated={...editUser,firstName:f.fn,lastName:f.ln,email:f.em,role:f.role,managerId:f.mid||null};
      const newList=users.map(x=>x.id===editUser.id?updated:x);
      setUsers(newList);
      localStorage.setItem('lh_users',JSON.stringify(newList));
      window.fbSaveUser(updated); // Targeted single-record write
      addToast('ok','Пользователь обновлён');
    }else{
      if(!f.pw){addToast('err','Задайте пароль для нового пользователя');return}
      const nu={id:'u'+Date.now(),firstName:f.fn,lastName:f.ln,email:f.em,password:f.pw,role:f.role,managerId:f.mid||null,xp:0,level:1,createdAt:new Date().toISOString()};
      const newList=[...users,nu];
      setUsers(newList);
      localStorage.setItem('lh_users',JSON.stringify(newList));
      window.fbSaveUser(nu); // Targeted single-record write
      addToast('ok','Пользователь добавлен');
    }
    setShow(false);
  };

  const del=(id)=>{
    if(!confirm('Удалить пользователя?'))return;
    const newList=users.filter(x=>x.id!==id);
    setUsers(newList);
    localStorage.setItem('lh_users',JSON.stringify(newList));
    window.fbDeleteUser(id); // Targeted single-record delete
    // Also unlink any subordinates
    const unlinked=newList.map(x=>x.managerId===id?{...x,managerId:null}:x);
    if(unlinked.some((x,i)=>x!==newList[i])){
      setUsers(unlinked);
      localStorage.setItem('lh_users',JSON.stringify(unlinked));
      unlinked.forEach(x=>{ if(users.find(u=>u.id===x.id)?.managerId===id) window.fbSaveUser(x); });
    }
    addToast('ok','Пользователь удалён');
  };

  const managers=users.filter(u=>u.role==='admin'||u.role==='manager');
  return(<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
      <div><h1 style={{fontSize:22,fontWeight:700}}>Пользователи</h1><p style={{fontSize:12,color:'var(--tx2)',marginTop:3}}>{users.length} чел. · синхронизировано с Firebase</p></div>
      <button className="btn btn-p" onClick={openAdd}>+ Пригласить</button>
    </div>
    <table className="tbl"><thead><tr><th>Пользователь</th><th>Email</th><th>Роль</th><th>Руководитель</th><th>XP</th><th>Подчинённые</th><th></th></tr></thead>
    <tbody>{users.map(u=>{
      const mgr=users.find(x=>x.id===u.managerId);
      const r=roles.find(x=>x.name===(ROLE_MAP[u.role]||u.role));
      const subs=users.filter(x=>x.managerId===u.id);
      return<tr key={u.id}><td style={{display:'flex',alignItems:'center',gap:8}}>
        <div style={{width:32,height:32,borderRadius:'50%',background:'var(--pbg)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--p)',fontSize:11,fontWeight:700,flexShrink:0}}>{u.firstName[0]}{u.lastName?.[0]||''}</div>
        <div><div style={{fontWeight:500}}>{u.firstName} {u.lastName}</div>{u.createdAt&&<div style={{fontSize:10,color:'var(--tx3)'}}>с {u.createdAt.slice(0,10)}</div>}</div></td>
        <td style={{color:'var(--tx2)'}}>{u.email}</td>
        <td><span className="rbdg" style={{background:r?.bg||'#eee',color:r?.color||'#666'}}>{ROLE_MAP[u.role]||u.role}</span></td>
        <td style={{color:'var(--tx2)'}}>{mgr?`${mgr.firstName} ${mgr.lastName?.[0]||''}.`:'—'}</td>
        <td><span style={{fontWeight:600,color:'var(--warn)'}}>⭐ {u.xp}</span></td>
        <td style={{color:'var(--tx2)',fontSize:12}}>{subs.length>0?subs.map(s=>s.firstName).join(', '):'—'}</td>
        <td><div style={{display:'flex',gap:4}}><button className="btn btn-o btn-sm" onClick={()=>openEdit(u)}>✏️</button><button className="btn btn-d btn-sm" onClick={()=>del(u.id)}>🗑️</button></div></td>
      </tr>;
    })}</tbody></table>
    <Modal open={show} title={editUser?'Редактировать пользователя':'Пригласить пользователя'} onClose={()=>setShow(false)} footer={<><button className="btn btn-g" onClick={()=>setShow(false)}>Отмена</button><button className="btn btn-p" onClick={submit}>{editUser?'Сохранить':'Добавить'}</button></>}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div className="fg"><label className="fl">Имя *</label><input className="fi" value={f.fn} onChange={e=>setF({...f,fn:e.target.value})} placeholder="Иван"/></div>
        <div className="fg"><label className="fl">Фамилия</label><input className="fi" value={f.ln} onChange={e=>setF({...f,ln:e.target.value})} placeholder="Петров"/></div>
      </div>
      <div className="fg"><label className="fl">Email *</label><input className="fi" type="email" value={f.em} onChange={e=>setF({...f,em:e.target.value})} disabled={!!editUser} placeholder="ivan@company.com"/></div>
      {!editUser&&<div className="fg"><label className="fl">Пароль *</label><input className="fi" type="text" value={f.pw} onChange={e=>setF({...f,pw:e.target.value})} placeholder="Временный пароль"/></div>}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div className="fg"><label className="fl">Роль</label><select className="fi" value={f.role} onChange={e=>setF({...f,role:e.target.value})}>
          <option value="employee">Сотрудник</option><option value="manager">Руководитель</option><option value="instructor">Инструктор</option><option value="admin">Администратор</option>
        </select></div>
        <div className="fg"><label className="fl">Руководитель</label><select className="fi" value={f.mid} onChange={e=>setF({...f,mid:e.target.value})}>
          <option value="">Без руководителя</option>{managers.filter(u=>u.id!==editUser?.id).map(u=><option key={u.id} value={u.id}>{u.firstName} {u.lastName}</option>)}
        </select></div>
      </div>
      {f.mid&&<div style={{padding:'8px 12px',background:'var(--pbg)',borderRadius:8,fontSize:12,color:'var(--p)'}}>
        👤 Будет подчинён: <strong>{managers.find(u=>u.id===f.mid)?.firstName} {managers.find(u=>u.id===f.mid)?.lastName}</strong>
      </div>}
    </Modal>
  </div>);
}

  const[show,setShow]=useState(false);
  const[editRole,setEditRole]=useState(null);
  const[f,setF]=useState({name:'',color:'#636E72',bg:'#eeeeee',perms:[]});
  const allPerms=['view_courses','complete_courses','create_courses','manage_team','manage_users','view_stats','manage_roles','settings'];
  const permLabels={view_courses:'Просмотр курсов',complete_courses:'Прохождение курсов',create_courses:'Создание курсов',manage_team:'Управление командой',manage_users:'Управление пользователями',view_stats:'Статистика',manage_roles:'Управление ролями',settings:'Настройки'};
  const COLORS=[{color:'#6C5CE7',bg:'#F0EEFF'},{color:'#0984E3',bg:'#E8F4FD'},{color:'#00B894',bg:'#e6f9f0'},{color:'#E17055',bg:'#fde8e4'},{color:'#F9CA24',bg:'#fff8e0'},{color:'#636E72',bg:'#eeeeee'}];

  // Real-time Firebase listener for roles
  useEffect(()=>{
    const unsub=window.fbWatch('roles',arr=>{ if(arr)setRoles(arr); });
    return()=>unsub();
  },[]);

  const openAdd=()=>{setEditRole(null);setF({name:'',color:'#636E72',bg:'#eeeeee',perms:[]});setShow(true)};
  const openEdit=(r)=>{setEditRole(r);setF({name:r.name,color:r.color,bg:r.bg,perms:[...r.permissions]});setShow(true)};

  const submit=()=>{
    if(!f.name){addToast('err','Введите название роли');return}
    if(editRole){
      const updated={...editRole,name:f.name,color:f.color,bg:f.bg,permissions:f.perms};
      const newList=roles.map(x=>x.id===editRole.id?updated:x);
      setRoles(newList);
      localStorage.setItem('lh_roles',JSON.stringify(newList));
      window.fbSaveRole(updated);
      addToast('ok','Роль обновлена');
    }else{
      const nr={id:'r'+Date.now(),name:f.name,permissions:f.perms,system:false,color:f.color,bg:f.bg,createdAt:new Date().toISOString()};
      const newList=[...roles,nr];
      setRoles(newList);
      localStorage.setItem('lh_roles',JSON.stringify(newList));
      window.fbSaveRole(nr);
      addToast('ok','Роль создана');
    }
    setShow(false);
  };

  const del=(id)=>{
    const r=roles.find(x=>x.id===id);
    if(r?.system){addToast('err','Нельзя удалить системную роль');return}
    if(!confirm('Удалить роль?'))return;
    const newList=roles.filter(x=>x.id!==id);
    setRoles(newList);
    localStorage.setItem('lh_roles',JSON.stringify(newList));
    window.fbDeleteRole(id);
    addToast('ok','Роль удалена');
  };

  return(<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
      <div><h1 style={{fontSize:22,fontWeight:700}}>Роли</h1><p style={{fontSize:12,color:'var(--tx2)',marginTop:3}}>{roles.length} ролей</p></div>
      <button className="btn btn-p" onClick={openAdd}>+ Создать роль</button>
    </div>
    <div className="grid2">{roles.map(r=><div key={r.id} className="card" style={{padding:20}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <span className="rbdg" style={{background:r.bg,color:r.color,fontSize:12,padding:'4px 12px'}}>{r.name}</span>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          {r.system&&<span style={{fontSize:10,color:'var(--tx3)'}}>Системная</span>}
          {!r.system&&<button className="btn btn-o btn-sm" onClick={()=>openEdit(r)}>✏️</button>}
          {!r.system&&<button className="btn btn-d btn-sm" onClick={()=>del(r.id)}>🗑️</button>}
        </div>
      </div>
      <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>{(r.permissions||[]).map(p=><span key={p} style={{fontSize:10,background:'var(--bg2)',padding:'2px 8px',borderRadius:10,color:'var(--tx2)'}}>{permLabels[p]||p}</span>)}</div>
    </div>)}</div>
    <Modal open={show} title={editRole?'Редактировать роль':'Создать роль'} onClose={()=>setShow(false)} footer={<><button className="btn btn-g" onClick={()=>setShow(false)}>Отмена</button><button className="btn btn-p" onClick={submit}>{editRole?'Сохранить':'Создать'}</button></>}>
      <div className="fg"><label className="fl">Название роли</label><input className="fi" value={f.name} onChange={e=>setF({...f,name:e.target.value})} placeholder="Например: Куратор" disabled={editRole?.system}/></div>
      <div className="fg"><label className="fl">Цвет метки</label>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:4}}>
          {COLORS.map(c=><div key={c.color} onClick={()=>setF({...f,color:c.color,bg:c.bg})} style={{width:28,height:28,borderRadius:'50%',background:c.color,cursor:'pointer',border:f.color===c.color?'3px solid var(--tx)':'3px solid transparent',transition:'.15s'}}/>)}
        </div>
      </div>
      <div style={{padding:'8px 12px',background:f.bg,borderRadius:8,marginBottom:12}}>
        <span style={{fontSize:12,color:f.color,fontWeight:600}}>{f.name||'Предпросмотр роли'}</span>
      </div>
      <div className="fg"><label className="fl">Разрешения</label>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4}}>
          {allPerms.map(p=><label key={p} style={{display:'flex',alignItems:'center',gap:6,fontSize:12,cursor:'pointer',padding:'4px 0'}}>
            <input type="checkbox" checked={f.perms.includes(p)} onChange={e=>{if(e.target.checked)setF({...f,perms:[...f.perms,p]});else setF({...f,perms:f.perms.filter(x=>x!==p)})}} style={{accentColor:'var(--p)'}}/>{permLabels[p]}
          </label>)}
        </div>
      </div>
    </Modal>
  </div>);
}

// ---- SETTINGS ----
function SettingsPage(){

  const ts=[{id:'',l:'🌈 Яркая',c:'#6C5CE7'},{id:'dark',l:'🌙 Тёмная',c:'#1E1E2E'},{id:'corporate',l:'💼 Корпоратив',c:'#0984E3'},{id:'warm',l:'🔥 Тёплая',c:'#E17055'}];
  const[gasUrl,setGasUrlLocal]=useState(window.LH_GAS_URL||'');
  const saveGasUrl=()=>{
    const url=gasUrl.trim();
    window.LH_GAS_URL=url;
    try{ localStorage.setItem('lh_gasUrl',url); }catch(e){}
    addToast('ok','GAS URL сохранён');
  };
  const resetData=()=>{if(!confirm('Сбросить все данные? Это действие необратимо.'))return;localStorage.clear();location.reload()};
  return(<div>
    <h1 style={{fontSize:22,fontWeight:700,marginBottom:18}}>Настройки</h1>
    <div className="card" style={{padding:20,marginBottom:16}}>
      <h3 style={{fontSize:15,fontWeight:600,marginBottom:14}}>🎨 Тема оформления</h3>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
        {ts.map(t=><button key={t.id} className={`btn ${theme===t.id?'btn-p':'btn-o'}`} style={{justifyContent:'center'}} onClick={()=>setTheme(t.id)}>{t.l}</button>)}
      </div>
    </div>
    <div className="card" style={{padding:20,marginBottom:16}}>
      <h3 style={{fontSize:15,fontWeight:600,marginBottom:14}}>☁️ Google Apps Script (хранилище курсов)</h3>
      <p style={{fontSize:12,color:'var(--tx2)',marginBottom:12}}>URL скрипта для резервного хранения курсов. Если не указан, курсы хранятся только в Firebase и localStorage.</p>
      <div className="fg"><label className="fl">GAS URL</label><input className="fi" value={gasUrl} onChange={e=>setGasUrlLocal(e.target.value)} placeholder="https://script.google.com/macros/s/.../exec"/></div>
      <button className="btn btn-p btn-sm" onClick={saveGasUrl}>Сохранить URL</button>
    </div>
    <div className="card" style={{padding:20,marginBottom:16}}>
      <h3 style={{fontSize:15,fontWeight:600,marginBottom:14}}>👤 Профиль</h3>
      <div className="fg"><label className="fl">Имя</label><input className="fi" value={user.firstName} onChange={e=>{const u={...user,firstName:e.target.value};setUser(u);S.s('currentUser',u);const users=S.g('users',[]).map(x=>x.id===u.id?{...x,firstName:u.firstName}:x);S.s('users',users)}}/></div>
      <div className="fg"><label className="fl">Фамилия</label><input className="fi" value={user.lastName} onChange={e=>{const u={...user,lastName:e.target.value};setUser(u);S.s('currentUser',u);const users=S.g('users',[]).map(x=>x.id===u.id?{...x,lastName:u.lastName}:x);S.s('users',users)}}/></div>
      <div className="fg"><label className="fl">Email</label><input className="fi" value={user.email} disabled style={{opacity:.6}}/></div>
    </div>
    <div className="card" style={{padding:20,borderLeft:'3px solid var(--err)'}}>
      <h3 style={{fontSize:15,fontWeight:600,marginBottom:8,color:'var(--err)'}}>⚠️ Опасная зона</h3>
      <p style={{fontSize:12,color:'var(--tx2)',marginBottom:12}}>Сброс удалит все данные и вернёт систему к начальному состоянию</p>
      <button className="btn btn-d" onClick={resetData}>Сбросить все данные</button>
    </div>
  </div>);
}

// ---- LOGIN ----
function LoginPage({onLogin,onRegister}){
  const[mode,setMode]=useState('login');
  const[email,setEmail]=useState('');
  const[pw,setPw]=useState('');
  const[firstName,setFirstName]=useState('');
  const[lastName,setLastName]=useState('');
  const[confirmPassword,setConfirmPassword]=useState('');
  const[err,setErr]=useState('');
  const submit=()=>{
    if(mode==='login'){
      if(onLogin(email,pw)){setErr('')}
      else setErr('Пользователь не найден или пароль неверный');
      return;
    }
    const result=onRegister({firstName,lastName,email,password:pw,confirmPassword});
    if(result?.ok){setErr('');return;}
    setErr(result?.message||'Не удалось зарегистрироваться');
  };
  return(<div className="login-pg">
    <div className="login-c">
      <div style={{display:'flex',alignItems:'center',gap:10,justifyContent:'center',marginBottom:28}}>
        <div className="logo-icon" style={{width:48,height:48,fontSize:22,borderRadius:14}}>L</div>
        <span style={{fontSize:24,fontWeight:700,color:'var(--p)'}}>LearnHub</span>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:18}}>
        <button className={`btn ${mode==='login'?'btn-p':'btn-o'}`} style={{flex:1,justifyContent:'center'}} onClick={()=>{setMode('login');setErr('')}}>Вход</button>
        <button className={`btn ${mode==='register'?'btn-p':'btn-o'}`} style={{flex:1,justifyContent:'center'}} onClick={()=>{setMode('register');setErr('')}}>Регистрация</button>
      </div>
      <div style={{textAlign:'center',fontSize:20,fontWeight:700,marginBottom:6}}>{mode==='login'?'Вход в систему':'Регистрация'}</div>
      <div style={{textAlign:'center',fontSize:13,color:'var(--tx2)',marginBottom:28}}>Портал обучения IT-менеджеров</div>
      {mode==='register'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div className="fg"><label className="fl">Имя</label><input className="fi" value={firstName} onChange={e=>setFirstName(e.target.value)} placeholder="Иван"/></div>
        <div className="fg"><label className="fl">Фамилия</label><input className="fi" value={lastName} onChange={e=>setLastName(e.target.value)} placeholder="Петров"/></div>
      </div>}
      <div className="fg"><label className="fl">Email</label><input className="fi" type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="dmitry@company.com"/></div>
      <div className="fg"><label className="fl">Пароль</label><input className="fi" type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder={mode==='login'?'Ваш пароль':'Минимум 4 символа'}/></div>
      {mode==='register'&&<div className="fg"><label className="fl">Подтверждение пароля</label><input className="fi" type="password" value={confirmPassword} onChange={e=>setConfirmPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="Повторите пароль"/></div>}
      {err&&<p style={{color:'var(--err)',fontSize:13,marginBottom:12}}>{err}</p>}
      <button className="btn btn-p" style={{width:'100%',padding:11,marginTop:4}} onClick={submit}>{mode==='login'?'Войти':'Создать аккаунт'}</button>
      {mode==='login'&&<button className="btn btn-o" style={{width:'100%',padding:11,marginTop:8}} onClick={()=>{setEmail('dmitry@company.com');setPw('demo')}}>Заполнить демо-данные</button>}
      <p style={{textAlign:'center',marginTop:18,fontSize:12,color:'var(--tx2)'}}>{mode==='login'?'Демо: dmitry@company.com / demo':'После регистрации аккаунт будет создан сразу, без приглашения.'}</p>
    </div>
  </div>);
}

// ---- MAIN APP ----
function App(){
  const[loggedIn,setLoggedIn]=useState(!!S.g('currentUser'));
  const[user,setUser]=useState(S.g('currentUser',null));
  const[page,setPage]=useState('dash');
  const[theme,setThemeState]=useState(S.g('theme',''));
  const[mini,setMini]=useState(false);
  const[toasts,setToasts]=useState([]);

  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);S.s('theme',theme)},[theme]);

  const toast=(type,msg)=>{const id=Date.now();setToasts(p=>[...p,{id,type,msg}]);setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3500)};
  const go=(p)=>setPage(p);
  const setTheme=(t)=>setThemeState(t);
  const login=(email,pw)=>{
    const users=S.g('users',[]);
    const normalizedEmail=String(email||'').trim().toLowerCase();
    const u=users.find(x=>String(x.email||'').trim().toLowerCase()===normalizedEmail);
    if(!u) return false;
    // If user has a password set, check it; seed users (no password field) always pass
    if(u.password && u.password!==pw) return false;
    setUser(u);S.s('currentUser',u);setLoggedIn(true);toast('ok','Добро пожаловать, '+u.firstName+'!');return true;
  };
  const register=({firstName,lastName,email,password,confirmPassword})=>{
    const users=getAllUsers();
    const normalizedEmail=String(email||'').trim().toLowerCase();
    if(!firstName.trim()) return {ok:false,message:'Введите имя'};
    if(!lastName.trim()) return {ok:false,message:'Введите фамилию'};
    if(!isValidEmail(normalizedEmail)) return {ok:false,message:'Введите корректный email'};
    if(password.length<4) return {ok:false,message:'Пароль должен быть не короче 4 символов'};
    if(password!==confirmPassword) return {ok:false,message:'Пароли не совпадают'};
    if(users.some(item=>normalizeLogin(item.email)===normalizedEmail)) return {ok:false,message:'Пользователь с таким email уже существует'};
    const newUser={
      id:generateId('u'),
      firstName:firstName.trim(),
      lastName:lastName.trim(),
      email:normalizedEmail,
      password,
      role:'employee',
      managerId:null,
      xp:0,
      level:1,
      createdAt:new Date().toISOString()
    };
    const next=[...users,newUser];
    S.s('users',next);
    try{window.fbSaveUser(newUser)}catch(e){}
    setUser(newUser);
    S.s('currentUser',newUser);
    setLoggedIn(true);
    toast('ok','Аккаунт создан');
    return {ok:true};
  };
  const logout=()=>{S.s('currentUser',null);setUser(null);setLoggedIn(false);setPage('dash')};

  const ctx=useMemo(()=>({user,setUser,page,go,theme,setTheme,mini,setMini,toasts,toast,logout}),[user,page,theme,mini,toasts]);

  if(!loggedIn)return<CTX.Provider value={ctx}><LoginPage onLogin={login} onRegister={register}/><div className="toast-c">{toasts.map(t=><div key={t.id} className={`toast toast-${t.type}`}>{t.type==='ok'?'✅':t.type==='err'?'❌':'ℹ️'} {t.msg}</div>)}</div></CTX.Provider>;

  // Route
  let content;
  if(page==='dash')content=<DashPage/>;
  else if(page==='catalog')content=<CatalogPage/>;
  else if(page==='mycourses')content=<MyCoursesPage/>;
  else if(page==='achievements'||page==='profile')content=<ProfilePage/>;
  else if(page==='constructor')content=<ConstructorPage/>;
  else if(page==='team')content=<TeamPage/>;
  else if(page==='analytics')content=<AnalyticsPage/>;
  else if(page==='reviews')content=<ReviewsPage/>;
  else if(page==='admin-users')content=<AdminUsersPage/>;
  else if(page==='admin-roles')content=<AdminRolesPage/>;
  else if(page==='settings')content=<SettingsPage/>;
  else if(page.startsWith('cv_'))content=<CourseViewer courseId={page.replace('cv_','')}/>;
  else if(page.startsWith('cert_'))content=<CertificatePage courseId={page.replace('cert_','')}/>;
  else content=<DashPage/>;

  return(<CTX.Provider value={ctx}>
    <Navbar/>
    <div className="app-body">
      <Sidebar/>
      <main className="main">{content}</main>
    </div>
    <div className="toast-c">{toasts.map(t=><div key={t.id} className={`toast toast-${t.type}`}>{t.type==='ok'?'✅':t.type==='err'?'❌':'ℹ️'} {t.msg}</div>)}</div>
  </CTX.Provider>);
}

// Sync Firebase → localStorage, then seed demo data if needed, then render
(async function(){
  try{ await window.fbSync(); }catch(e){ console.warn('[LearnHub] Initial fbSync failed:', e); }
  try{ await hydrateCriticalLearningData(); }catch(e){ console.warn('[LearnHub] Initial hydration failed:', e); }
  try{ seedData(); }catch(e){ console.warn('[LearnHub] Seed failed:', e); }
  try{ await hydrateCriticalLearningData(); }catch(e){ console.warn('[LearnHub] Post-seed hydration failed:', e); }
  try{
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  }catch(e){
    console.error('[LearnHub] Render failed:', e);
    document.getElementById('root').innerHTML = '<div style="padding:32px;font-family:Inter,sans-serif;color:#1f2937"><h1 style="font-size:24px;margin:0 0 12px">LearnHub</h1><p style="margin:0 0 8px">Портал не смог инициализироваться автоматически.</p><p style="margin:0;color:#6b7280">Очистите локальные ключи <code>lh_*</code> для этого домена и перезагрузите страницу.</p></div>';
  }
})();
</script>

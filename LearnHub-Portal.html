  if(!course)return<div className="empty"><div className="empty-i">❌</div><div className="empty-t">Курс не найден</div></div>;
  if(!enrollment)return<div className="empty"><div className="empty-i">📚</div><div className="empty-t">Вы не записаны на этот курс</div><button className="btn btn-g" onClick={()=>go('catalog')}>← В каталог</button></div>;
  if(enrollment.status==='pending')return<div className="empty"><div className="empty-i">⏳</div><div className="empty-t">Запись ожидает подтверждения</div><div className="empty-d">После одобрения курс появится в активных.</div><button className="btn btn-g" onClick={()=>go('mycourses')}>← Мои курсы</button></div>;
  if(enrollment.status==='rejected')return<div className="empty"><div className="empty-i">❌</div><div className="empty-t">Запись на курс отклонена</div><div className="empty-d">Можно подать новую заявку из каталога.</div><button className="btn btn-g" onClick={()=>go('catalog')}>← В каталог</button></div>;
  if(allSteps.length===0)return<div className="empty"><div className="empty-i">📝</div><div className="empty-t">В курсе пока нет шагов</div><button className="btn btn-g" onClick={()=>go('mycourses')}>← Назад</button></div>;
  const step=allSteps[Math.min(stepIdx,allSteps.length-1)];
  const stepRecord=getStepAnswerRecord(user.id,courseId,step.id,stepAnswers);
  const questionPayload=isQuestionStepType(step.type)?buildQuestionPayload(step.type,step.content):null;
  const isDone=(sid)=>!!getStepProgressRecord(user.id,courseId,sid,sp);
  const completedCount=allSteps.filter(item=>isDone(item.id)).length;
  const allStepsDone=completedCount>=allSteps.length;
  const hasFinalExam=course.finalExam?.enabled&&course.finalExam?.questions?.length>0;
  const progress=Math.round((completedCount/allSteps.length)*100);
  const questionLocked=!!(stepRecord?.submitted||stepRecord?.skipped);
  const questionStatus=getStepAnswerStatus(stepRecord);

  const addXP=(pts)=>{const us=S.g('users',[]).map(u2=>u2.id===user.id?{...u2,xp:(u2.xp||0)+pts}:u2);S.s('users',us)};
  const getYT=(url)=>{const m=(url||'').match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/);return m?`https://www.youtube-nocookie.com/embed/${m[1]}?rel=0&modestbranding=1&playsinline=1`:null};
  const notifyCourseCompleted=()=>{
    addToast('ok','🎉 Курс пройден! +50 XP');
    addXP(50);
    const notifications=S.g('notifications',[]);
    notifications.unshift({id:'n'+Date.now(),text:`Курс "${course.title}" завершён!`,icon:'🎓',time:'только что',read:false});
    S.s('notifications',notifications);
  };
  const updateEnrollmentProgress=(nextProgress)=>{
    const courseCompleted=nextProgress>=100&&!hasFinalExam;
    const nextEnrollments=upsertEnrollmentRecord({
      userId:user.id,
      courseId,
      progress:nextProgress,
      status:courseCompleted?'completed':'active',
      completedAt:courseCompleted?new Date().toISOString():undefined
    });
    if(courseCompleted&&!enrollment.completedAt) notifyCourseCompleted();
    return {courseCompleted,nextEnrollments};
  };
  const completeCurrentStep=(score)=>{
    const alreadyDone=isDone(step.id);
    const nextProgressRecords=upsertStepProgressRecord({userId:user.id,courseId,stepId:step.id,status:'completed',score:score??100},sp);
    setSp(nextProgressRecords);
    if(!alreadyDone) addXP(step.points||10);
    const nextCount=allSteps.filter(item=>getStepProgressRecord(user.id,courseId,item.id,nextProgressRecords)).length;
    const nextProgress=Math.round((nextCount/allSteps.length)*100);
    const {courseCompleted}=updateEnrollmentProgress(nextProgress);
    return {nextCount,nextProgress,courseCompleted};
  };
  const goNext=()=>{
    if(stepIdx<allSteps.length-1){setStepIdx(stepIdx+1);return;}
    if(hasFinalExam&&allStepsDone){setShowExam(true);return;}
    go('cert_'+courseId);
  };
  const buildSubmissionRecord=(content,type='step_answer',score=null)=>({
    id:'sub'+Date.now(),
    userId:user.id,
    courseId,
    stepId:step.id,
    stepTitle:step.title,
    courseTitle:course.title,
    type,
    content,
    score,
    status:'pending',
    managerId:user.managerId||null,
    submittedAt:new Date().toISOString(),
    reviewedAt:null,
    reviewNote:''
  });
  const pushSubmission=(record)=>{
    const next=[...S.g('submissions',[]),record];
    S.s('submissions',next);
  };
  const submitCurrentAnswer=()=>{
    if(!questionPayload)return;
    if(step.type==='open'||step.type==='ai'){
      if(!textAnswer.trim()){addToast('err','Введите ответ');return;}
    }else{
      if(normalizeSelectedKeys(selectedKeys).length===0){addToast('err','Выберите ответ');return;}
    }
    if(!confirm('Подтвердить ответ? После сохранения он не сбросится при переходе назад.')) return;
    let correct=null;
    if(step.type==='quiz'||step.type==='exam') correct=isAnswerSelectionCorrect(questionPayload,selectedKeys);
    const nextAnswers=upsertStepAnswerRecord({
      userId:user.id,
      courseId,
      stepId:step.id,
      selectedKeys:normalizeSelectedKeys(selectedKeys),
      textAnswer:textAnswer.trim(),
      submitted:true,
      skipped:false,
      correct
    },stepAnswers);
    setStepAnswers(nextAnswers);
    if(step.type==='ai'){
      pushSubmission(buildSubmissionRecord(textAnswer.trim(),'step_answer',null));
      addToast('ok','Ответ отправлен на проверку');
    }else if(step.type==='open'){
      addToast('ok','Ответ сохранён');
    }else if(step.type==='survey'){
      addToast('ok','Ответ в опросе сохранён');
    }else{
      addToast(correct?'ok':'info',correct?'Ответ сохранён: верно':'Ответ сохранён: есть ошибка');
    }
    completeCurrentStep(correct===false?0:100);
  };
  const skipCurrentQuestion=()=>{
    if(!confirm('Пропустить вопрос? Его можно будет открыть позже, но шаг будет отмечен как пропущенный.')) return;
    const nextAnswers=upsertStepAnswerRecord({
      userId:user.id,
      courseId,
      stepId:step.id,
      selectedKeys:[],
      textAnswer:'',
      submitted:false,
      skipped:true,
      correct:null
    },stepAnswers);
    setStepAnswers(nextAnswers);
    completeCurrentStep(0);
    addToast('info','Вопрос пропущен');
    goNext();
  };
  const getQuestionTip=()=>{
    if(!stepRecord) return '';
    if(stepRecord.skipped) return 'Вопрос пропущен';
    if(step.type==='survey') return 'Ответ на опрос сохранён';
    if(step.type==='open') return 'Открытый ответ сохранён';
    if(step.type==='ai') return 'Ответ отправлен на проверку';
    return stepRecord.correct?'Верный ответ':'Ответ сохранён, но есть ошибка';
  };
  const goToStep=(index)=>setStepIdx(index);

  useEffect(()=>{
    if(!step||!isQuestionStepType(step.type)){
      setSelectedKeys([]);
      setTextAnswer('');
      return;
    }
    const record=getStepAnswerRecord(user.id,courseId,step.id,getAllStepAnswers());
    setSelectedKeys(record?.selectedKeys||[]);
    setTextAnswer(record?.textAnswer||'');
  },[step?.id,user.id,courseId,step?.type]);

  // Send to manager
  const sendToManager=()=>{
    if(!user.managerId){addToast('err','Руководитель не назначен');setSendModal(false);return}
    pushSubmission({...buildSubmissionRecord(sendComment||'Ответ отправлен на проверку'),managerId:user.managerId});
    addToast('ok','✅ Отправлено руководителю');setSendModal(false);setSendComment('');
  };

  // Final Exam submit
  const submitExam=()=>{
    if(!confirm('Подтвердить ответы финального экзамена?')) return;
    const qs=course.finalExam.questions;let total=0,earned=0;
    qs.forEach(q=>{
      total+=q.points||10;const ans=examAnswers[q.id];
      if(q.questionType==='single'){
        if(q.options.find(o=>o.isCorrect)?.id===ans) earned+=q.points||10;
      }else{
        const cor=new Set(q.options.filter(o=>o.isCorrect).map(o=>String(o.id)));
        const sel2=new Set(normalizeSelectedKeys(ans));
        let ok=cor.size===sel2.size;
        for(const c of cor){if(!sel2.has(c)){ok=false;break}}
        if(ok) earned+=q.points||10;
      }
    });
    const pct=total>0?Math.round((earned/total)*100):0;
    setExamScore(pct);setExamDone(true);
    pushSubmission({
      id:'sub'+Date.now(),
      userId:user.id,
      courseId,
      stepId:null,
      stepTitle:'Финальный экзамен',
      courseTitle:course.title,
      type:'exam_result',
      content:`Результат: ${pct}%`,
      score:pct,
      status:'pending',
      managerId:user.managerId||null,
      submittedAt:new Date().toISOString(),
      reviewedAt:null,
      reviewNote:''
    });
    if(pct>=course.finalExam.passingScore){
      upsertEnrollmentRecord({userId:user.id,courseId,progress:100,status:'completed',completedAt:new Date().toISOString()});
      addXP(50);addToast('ok','🎉 Экзамен сдан! Результат отправлен руководителю');
    }else{addToast('info','📋 Экзамен не сдан. Результат отправлен руководителю')}
  };

  // ---- EXAM SCREEN ----
  if(showExam){
    const qs=course.finalExam.questions;
    return(<div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 64px)',margin:'-24px -28px'}}>
      <div className="con-bar">
        <button className="btn btn-g btn-sm" onClick={()=>setShowExam(false)}>← Назад к шагам</button>
        <span style={{fontWeight:600,fontSize:14}}>Финальный экзамен — {course.title}</span>
        <span style={{fontSize:12,color:'var(--tx2)'}}>Проходной балл: {course.finalExam.passingScore}%</span>
      </div>
      <div style={{flex:1,overflowY:'auto'}}><div style={{maxWidth:720,margin:'0 auto',padding:28}}>
        {!examDone?<>
          <div style={{background:'linear-gradient(135deg,var(--p),var(--s,#00CEC9))',color:'#fff',borderRadius:12,padding:'24px 28px',marginBottom:24,position:'relative',overflow:'hidden'}}>
          <div style={{fontSize:22,fontWeight:700,marginBottom:4}}>🎓 Финальный экзамен</div>
          <div style={{fontSize:13,opacity:.9}}>{qs.length} вопросов · Проходной балл {course.finalExam.passingScore}%{course.finalExam.timeLimit?` · ${course.finalExam.timeLimit} мин`:''}</div>
          </div>
          {qs.map((q,qi)=><div key={q.id} className="quiz-b" style={{marginBottom:16}}>
            <div className="quiz-q">{qi+1}. {q.question}</div>
            <div className="quiz-tip" style={{marginBottom:8}}>{getQuestionModeLabel(q.questionType)}</div>
            {q.options.map(o=>{
              const isSel=q.questionType==='single'?String(examAnswers[q.id])===String(o.id):(normalizeSelectedKeys(examAnswers[q.id]).includes(String(o.id)));
              return<div key={o.id} className={`quiz-o ${isSel?'sel':''}`} onClick={()=>{
                if(q.questionType==='single')setExamAnswers({...examAnswers,[q.id]:String(o.id)});
                else{
                  const cur=normalizeSelectedKeys(examAnswers[q.id]);
                  setExamAnswers({...examAnswers,[q.id]:isSel?cur.filter(x=>x!==String(o.id)):[...cur,String(o.id)]});
                }
              }}><div className="quiz-r"/>{o.text}</div>})}
          </div>)}
          <button className="btn btn-p" style={{width:'100%',padding:12,fontSize:15}} onClick={submitExam}>Завершить экзамен</button>
        </>:<div style={{textAlign:'center',padding:'40px 0'}}>
          <div style={{fontSize:64,marginBottom:16}}>{examScore>=course.finalExam.passingScore?'🎉':'😔'}</div>
          <div style={{fontSize:52,fontWeight:800,color:examScore>=course.finalExam.passingScore?'var(--ok)':'var(--err)',marginBottom:8}}>{examScore}%</div>
          <div style={{fontSize:18,fontWeight:700,marginBottom:6}}>{examScore>=course.finalExam.passingScore?'Экзамен сдан!':'Экзамен не сдан'}</div>
          <div style={{fontSize:13,color:'var(--tx2)',marginBottom:24}}>Проходной балл: {course.finalExam.passingScore}% · Результат отправлен руководителю</div>
          <div style={{display:'flex',gap:12,justifyContent:'center'}}>
            {examScore>=course.finalExam.passingScore&&<button className="btn btn-p" onClick={()=>go('cert_'+courseId)}>🎓 Получить сертификат</button>}
            <button className="btn btn-o" onClick={()=>{setExamDone(false);setExamAnswers({})}}>Попробовать снова</button>
          </div>
        </div>}
      </div></div>
    </div>);
  }

  return(<div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 64px)',margin:'-24px -28px'}}>
    <div className="con-bar">
      <button className="btn btn-g btn-sm" onClick={()=>go('mycourses')}>← Мои курсы</button>
      <span style={{fontWeight:600,fontSize:14}}>{course.title}</span>
      <div style={{display:'flex',alignItems:'center',gap:10}}><span style={{fontSize:12,color:'var(--tx2)'}}>{completedCount}/{allSteps.length}</span><div style={{width:100}}><PBar v={progress}/></div></div>
    </div>
    <div className="cv" style={{flex:1}}>
      <div className="cv-side">
        {course.modules?.map(m=><div key={m.id}>
          <div className="cv-mh">📁 {m.title}</div>
          {m.lessons?.map(l=>l.steps?.map(s=>{
            const idx=allSteps.findIndex(x=>x.id===s.id);
            const isCur=stepIdx===idx;
            const isOk=isDone(s.id);
            const answerState=getStepAnswerStatus(getStepAnswerRecord(user.id,courseId,s.id,stepAnswers));
            return<div key={s.id} className={`cv-st ${isCur?'on':''} ${isOk?'done':''}`} onClick={()=>goToStep(idx)}>
              <div className={`cv-ck ${isOk?'ok':''} ${isCur?'cur':''}`}>{isOk?'✓':isCur?'●':''}</div>
              <span style={{display:'flex',alignItems:'center',gap:8,flex:1}}>
                <span>{ICONS[s.type]||'📝'} {s.title}</span>
                {answerState==='ok'&&<span className="step-state ok">✓</span>}
                {answerState==='no'&&<span className="step-state no">✕</span>}
                {answerState==='skip'&&<span className="step-state skip">↷</span>}
              </span>
            </div>}))}
        </div>)}
        {hasFinalExam&&<div className={`cv-st ${allStepsDone?'':'lock'}`} style={{borderTop:'1px solid var(--bg3)',fontWeight:600,color:allStepsDone?'var(--p)':'var(--tx3)',cursor:allStepsDone?'pointer':'not-allowed'}} onClick={()=>allStepsDone&&setShowExam(true)}>
          <div className="cv-ck" style={{borderColor:allStepsDone?'var(--p)':'var(--bg3)'}}>{allStepsDone?'🎓':'🔒'}</div>
          <span>Финальный экзамен{!allStepsDone?' (недоступен)':''}</span>
        </div>}
      </div>
      <div className="cv-main"><div className="cv-cnt">
        <div style={{fontSize:11,color:'var(--tx2)',marginBottom:4}}>{step.modTitle} · {step.lesTitle} · Шаг {stepIdx+1} из {allSteps.length}</div>
        <h1 style={{fontSize:22,fontWeight:700,marginBottom:18}}>{step.title}</h1>

        {step.type==='text'&&<div style={{fontSize:14,lineHeight:1.7}} dangerouslySetInnerHTML={{__html:step.content||'<p>Контент не добавлен</p>'}}/>}

        {step.type==='video'&&(getYT(step.content)
          ?<div style={{borderRadius:12,overflow:'hidden',marginBottom:8}}><iframe width="100%" height="400" src={getYT(step.content)} frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerPolicy="strict-origin-when-cross-origin" allowFullScreen/></div>
          :<div style={{background:'var(--bg3)',borderRadius:12,padding:32,textAlign:'center',color:'var(--tx2)'}}><div style={{fontSize:40,marginBottom:8}}>🎬</div><p style={{fontSize:14}}>Вставьте YouTube URL в конструкторе</p><p style={{fontSize:12,marginTop:4,opacity:.6}}>{step.content||'URL не задан'}</p></div>)}

        {step.type==='code'&&<pre style={{background:'#1e1e2e',color:'#cdd6f4',padding:20,borderRadius:8,fontSize:13,lineHeight:1.6,overflowX:'auto',fontFamily:'monospace'}}>{step.content||'// Код не добавлен'}</pre>}

        {(step.type==='quiz'||step.type==='exam')&&questionPayload&&<div className="quiz-b">
          <div className="quiz-q">❓ {questionPayload.question}</div>
          <div className="quiz-tip" style={{marginBottom:8}}>{getQuestionModeLabel(questionPayload.questionType)}</div>
          {questionPayload.options?.map((option,index)=>{
            const optionKey=getOptionKey(option,index);
            const isSelected=normalizeSelectedKeys(selectedKeys).includes(optionKey);
            const isCorrectOption=!!option.isCorrect;
            let cls='quiz-o';
            if(questionLocked){
              if(isCorrectOption) cls+=' ok';
              else if(isSelected) cls+=' no';
            }else if(isSelected) cls+=' sel';
            return<div key={optionKey} className={cls} onClick={()=>{
              if(questionLocked) return;
              if(questionPayload.questionType==='single') setSelectedKeys([optionKey]);
              else setSelectedKeys(isSelected?normalizeSelectedKeys(selectedKeys).filter(key=>key!==optionKey):[...normalizeSelectedKeys(selectedKeys),optionKey]);
            }}>
              <div className="quiz-r"/>{option.text}
            </div>;
          })}
          {questionLocked&&<div className={`quiz-res ${questionStatus==='no'?'no':'ok'}`}>
            {questionStatus==='no'?'❌ Ответ сохранён, но есть ошибка':'✅ Ответ сохранён'}
            {questionPayload.explanation&&<div style={{marginTop:6,fontSize:12,opacity:.8}}>💡 {questionPayload.explanation}</div>}
          </div>}
        </div>}

        {step.type==='survey'&&questionPayload&&<div className="quiz-b">
          <div className="quiz-q">📋 {questionPayload.question||'Опрос'}</div>
          {questionPayload.options?.map((option,index)=>{
            const optionKey=getOptionKey(option,index);
            const isSelected=normalizeSelectedKeys(selectedKeys).includes(optionKey);
            return <div key={optionKey} className={`quiz-o ${isSelected?'sel':''}`} onClick={()=>{
              if(questionLocked) return;
              if(questionPayload.questionType==='multi') setSelectedKeys(isSelected?normalizeSelectedKeys(selectedKeys).filter(key=>key!==optionKey):[...normalizeSelectedKeys(selectedKeys),optionKey]);
              else setSelectedKeys([optionKey]);
            }}>
              <div className="quiz-r"/>{option.text}
            </div>;
          })}
          {questionLocked&&<div className="quiz-res ok">✅ {getQuestionTip()}</div>}
        </div>}

        {step.type==='open'&&questionPayload&&<div className="quiz-b">
          <div className="quiz-q">✍️ {questionPayload.question||'Открытый вопрос'}</div>
          <textarea className="fi" value={textAnswer} onChange={e=>!questionLocked&&setTextAnswer(e.target.value)} placeholder={questionPayload.placeholder||'Введите развёрнутый ответ'} style={{minHeight:150}} disabled={questionLocked}/>
          {questionLocked&&<div className="quiz-res ok">✅ {getQuestionTip()}{questionPayload.explanation&&<div style={{marginTop:6,fontSize:12,opacity:.8}}>💡 {questionPayload.explanation}</div>}</div>}
        </div>}

        {step.type==='file'&&<div className="card" style={{padding:24,textAlign:'center'}}>
          {step.content&&<p style={{fontSize:13,color:'var(--tx2)',marginBottom:16}}>📎 {step.content}</p>}
          <input type="file" id={`fu_${step.id}`} style={{display:'none'}} onChange={e=>setUploadedFile(e.target.files[0])}/>
          <label htmlFor={`fu_${step.id}`} style={{cursor:'pointer',display:'block',padding:'24px 20px',border:'2px dashed var(--bg3)',borderRadius:8,color:'var(--tx2)',fontSize:13,transition:'.2s'}} onMouseOver={e=>e.currentTarget.style.borderColor='var(--p)'} onMouseOut={e=>e.currentTarget.style.borderColor='var(--bg3)'}>
            {uploadedFile?<><div style={{fontSize:32,marginBottom:8}}>📄</div><div style={{fontWeight:600,color:'var(--ok)'}}>{uploadedFile.name}</div><div style={{fontSize:11,marginTop:4,opacity:.7}}>{(uploadedFile.size/1024).toFixed(1)} KB</div></>:<><div style={{fontSize:32,marginBottom:8}}>📁</div><div>Нажмите для выбора файла</div><div style={{fontSize:11,marginTop:4,opacity:.6}}>Поддерживаются любые форматы</div></>}
          </label>
        </div>}

        {step.type==='ai'&&questionPayload&&<div className="card" style={{padding:20}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}><span style={{fontSize:20}}>🤖</span><span style={{fontWeight:600,fontSize:15}}>ИИ-проверка ответа</span></div>
          {questionPayload.question&&<p style={{fontSize:13,color:'var(--tx2)',marginBottom:12,lineHeight:1.6}}>{questionPayload.question}</p>}
          <textarea className="fi" value={textAnswer} onChange={e=>!questionLocked&&setTextAnswer(e.target.value)} placeholder={questionPayload.placeholder||'Напишите развёрнутый ответ...'} style={{minHeight:150}} disabled={questionLocked}/>
          {questionLocked&&<div style={{background:'var(--pbg)',borderRadius:8,padding:16,color:'var(--p)',textAlign:'center',marginTop:12}}>
            <div style={{fontSize:24,marginBottom:8}}>✅</div>
            <div style={{fontWeight:600}}>Ответ отправлен на проверку</div>
            <div style={{fontSize:12,marginTop:4,opacity:.8}}>Руководитель проверит и даст обратную связь</div>
          </div>}
        </div>}

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:28,paddingTop:18,borderTop:'1px solid var(--bg3)'}}>
          <button className="btn btn-g" disabled={stepIdx===0} onClick={()=>stepIdx>0&&setStepIdx(stepIdx-1)}>← Назад</button>
          <div style={{display:'flex',gap:8}}>
            {user.managerId&&<button className="btn btn-o btn-sm" onClick={()=>setSendModal(true)}>📤 Отправить руководителю</button>}
            {isQuestionStepType(step.type)&&!questionLocked&&<button className="btn btn-o btn-sm quiz-skip" onClick={skipCurrentQuestion}>Пропустить</button>}
            {isQuestionStepType(step.type)&&!questionLocked&&<button className="btn btn-p" onClick={submitCurrentAnswer}>Подтвердить ответ</button>}
            {isQuestionStepType(step.type)&&questionLocked&&<button className="btn btn-p" onClick={goNext}>{stepIdx===allSteps.length-1?(hasFinalExam?'К экзамену →':'🎓 Завершить'):'Далее →'}</button>}
            {!isQuestionStepType(step.type)&&<button className="btn btn-p" onClick={()=>{
              completeCurrentStep(100);
              goNext();
            }}>{stepIdx===allSteps.length-1?(hasFinalExam?'К экзамену →':'🎓 Завершить'):'Далее →'}</button>}
          </div>
        </div>
      </div></div>
    </div>

    {/* Send to manager modal */}
    {sendModal&&<div className="modal-ov" onClick={()=>setSendModal(false)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <h3>📤 Отправить руководителю</h3>
          <button className="btn btn-g btn-sm" onClick={()=>setSendModal(false)}>✕</button>
        </div>
        <p style={{fontSize:13,color:'var(--tx2)',marginBottom:14}}>Шаг: <strong>{step.title}</strong></p>
        <div className="fg"><label className="fl">Ваш ответ / комментарий</label>
          <textarea className="fi" value={sendComment} onChange={e=>setSendComment(e.target.value)} placeholder="Опишите ваш ответ или добавьте комментарий к этому шагу..." style={{minHeight:120}}/>
        </div>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:16}}>
          <button className="btn btn-g" onClick={()=>setSendModal(false)}>Отмена</button>
          <button className="btn btn-p" onClick={sendToManager}>📤 Отправить</button>
        </div>
      </div>
    </div>}
  </div>);
}

// ---- REVIEWS PAGE ----
function ReviewsPage(){
  const{user,toast:addToast}=useApp();
  const[tab,setTab]=useState('pending');
  const[subs,setSubs]=useState(S.g('submissions',[]));
  const[reviewModal,setReviewModal]=useState(null);
  const[note,setNote]=useState('');

  const mine=subs.filter(s=>s.managerId===user.id);
  const filtered=mine.filter(s=>s.status===tab);
  const users=S.g('users',[]);
  const getUser=(id)=>users.find(u=>u.id===id);
  const pendingCount=mine.filter(s=>s.status==='pending').length;

  const decide=(sub,status)=>{
    const updated=subs.map(s=>s.id===sub.id?{...s,status,reviewNote:note,reviewedAt:new Date().toISOString()}:s);
    setSubs(updated);S.s('submissions',updated);
    setReviewModal(null);setNote('');
    addToast('ok',status==='approved'?'✅ Принято':'❌ Отклонено');
    // Notify employee
    const notifs=S.g('notifications',[]);
    notifs.unshift({id:'n'+Date.now(),text:`Ваш ответ по "${sub.stepTitle}" ${status==='approved'?'принят':'отклонён'}.${note?` Комментарий: ${note}`:''}`,icon:status==='approved'?'✅':'❌',time:'только что',read:false});
    S.s('notifications',notifs);
  };

  const tabs=[{id:'pending',l:`⏳ На проверке (${pendingCount})`},{id:'approved',l:'✅ Принято'},{id:'rejected',l:'❌ Отклонено'}];

  return(<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
      <div><h1 style={{fontSize:22,fontWeight:700}}>📋 Проверки</h1><p style={{fontSize:13,color:'var(--tx2)',marginTop:2}}>Ответы сотрудников на проверку</p></div>
    </div>
    <div className="tab-bar">{tabs.map(t=><div key={t.id} className={`tab-item ${tab===t.id?'on':''}`} onClick={()=>setTab(t.id)}>{t.l}</div>)}</div>
    {filtered.length===0?<div className="empty"><div className="empty-i">📋</div><div className="empty-t">{tab==='pending'?'Нет ожидающих проверок':tab==='approved'?'Нет принятых':'Нет отклонённых'}</div></div>:
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      {filtered.map(sub=>{
        const emp=getUser(sub.userId);
        return(<div key={sub.id} className="card" style={{padding:20,borderLeft:`3px solid ${sub.status==='pending'?'var(--warn)':sub.status==='approved'?'var(--ok)':'var(--err)'}`}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:36,height:36,borderRadius:'50%',background:GRADS[0],display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:700,flexShrink:0}}>{emp?emp.firstName[0]+emp.lastName[0]:'?'}</div>
              <div>
                <div style={{fontWeight:700,fontSize:14}}>{emp?`${emp.firstName} ${emp.lastName}`:'Неизвестный'}</div>
                <div style={{fontSize:11,color:'var(--tx3)'}}>{new Date(sub.submittedAt).toLocaleString('ru')}</div>
              </div>
            </div>
            <span style={{padding:'3px 10px',borderRadius:20,fontSize:10,fontWeight:700,background:sub.status==='pending'?'var(--warn)':sub.status==='approved'?'var(--ok)':'var(--err)',color:'#fff',flexShrink:0}}>
              {sub.status==='pending'?'На проверке':sub.status==='approved'?'Принято':'Отклонено'}
            </span>
          </div>
          <div style={{fontSize:12,color:'var(--tx3)',marginBottom:6}}>
            <strong style={{color:'var(--tx2)'}}>{sub.type==='exam_result'?'🎓 Экзамен':'📝 Ответ на шаг'}:</strong> {sub.courseTitle} → {sub.stepTitle}
          </div>
          <div style={{background:'var(--bg2)',borderRadius:8,padding:'10px 14px',fontSize:13,color:'var(--tx)',lineHeight:1.6,marginBottom:sub.status!=='pending'?12:0}}>
            {sub.content||'—'}
            {sub.type==='exam_result'&&sub.score!=null&&<div style={{marginTop:6,fontWeight:700,fontSize:16,color:sub.score>=70?'var(--ok)':'var(--err)'}}>{sub.score}%</div>}
          </div>
          {sub.reviewNote&&<div style={{background:'var(--pbg)',borderRadius:8,padding:'8px 12px',fontSize:12,color:'var(--p)',marginBottom:sub.status==='pending'?12:0}}>💬 {sub.reviewNote}</div>}
          {sub.status==='pending'&&<div style={{display:'flex',gap:8,marginTop:12}}>
            <button className="btn btn-ok btn-sm" onClick={()=>{setReviewModal(sub);setNote('')}}>✅ Принять</button>
            <button className="btn btn-d btn-sm" onClick={()=>{setReviewModal(sub);setNote('')}}>❌ Отклонить</button>
          </div>}
        </div>)})}
    </div>}

    {reviewModal&&<div className="modal-ov" onClick={()=>setReviewModal(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <h3>Проверка ответа</h3>
          <button className="btn btn-g btn-sm" onClick={()=>setReviewModal(null)}>✕</button>
        </div>
        <p style={{fontSize:13,color:'var(--tx2)',marginBottom:14}}>Сотрудник: <strong>{getUser(reviewModal.userId)?.firstName} {getUser(reviewModal.userId)?.lastName}</strong></p>
        <p style={{fontSize:13,color:'var(--tx2)',marginBottom:14}}>Ответ: <em>{reviewModal.content}</em></p>
        <div className="fg"><label className="fl">Комментарий к ответу (необязательно)</label>
          <textarea className="fi" value={note} onChange={e=>setNote(e.target.value)} placeholder="Напишите обратную связь сотруднику..." style={{minHeight:90}}/>
        </div>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:16}}>
          <button className="btn btn-g" onClick={()=>setReviewModal(null)}>Отмена</button>
          <button className="btn btn-d btn-sm" onClick={()=>decide(reviewModal,'rejected')}>❌ Отклонить</button>
          <button className="btn btn-ok" onClick={()=>decide(reviewModal,'approved')}>✅ Принять</button>
        </div>
      </div>
    </div>}
  </div>);
}

// ---- CONSTRUCTOR ----
function ConstructorPage(){
  const{user,toast:addToast}=useApp();
  const[courses,setCourses]=useState(normalizeCourseCollection(S.g('courses',[])));
  const[cur,setCur]=useState(null);
  const[selStep,setSelStep]=useState(null);
  const[modals,setModals]=useState({course:false,module:false,lesson:false,step:false,editCourse:false});
  const[forms,setForms]=useState({cTitle:'',cDesc:'',cCat:CATS[0],cGrad:GRADS[0],mTitle:'',lTitle:'',sTitle:'',sType:'text'});
  const[selModId,setSelModId]=useState(null);
  const[selLesId,setSelLesId]=useState(null);

  useEffect(()=>{
    const unsubCourses=window.fbWatch('courses',arr=>{
      if(!Array.isArray(arr)) return;
      const normalized = normalizeCourseCollection(arr);
      setCourses(normalized);
      setCur(prev=>prev ? (normalized.find(c=>c.id===prev.id) || null) : prev);
    });
    return()=>unsubCourses();
  },[]);

  const save=(updated)=>{
    const normalized = normalizeCourseCollection(updated);
    setCourses(normalized);
    S.s('courses',normalized);
    if(cur){
      const found=normalized.find(c=>c.id===cur.id);
      if(found)setCur(found);
    }
  };
  const openM=(k,extra)=>{setModals({...modals,[k]:true});if(extra)setForms(f=>({...f,...extra}))};
  const closeM=(k)=>setModals({...modals,[k]:false});
  const availableModules=getCourseModules(cur||{modules:[]});
  const availableLessons=getModuleLessons(availableModules.find(module=>module.id===selModId)||{lessons:[]});

  // Create course
  const createCourse=()=>{
    if(!forms.cTitle.trim()){addToast('err','Введите название');return}
    const nc={id:'c'+Date.now(),title:forms.cTitle,description:forms.cDesc,category:forms.cCat,coverGradient:forms.cGrad,coverImage:forms.cImage||null,icon:'📚',status:'draft',authorId:user.id,modules:[]};
    const u=[...courses,nc];save(u);setCur(nc);closeM('course');setForms(f=>({...f,cTitle:'',cDesc:'',cImage:null}));addToast('ok','Курс создан!');
  };
  // Edit course metadata
  const editCourse=()=>{
    if(!forms.cTitle.trim())return;
    const u=courses.map(c=>c.id===cur.id?{...c,title:forms.cTitle,description:forms.cDesc,category:forms.cCat,coverGradient:forms.cGrad,coverImage:forms.cImage!==undefined?forms.cImage:c.coverImage}:c);
    save(u);closeM('editCourse');addToast('ok','Курс обновлён');
  };
  // Handle cover image upload
  const handleCoverUpload=async(file)=>{
    if(!file)return;
    if(file.size>2*1024*1024){addToast('err','Файл слишком большой. Максимум 2MB');return}
    try{const b64=await readImageFile(file);setForms(f=>({...f,cImage:b64}))}catch{addToast('err','Ошибка загрузки изображения')}
  };
  // Delete course
  const delCourse=(id)=>{
    if(!confirm('Удалить курс и все его содержимое?'))return;
    const u=courses.filter(c=>c.id!==id);save(u);if(cur?.id===id){setCur(null);setSelStep(null)}
    // Clean up enrollments
    const enrs=S.g('enrollments',[]).filter(e=>e.courseId!==id);S.s('enrollments',enrs);
    addToast('ok','Курс удалён');
  };
  // Duplicate course
  const dupCourse=(c)=>{
    const makeId = (prefix)=>prefix+Date.now()+Math.random().toString(36).slice(2,6);
    const source = normalizeCourseTree(JSON.parse(JSON.stringify(c)));
    const nc={
      ...source,
      id:makeId('c'),
      title:c.title+' (копия)',
      status:'draft',
      authorId:user.id,
      modules:getCourseModules(source).map((m,moduleIndex)=>({
        ...m,
        id:makeId('m'),
        order:moduleIndex,
        lessons:getModuleLessons(m).map((l,lessonIndex)=>({
          ...l,
          id:makeId('l'),
          order:lessonIndex,
          steps:getLessonSteps(l).map((s,stepIndex)=>({
            ...s,
            id:makeId('s'),
            order:stepIndex
          }))
        }))
      }))
    };
    const u=[...courses,nc];save(u);addToast('ok','Курс скопирован');
  };
  // Add module
  const addModule=()=>{
    if(!cur){addToast('err','Сначала выберите курс');return}
    if(!forms.mTitle.trim()){addToast('err','Введите название модуля');return}
    const currentModules = getCourseModules(cur);
    const nm={id:'m'+Date.now(),title:forms.mTitle.trim(),order:currentModules.length,lessons:[]};
    const u=courses.map(c=>c.id===cur.id?{...normalizeCourseTree(c),modules:[...getCourseModules(c),nm]}:c);
    save(u);closeM('module');setForms(f=>({...f,mTitle:''}));addToast('ok','Модуль добавлен');
  };
  // Rename module inline
  const renameModule=(mid,newTitle)=>{
    const title = String(newTitle || '').trim();
    if(!title)return;
    const u=courses.map(c=>c.id===cur.id?{...normalizeCourseTree(c),modules:getCourseModules(c).map(m=>m.id===mid?{...m,title}:m)}:c);save(u);
  };
  // Add lesson
  const addLesson=()=>{
    if(!cur){addToast('err','Сначала выберите курс');return}
    if(!selModId){addToast('err','Сначала выберите модуль');return}
    if(!forms.lTitle.trim()){addToast('err','Введите название урока');return}
    const nl={id:'l'+Date.now(),title:forms.lTitle,order:0,steps:[]};
    const u=courses.map(c=>c.id===cur.id?{...normalizeCourseTree(c),modules:getCourseModules(c).map(m=>m.id===selModId?{...m,lessons:[...getModuleLessons(m),nl]}:m)}:c);
    save(u);closeM('lesson');setForms(f=>({...f,lTitle:''}));addToast('ok','Урок добавлен');
  };
  // Rename lesson inline
  const renameLesson=(mid,lid,newTitle)=>{
    const title = String(newTitle || '').trim();
    if(!title)return;
    const u=courses.map(c=>c.id===cur.id?{...normalizeCourseTree(c),modules:getCourseModules(c).map(m=>m.id===mid?{...m,lessons:getModuleLessons(m).map(l=>l.id===lid?{...l,title}:l)}:m)}:c);save(u);
  };
  // Add step
  const addStep=()=>{
    if(!cur){addToast('err','Сначала выберите курс');return}
    if(!selModId||!selLesId){addToast('err','Сначала выберите урок');return}
    if(!forms.sTitle.trim()){addToast('err','Введите название шага');return}
    const defContent=STEP_ANSWER_TYPES.has(forms.sType)?JSON.stringify(buildQuestionPayload(forms.sType,'')):'';
    const ns={id:'s'+Date.now(),title:forms.sTitle,type:forms.sType,content:defContent,points:10,required:true,order:0};
    const u=courses.map(c=>c.id===cur.id?{...normalizeCourseTree(c),modules:getCourseModules(c).map(m=>m.id===selModId?{...m,lessons:getModuleLessons(m).map(l=>l.id===selLesId?{...l,steps:[...getLessonSteps(l),ns]}:l)}:m)}:c);
    save(u);setSelStep(ns);closeM('step');setForms(f=>({...f,sTitle:''}));addToast('ok','Шаг добавлен');
  };
  // Delete
  const delModule=(mid)=>{if(!confirm('Удалить модуль?'))return;const u=courses.map(c=>c.id===cur.id?{...normalizeCourseTree(c),modules:getCourseModules(c).filter(m=>m.id!==mid)}:c);save(u);addToast('ok','Модуль удалён')};
  const delLesson=(mid,lid)=>{if(!confirm('Удалить урок?'))return;const u=courses.map(c=>c.id===cur.id?{...normalizeCourseTree(c),modules:getCourseModules(c).map(m=>m.id===mid?{...m,lessons:getModuleLessons(m).filter(l=>l.id!==lid)}:m)}:c);save(u);addToast('ok','Урок удалён')};
  const delStep=(mid,lid,sid)=>{if(!confirm('Удалить шаг?'))return;const u=courses.map(c=>c.id===cur.id?{...normalizeCourseTree(c),modules:getCourseModules(c).map(m=>m.id===mid?{...m,lessons:getModuleLessons(m).map(l=>l.id===lid?{...l,steps:getLessonSteps(l).filter(s=>s.id!==sid)}:l)}:m)}:c);save(u);if(selStep?.id===sid)setSelStep(null);addToast('ok','Шаг удалён')};
  // Move step
  const moveStep=(mid,lid,sid,dir)=>{
    const u=courses.map(c=>{if(c.id!==cur.id)return c;return{...normalizeCourseTree(c),modules:getCourseModules(c).map(m=>{if(m.id!==mid)return m;return{...m,lessons:getModuleLessons(m).map(l=>{
      if(l.id!==lid)return l;const steps=[...l.steps];const idx=steps.findIndex(s=>s.id===sid);
      if(idx<0||(dir===-1&&idx===0)||(dir===1&&idx===steps.length-1))return l;
      [steps[idx],steps[idx+dir]]=[steps[idx+dir],steps[idx]];return{...l,steps}})}})}});save(u);
  };
  // Move module
  const moveModule=(mid,dir)=>{
    const u=courses.map(c=>{if(c.id!==cur.id)return c;const mods=[...getCourseModules(c)];const idx=mods.findIndex(m=>m.id===mid);
      if(idx<0||(dir===-1&&idx===0)||(dir===1&&idx===mods.length-1))return c;
      [mods[idx],mods[idx+dir]]=[mods[idx+dir],mods[idx]];return{...c,modules:mods}});save(u);
  };
  // Update step content
  const updateStep=(field,value)=>{
    if(!selStep||!cur)return;
    const u=courses.map(c=>c.id===cur.id?{...normalizeCourseTree(c),modules:getCourseModules(c).map(m=>({...m,lessons:getModuleLessons(m).map(l=>({...l,steps:getLessonSteps(l).map(s=>s.id===selStep.id?{...s,[field]:value}:s)}))}))}:c);
    save(u);setSelStep(prev=>({...prev,[field]:value}));
  };
  // Publish
  const publish=()=>{const u=courses.map(c=>c.id===cur.id?{...c,status:c.status==='published'?'draft':'published'}:c);save(u);addToast('ok',cur.status==='published'?'Курс снят с публикации':'Курс опубликован!')};
  // Count steps
  const countSteps=(c)=>{let n=0;c.modules?.forEach(m=>m.lessons?.forEach(l=>n+=(l.steps?.length||0)));return n};

  // Course list view
  if(!cur)return(<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
      <h1 style={{fontSize:22,fontWeight:700}}>Конструктор курсов</h1>
      <button className="btn btn-p" onClick={()=>openM('course')}>+ Создать курс</button>
    </div>
    {courses.filter(c=>c.authorId===user.id||user.role==='admin').length===0?
      <div className="empty"><div className="empty-i">🛠️</div><div className="empty-t">Нет курсов</div><div className="empty-d">Создайте свой первый курс</div><button className="btn btn-p" onClick={()=>openM('course')}>Создать</button></div>:
      <div className="grid3">{courses.filter(c=>c.authorId===user.id||user.role==='admin').map(c=>
        <div key={c.id} className="card">
          <div className="cov" style={{...getCoverStyle(c),cursor:'pointer'}} onClick={()=>setCur(c)}>{!c.coverImage&&<span className="cov-i">{c.icon||'📚'}</span>}
            <div style={{position:'absolute',bottom:6,right:6,zIndex:2}}>
              <input type="file" accept="image/*" id={`qi_${c.id}`} style={{display:'none'}} onChange={async e=>{if(!e.target.files[0])return;const b=await readImageFile(e.target.files[0]);const u=courses.map(x=>x.id===c.id?{...x,coverImage:b}:x);save(u);addToast('ok','Обложка обновлена')}}/>
              <label htmlFor={`qi_${c.id}`} style={{background:'rgba(0,0,0,.55)',color:'#fff',fontSize:10,padding:'3px 8px',borderRadius:6,cursor:'pointer',fontWeight:600}} onClick={e=>e.stopPropagation()}>🖼️ Фото</label>
            </div>
            <span style={{position:'absolute',top:10,right:10,background:c.status==='published'?'#e6f9f0':'#fff3e0',color:c.status==='published'?'#00875a':'#E67E22',padding:'3px 10px',borderRadius:20,fontSize:10,fontWeight:600}}>{c.status==='published'?'Опубликован':'Черновик'}</span>
          </div>
          <div className="cbody">
            <div className="ctitle">{c.title}</div>
            <div className="cmeta" style={{marginBottom:8}}><span>{c.modules?.length||0} мод.</span><span>{countSteps(c)} шагов</span></div>
            <div style={{display:'flex',gap:4}}>
              <button className="btn btn-p btn-sm" onClick={()=>setCur(c)}>Редактировать</button>
              <button className="btn btn-o btn-sm" onClick={()=>dupCourse(c)}>📋</button>
              <button className="btn btn-d btn-sm" onClick={()=>delCourse(c.id)}>🗑️</button>
            </div>
          </div>
        </div>)}</div>}
    <Modal open={modals.course} title="Создать курс" onClose={()=>closeM('course')} footer={<><button className="btn btn-g" onClick={()=>closeM('course')}>Отмена</button><button className="btn btn-p" onClick={createCourse}>Создать</button></>}>
      <div className="fg"><label className="fl">Название курса</label><input className="fi" value={forms.cTitle} onChange={e=>setForms({...forms,cTitle:e.target.value})} placeholder="Введите название"/></div>
      <div className="fg"><label className="fl">Описание</label><textarea className="fi" value={forms.cDesc} onChange={e=>setForms({...forms,cDesc:e.target.value})} placeholder="Краткое описание курса"/></div>
      <div className="fg"><label className="fl">Категория</label><select className="fi" value={forms.cCat} onChange={e=>setForms({...forms,cCat:e.target.value})}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
      <div className="fg">
        <label className="fl">Обложка курса</label>
        <input type="file" accept="image/*" id="coverUpNew" style={{display:'none'}} onChange={e=>handleCoverUpload(e.target.files[0])}/>
        {forms.cImage
          ?<div style={{position:'relative',borderRadius:10,overflow:'hidden',height:120,marginBottom:8}}>
              <div style={{width:'100%',height:'100%',backgroundImage:`url(${forms.cImage})`,backgroundSize:'cover',backgroundPosition:'center'}}/>
              <button className="btn btn-d btn-sm" style={{position:'absolute',top:6,right:6}} onClick={()=>setForms(f=>({...f,cImage:null}))}>✕ Удалить</button>
            </div>
          :<label htmlFor="coverUpNew" style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',border:'2px dashed var(--bg3)',borderRadius:8,cursor:'pointer',fontSize:13,color:'var(--tx2)',marginBottom:8,transition:'.2s'}} onMouseOver={e=>e.currentTarget.style.borderColor='var(--p)'} onMouseOut={e=>e.currentTarget.style.borderColor='var(--bg3)'}>
              <span style={{fontSize:24}}>🖼️</span>
              <div><div style={{fontWeight:600,color:'var(--tx)'}}>Загрузить изображение</div><div style={{fontSize:11,marginTop:2}}>PNG, JPG, WebP · макс. 2MB</div></div>
            </label>}
        <div style={{fontSize:11,color:'var(--tx3)',marginBottom:6}}>Или выбери цвет:</div>
        <div style={{display:'flex',gap:8}}>{GRADS.map((g,i)=><div key={i} style={{width:36,height:36,borderRadius:8,background:g,cursor:'pointer',border:forms.cGrad===g&&!forms.cImage?'3px solid var(--tx)':'3px solid transparent'}} onClick={()=>setForms({...forms,cGrad:g,cImage:null})}/>)}</div>
      </div>
    </Modal>
  </div>);

  // Course editor view
  return(<div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 64px)',margin:'-24px -28px'}}>
    <div className="con-bar">
      <button className="btn btn-g btn-sm" onClick={()=>{setCur(null);setSelStep(null)}}>← Назад</button>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontWeight:600,fontSize:14}}>{cur.title}</span>
        <button className="btn btn-g btn-sm" onClick={()=>{setForms(f=>({...f,cTitle:cur.title,cDesc:cur.description||'',cCat:cur.category||CATS[0],cGrad:cur.coverGradient||GRADS[0],cImage:cur.coverImage||null}));openM('editCourse')}}>✏️</button>
      </div>
      <div style={{display:'flex',gap:6}}>
        <span style={{fontSize:11,color:'var(--tx2)',alignSelf:'center'}}>{countSteps(cur)} шагов</span>
        <button className="btn btn-o btn-sm" onClick={publish}>{cur.status==='published'?'Снять публикацию':'📢 Опубликовать'}</button>
        <button className="btn btn-p btn-sm" onClick={()=>addToast('ok','Авто-сохранение включено')}>💾</button>
      </div>
    </div>
    <div className="con-lay">
      <div className="con-tree">
        <div className="tree-lbl">Структура курса</div>
        {cur.modules?.map((m,mi)=><div key={m.id}>
          <div className="tree-it mod" style={{justifyContent:'space-between'}}>
            <input className="inline-edit" style={{fontWeight:600,fontSize:13,flex:1}} defaultValue={m.title} onBlur={e=>renameModule(m.id,e.target.value)}/>
            <span style={{display:'flex',gap:2,flexShrink:0}}>
              <span style={{cursor:'pointer',fontSize:10}} onClick={()=>moveModule(m.id,-1)} title="Вверх">⬆️</span>
              <span style={{cursor:'pointer',fontSize:10}} onClick={()=>moveModule(m.id,1)} title="Вниз">⬇️</span>
              <span style={{cursor:'pointer',fontSize:11,color:'var(--err)'}} onClick={()=>delModule(m.id)}>🗑️</span>
            </span>
          </div>
          {m.lessons?.map(l=><div key={l.id}>
            <div className="tree-it les" style={{justifyContent:'space-between'}}>
              <input className="inline-edit" style={{fontSize:12,flex:1}} defaultValue={l.title} onBlur={e=>renameLesson(m.id,l.id,e.target.value)}/>
              <span style={{cursor:'pointer',fontSize:11,color:'var(--err)',flexShrink:0}} onClick={()=>delLesson(m.id,l.id)}>🗑️</span>
            </div>
            {l.steps?.map(s=><div key={s.id} className={`tree-it stp ${selStep?.id===s.id?'on':''}`} style={{justifyContent:'space-between'}}>
              <span onClick={()=>setSelStep(s)} style={{flex:1,cursor:'pointer'}}>{ICONS[s.type]||'📝'} {s.title}</span>
              <span style={{display:'flex',gap:2,flexShrink:0}}>
                <span style={{cursor:'pointer',fontSize:10}} onClick={()=>moveStep(m.id,l.id,s.id,-1)}>⬆️</span>
                <span style={{cursor:'pointer',fontSize:10}} onClick={()=>moveStep(m.id,l.id,s.id,1)}>⬇️</span>
                <span style={{cursor:'pointer',fontSize:10,color:'var(--err)'}} onClick={()=>delStep(m.id,l.id,s.id)}>🗑️</span>
              </span>
            </div>)}
            <div className="tree-add stp" onClick={()=>{setSelModId(m.id);setSelLesId(l.id);openM('step')}}>+ Шаг</div>
          </div>)}
          <div className="tree-add les" onClick={()=>{setSelModId(m.id);openM('lesson')}}>+ Урок</div>
        </div>)}
        <div className="tree-add" onClick={()=>openM('module')}>+ Модуль</div>
      </div>
      <div className="con-ed">
        {!selStep?<div className="empty"><div className="empty-i">👈</div><div className="empty-t">Выберите шаг</div><div className="empty-d">Или добавьте новый шаг в дерево слева</div></div>:
        <StepEditor step={selStep} onUpdate={updateStep}/>}
      </div>
    </div>
    {/* Modals */}
    <Modal open={modals.editCourse} title="Редактировать курс" onClose={()=>closeM('editCourse')} footer={<><button className="btn btn-g" onClick={()=>closeM('editCourse')}>Отмена</button><button className="btn btn-p" onClick={editCourse}>Сохранить</button></>}>
      <div className="fg"><label className="fl">Название</label><input className="fi" value={forms.cTitle} onChange={e=>setForms({...forms,cTitle:e.target.value})}/></div>
      <div className="fg"><label className="fl">Описание</label><textarea className="fi" value={forms.cDesc} onChange={e=>setForms({...forms,cDesc:e.target.value})}/></div>
      <div className="fg"><label className="fl">Категория</label><select className="fi" value={forms.cCat} onChange={e=>setForms({...forms,cCat:e.target.value})}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
      <div className="fg">
        <label className="fl">Обложка курса</label>
        <input type="file" accept="image/*" id="coverUpEdit" style={{display:'none'}} onChange={e=>handleCoverUpload(e.target.files[0])}/>
        {forms.cImage
          ?<div style={{position:'relative',borderRadius:10,overflow:'hidden',height:120,marginBottom:8}}>
              <div style={{width:'100%',height:'100%',backgroundImage:`url(${forms.cImage})`,backgroundSize:'cover',backgroundPosition:'center'}}/>
              <button className="btn btn-d btn-sm" style={{position:'absolute',top:6,right:6}} onClick={()=>setForms(f=>({...f,cImage:null}))}>✕ Удалить</button>
            </div>
          :<label htmlFor="coverUpEdit" style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',border:'2px dashed var(--bg3)',borderRadius:8,cursor:'pointer',fontSize:13,color:'var(--tx2)',marginBottom:8,transition:'.2s'}} onMouseOver={e=>e.currentTarget.style.borderColor='var(--p)'} onMouseOut={e=>e.currentTarget.style.borderColor='var(--bg3)'}>
              <span style={{fontSize:24}}>🖼️</span>
              <div><div style={{fontWeight:600,color:'var(--tx)'}}>Загрузить изображение</div><div style={{fontSize:11,marginTop:2}}>PNG, JPG, WebP · макс. 2MB</div></div>
            </label>}
        <div style={{fontSize:11,color:'var(--tx3)',marginBottom:6}}>Или выбери цвет фона:</div>
        <div style={{display:'flex',gap:8}}>{GRADS.map((g,i)=><div key={i} style={{width:36,height:36,borderRadius:8,background:g,cursor:'pointer',border:forms.cGrad===g&&!forms.cImage?'3px solid var(--tx)':'3px solid transparent'}} onClick={()=>setForms({...forms,cGrad:g,cImage:null})}/>)}</div>
      </div>
    </Modal>
    <Modal open={modals.module} title="Добавить модуль" onClose={()=>closeM('module')} footer={<><button className="btn btn-g" onClick={()=>closeM('module')}>Отмена</button><button className="btn btn-p" onClick={addModule}>Добавить</button></>}>
      <div className="fg"><label className="fl">Название модуля</label><input className="fi" value={forms.mTitle} onChange={e=>setForms({...forms,mTitle:e.target.value})} placeholder="Например: Введение" onKeyDown={e=>e.key==='Enter'&&addModule()}/></div>
    </Modal>
    <Modal open={modals.lesson} title="Добавить урок" onClose={()=>closeM('lesson')} footer={<><button className="btn btn-g" onClick={()=>closeM('lesson')}>Отмена</button><button className="btn btn-p" onClick={addLesson}>Добавить</button></>}>
      <div className="fg"><label className="fl">Модуль</label><select className="fi" value={selModId||''} onChange={e=>setSelModId(e.target.value)}><option value="">Выберите модуль...</option>{availableModules.map(module=><option key={module.id} value={module.id}>{module.title}</option>)}</select></div>
      <div className="fg"><label className="fl">Название урока</label><input className="fi" value={forms.lTitle} onChange={e=>setForms({...forms,lTitle:e.target.value})} placeholder="Например: Основы" onKeyDown={e=>e.key==='Enter'&&addLesson()}/></div>
    </Modal>
    <Modal open={modals.step} title="Добавить шаг" onClose={()=>closeM('step')} footer={<><button className="btn btn-g" onClick={()=>closeM('step')}>Отмена</button><button className="btn btn-p" onClick={addStep}>Добавить</button></>}>
      <div className="fg"><label className="fl">Модуль</label><select className="fi" value={selModId||''} onChange={e=>{setSelModId(e.target.value);setSelLesId('')}}><option value="">Выберите модуль...</option>{availableModules.map(module=><option key={module.id} value={module.id}>{module.title}</option>)}</select></div>
      <div className="fg"><label className="fl">Урок</label><select className="fi" value={selLesId||''} onChange={e=>setSelLesId(e.target.value)}><option value="">Выберите урок...</option>{availableLessons.map(lesson=><option key={lesson.id} value={lesson.id}>{lesson.title}</option>)}</select></div>
      <div className="fg"><label className="fl">Название шага</label><input className="fi" value={forms.sTitle} onChange={e=>setForms({...forms,sTitle:e.target.value})} placeholder="Например: Введение в тему"/></div>
      <div className="fg"><label className="fl">Тип шага</label>
        <div className="stypes">{STYPES.map(t=><button key={t.id} className={`stype ${forms.sType===t.id?'on':''}`} onClick={()=>setForms({...forms,sType:t.id})}>{t.i} {t.l}</button>)}</div>
      </div>
    </Modal>
  </div>);
}

// ---- STEP EDITOR ----
function StepEditor({step,onUpdate}){
  const edRef=useRef(null);
  const[quizData,setQuizData]=useState(null);
  useEffect(()=>{
    if(step.type==='quiz'||step.type==='exam'||step.type==='survey'||step.type==='open'){
      try{setQuizData(JSON.parse(step.content))}catch{setQuizData({question:'',questionType:'single',options:[{id:'o1',text:'',isCorrect:false}],points:10,attempts:3,explanation:''})}
    }
  },[step.id,step.type]);
  const updateQuiz=(field,val)=>{const nq={...quizData,[field]:val};setQuizData(nq);onUpdate('content',JSON.stringify(nq))};
  const updateOption=(idx,field,val)=>{const opts=[...quizData.options];opts[idx]={...opts[idx],[field]:val};updateQuiz('options',opts)};
  const addOption=()=>{updateQuiz('options',[...quizData.options,{id:'o'+Date.now(),text:'',isCorrect:false}])};
  const delOption=(idx)=>{if(quizData.options.length<=1)return;updateQuiz('options',quizData.options.filter((_,i)=>i!==idx))};
  const applyFmt=(cmd,val)=>{document.execCommand(cmd,false,val)};

  return(<div>
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
      <input className="inline-edit" style={{fontSize:17,fontWeight:600,flex:1}} defaultValue={step.title} key={step.id+'title'} onBlur={e=>onUpdate('title',e.target.value)}/>
      <span style={{fontSize:12,color:'var(--tx2)',background:'var(--bg2)',padding:'3px 10px',borderRadius:20}}>{ICONS[step.type]} {STYPES.find(t=>t.id===step.type)?.l||step.type}</span>
    </div>
    <div className="stypes" style={{marginBottom:14}}>
      {STYPES.map(t=><div key={t.id} className={`stype ${step.type===t.id?'on':''}`} onClick={()=>onUpdate('type',t.id)}>{t.i} {t.l}</div>)}
    </div>

    {step.type==='text'&&<div>
      <div className="ed-bar">
        <button className="ed-btn" style={{fontWeight:700}} onClick={()=>applyFmt('bold')}>B</button>
        <button className="ed-btn" style={{fontStyle:'italic'}} onClick={()=>applyFmt('italic')}>I</button>
        <button className="ed-btn" style={{textDecoration:'underline'}} onClick={()=>applyFmt('underline')}>U</button>
        <button className="ed-btn" onClick={()=>applyFmt('formatBlock','h1')}>H1</button>
        <button className="ed-btn" onClick={()=>applyFmt('formatBlock','h2')}>H2</button>
        <button className="ed-btn" onClick={()=>applyFmt('formatBlock','h3')}>H3</button>
        <button className="ed-btn" onClick={()=>applyFmt('insertUnorderedList')}>• Список</button>
        <button className="ed-btn" onClick={()=>applyFmt('insertOrderedList')}>1. Нумер.</button>
        <button className="ed-btn" onClick={()=>applyFmt('formatBlock','blockquote')}>❝ Цитата</button>
        <button className="ed-btn" onClick={()=>{const u=prompt('URL ссылки:');if(u)applyFmt('createLink',u)}}>🔗</button>
        <button className="ed-btn" onClick={()=>{const u=prompt('URL изображения:');if(u)applyFmt('insertImage',u)}}>🖼️</button>
        <button className="ed-btn" onClick={()=>applyFmt('removeFormat')}>✕ Сброс</button>
      </div>
      <div ref={edRef} className="ed-area" contentEditable suppressContentEditableWarning onBlur={e=>onUpdate('content',e.currentTarget.innerHTML)} dangerouslySetInnerHTML={{__html:step.content||''}} key={step.id}/>
    </div>}

    {step.type==='video'&&<div>
      <div className="fg"><label className="fl">YouTube URL</label><input className="fi" value={step.content||''} onChange={e=>onUpdate('content',e.target.value)} placeholder="https://youtube.com/watch?v=..."/></div>
      {step.content&&(()=>{const m=(step.content||'').match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/);
        return m?<iframe width="100%" height="360" src={`https://www.youtube-nocookie.com/embed/${m[1]}?rel=0&modestbranding=1`} frameBorder="0" style={{borderRadius:8,marginTop:8}} allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" referrerPolicy="strict-origin-when-cross-origin" allowFullScreen/>:<p style={{color:'var(--err)',fontSize:13}}>Некорректный URL</p>})()}
    </div>}

    {step.type==='code'&&<div>
      <div className="fg"><label className="fl">Язык</label><select className="fi" style={{width:200}}><option>JavaScript</option><option>Python</option><option>Java</option><option>Go</option><option>SQL</option><option>TypeScript</option><option>C#</option></select></div>
      <textarea className="fi" style={{minHeight:250,fontFamily:'monospace',fontSize:13,lineHeight:1.5}} value={step.content||''} onChange={e=>onUpdate('content',e.target.value)} placeholder="// Введите код..."/>
    </div>}

    {(step.type==='quiz'||step.type==='exam'||step.type==='survey'||step.type==='open')&&quizData&&<div>
      <div className="fg"><label className="fl">Текст вопроса</label><textarea className="fi" value={quizData.question} onChange={e=>updateQuiz('question',e.target.value)} placeholder="Введите вопрос..."/></div>
      {step.type!=='survey'&&step.type!=='open'&&<div className="fg"><label className="fl">Тип ответа</label>
        <div style={{display:'flex',gap:8}}>
          <button className={`fchip ${quizData.questionType==='single'?'on':''}`} onClick={()=>updateQuiz('questionType','single')}>Один ответ</button>
          <button className={`fchip ${quizData.questionType==='multi'?'on':''}`} onClick={()=>updateQuiz('questionType','multi')}>Несколько</button>
        </div>
      </div>}
      {step.type!=='open'&&<div className="fg"><label className="fl">Варианты ответов</label>
        {quizData.options.map((o,i)=><div key={o.id||i} style={{display:'flex',gap:8,alignItems:'center',marginBottom:6}}>
          <input className="fi" style={{flex:1}} value={o.text} onChange={e=>updateOption(i,'text',e.target.value)} placeholder={`Вариант ${i+1}`}/>
          {step.type!=='survey'&&<label style={{display:'flex',alignItems:'center',gap:4,fontSize:11,whiteSpace:'nowrap',cursor:'pointer'}}>
            <input type="checkbox" checked={o.isCorrect} onChange={e=>updateOption(i,'isCorrect',e.target.checked)} style={{accentColor:'var(--ok)'}}/>Верный
          </label>}
          <button className="btn btn-d btn-sm" onClick={()=>delOption(i)}>✕</button>
        </div>)}
        <button className="btn btn-o btn-sm" onClick={addOption}>+ Добавить вариант</button>
      </div>}
      {step.type==='open'&&<div className="fg"><label className="fl">Плейсхолдер ответа</label><input className="fi" value={quizData.placeholder||''} onChange={e=>updateQuiz('placeholder',e.target.value)} placeholder="Например: Опишите решение в свободной форме"/></div>}
      {step.type!=='survey'&&step.type!=='open'&&<>
        <div style={{display:'flex',gap:16}}>
          <div className="fg" style={{flex:1}}><label className="fl">Баллы</label><input className="fi" type="number" value={quizData.points||10} onChange={e=>updateQuiz('points',+e.target.value)}/></div>
          <div className="fg" style={{flex:1}}><label className="fl">Попытки</label><input className="fi" type="number" value={quizData.attempts||3} onChange={e=>updateQuiz('attempts',+e.target.value)}/></div>
        </div>
        <div className="fg"><label className="fl">Объяснение правильного ответа</label><textarea className="fi" value={quizData.explanation||''} onChange={e=>updateQuiz('explanation',e.target.value)} placeholder="Будет показано после ответа"/></div>
      </>}
      {step.type==='open'&&<div className="fg"><label className="fl">Комментарий после ответа</label><textarea className="fi" value={quizData.explanation||''} onChange={e=>updateQuiz('explanation',e.target.value)} placeholder="Что показать пользователю после отправки ответа"/></div>}
      {step.type==='exam'&&<div style={{display:'flex',gap:16}}>
        <div className="fg" style={{flex:1}}><label className="fl">Таймер (мин.)</label><input className="fi" type="number" defaultValue={30}/></div>
        <div className="fg" style={{flex:1}}><label className="fl">Проходной балл (%)</label><input className="fi" type="number" defaultValue={70}/></div>
      </div>}
    </div>}

    {step.type==='file'&&<div className="fg"><label className="fl">Описание задания</label><textarea className="fi" value={step.content||''} onChange={e=>onUpdate('content',e.target.value)} placeholder="Опишите, какой файл нужно загрузить..."/></div>}
    {step.type==='ai'&&<div>
      <div className="fg"><label className="fl">Промпт для ИИ-проверки</label><textarea className="fi" style={{minHeight:120}} value={step.content||''} onChange={e=>onUpdate('content',e.target.value)} placeholder="Инструкция для ИИ: как оценивать ответ студента..."/></div>
      <div className="fg"><label className="fl">Максимальный балл</label><input className="fi" type="number" defaultValue={100} style={{width:120}}/></div>
    </div>}

    <div className="sset">
      <h4 style={{fontSize:13,fontWeight:600,marginBottom:10}}>⚙️ Настройки шага</h4>
      <div className="srow"><input type="checkbox" checked={step.required!==false} onChange={e=>onUpdate('required',e.target.checked)}/> Обязательный шаг</div>
      <div className="srow">Баллы за прохождение: <input className="fi" type="number" value={step.points||10} onChange={e=>onUpdate('points',+e.target.value)} style={{width:70,marginLeft:6}}/></div>
    </div>
  </div>);
}

// ---- PROFILE + ACHIEVEMENTS ----
function ProfilePage(){
  const{user}=useApp();
  const achs=S.g('achievements',[]);const ua=S.g('userAchievements',[]).filter(a=>a.userId===user.id);
  const enrs=S.g('enrollments',[]).filter(e=>e.userId===user.id);
  const done=enrs.filter(e=>e.status==='completed').length;
  const active=enrs.filter(e=>e.status==='active').length;
  const nextLevelXp=(user.level+1)*300;const xpPct=Math.min(100,Math.round((user.xp/nextLevelXp)*100));
  const earnedIds=ua.filter(a=>a.earnedAt).map(a=>a.achievementId);
  return(<div>
    <div className="prof-h">
      <div className="prof-av">{user.firstName[0]}{user.lastName[0]}</div>
      <div>
        <div style={{fontSize:22,fontWeight:700}}>{user.firstName} {user.lastName}</div>
        <div style={{fontSize:13,opacity:.85,marginTop:3}}>{ROLE_MAP[user.role]||user.role}</div>
        <div style={{display:'flex',alignItems:'center',gap:8,marginTop:8}}>
          <span style={{background:'rgba(255,255,255,.2)',padding:'3px 12px',borderRadius:20,fontWeight:600,fontSize:12}}>⭐ Уровень {user.level}</span>
          <span style={{fontSize:12,opacity:.85}}>{user.xp} / {nextLevelXp} XP</span>
        </div>
        <div style={{marginTop:8,height:7,background:'rgba(255,255,255,.2)',borderRadius:4,width:280}}><div style={{height:'100%',width:`${xpPct}%`,background:'#fff',borderRadius:4,transition:'width .5s'}}/></div>
      </div>
    </div>
    <div className="grid4" style={{marginBottom:20}}>
      <div className="stat"><div className="stat-i" style={{background:'var(--pbg)',color:'var(--p)'}}>📚</div><div className="stat-v">{done}</div><div className="stat-l">Завершено</div></div>
      <div className="stat"><div className="stat-i" style={{background:'#e8f4fd',color:'var(--info)'}}>📖</div><div className="stat-v" style={{color:'var(--s)'}}>{active}</div><div className="stat-l">В процессе</div></div>
      <div className="stat"><div className="stat-i" style={{background:'#fff3e0',color:'var(--warn)'}}>🏆</div><div className="stat-v" style={{color:'var(--warn)'}}>{earnedIds.length}</div><div className="stat-l">Достижений</div></div>
      <div className="stat"><div className="stat-i" style={{background:'#e6f9f0',color:'var(--ok)'}}>📊</div><div className="stat-v" style={{color:'var(--ok)'}}>94%</div><div className="stat-l">Средний балл</div></div>
    </div>
    <div className="sec-h"><h2 className="sec-t">🏆 Достижения ({earnedIds.length} / {achs.length})</h2></div>
    <div className="grid4">
      {achs.map(a=>{const ua1=ua.find(x=>x.achievementId===a.id);const earned=earnedIds.includes(a.id);const prog=ua1?.progress||0;const locked=!ua1;
        return<div key={a.id} className={`ach ${earned?'got':''} ${locked?'lock':''}`}>
          <div style={{fontSize:36,marginBottom:6}}>{a.icon}</div>
          <div style={{fontSize:13,fontWeight:600,marginBottom:3}}>{a.title}</div>
          <div style={{fontSize:11,color:'var(--tx2)',marginBottom:8}}>{a.desc}</div>
          <PBar v={prog} c={earned?'var(--ok)':locked?'var(--bg3)':'var(--p)'}/>
          {earned&&<div style={{fontSize:10,color:'var(--warn)',fontWeight:700,marginTop:6}}>+{a.xp} XP {a.rank==='gold'?'🥇':'🥈'}</div>}
          {!earned&&!locked&&<div style={{fontSize:10,color:'var(--tx2)',marginTop:6}}>{ua1?.progressText||`${prog}%`}</div>}
          {locked&&<div style={{fontSize:10,color:'var(--tx3)',marginTop:6}}>🔒 Заблокировано</div>}
        </div>})}

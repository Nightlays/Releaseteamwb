<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Сбор ЧП v1.0.3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./style.css" />

  <style>
    .chp-collect #status.ok{color:var(--green)}
    .chp-collect #status.err{color:var(--red)}
    .chp-collect #status.warn{color:#f59e0b}

    .chp-collect .log{
      white-space:pre-wrap;
      background:#fff;
      border-radius:16px;
      padding:12px;
      border:1px solid #ecebff;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.9),0 6px 20px rgba(124,58,237,.06);
      max-height:260px;
      overflow:auto;
      font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size:12px;
      line-height:1.35;
    }
    .chp-collect #logs .ok{color:var(--green)}
    .chp-collect #logs .err{color:var(--red)}
    .chp-collect #logs .warn{color:#f59e0b}

    .chp-collect .platform-title{font-weight:800;color:#4c1d95;margin:10px 0 8px}
    .chp-collect .table-wrap{overflow:auto;border:1px solid #ecebff;border-radius:18px;background:#fff}
    .chp-collect .table{width:max-content;min-width:100%;border-collapse:separate;border-spacing:0;table-layout:auto}
    .chp-collect .table thead th{background:#f7f5ff;border-bottom:1px solid #ecebff;padding:.65rem .75rem;font-weight:800;color:#5b21b6;position:sticky;top:0;z-index:1;white-space:nowrap}
    .chp-collect .table tbody td{border-bottom:1px dashed #eeeef8;padding:.55rem .7rem;vertical-align:top;white-space:nowrap}
    .chp-collect .table tbody tr:hover td{background:#faf9ff}
    .chp-collect .table td:first-child,
    .chp-collect .table th:first-child{position:sticky;left:0;background:inherit;z-index:2}
    .chp-collect .qhdr{background:#f3f0ff !important;color:#4c1d95 !important;text-align:center}
    .chp-collect .relhdr{text-align:center}
    .chp-collect .subhdr{background:#fbfaff !important;color:#64748b !important;font-weight:600 !important}
    .chp-collect .itogo-hdr{background:#f3f0ff !important}
    .chp-collect .itogo{background:#fcfbff}
    .chp-collect .num{text-align:right;font-variant-numeric:tabular-nums}
    .chp-collect #totalsBox{
      margin:0;
      color:#fff;
      background:#0f0f10;
      border-radius:12px;
      padding:12px;
    }
    .chp-collect .composition-panel{
      border:1px solid #ecebff;
      border-radius:18px;
      background:linear-gradient(180deg,#fff 0%,#fbfbff 100%);
      padding:16px;
    }
    .chp-collect .composition-panel[hidden]{
      display:none !important;
    }
    .chp-collect .composition-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }
    .chp-collect .composition-badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:4px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      border:1px solid #ecebff;
      background:#f7f5ff;
      color:#5b21b6;
    }
    .chp-collect .composition-badge--ok{
      border-color:rgba(34,197,94,.28);
      background:rgba(34,197,94,.10);
      color:#15803d;
    }
    .chp-collect .composition-badge--warn{
      border-color:rgba(245,158,11,.30);
      background:rgba(245,158,11,.12);
      color:#b45309;
    }
    .chp-collect .composition-badge--err{
      border-color:rgba(244,63,94,.24);
      background:rgba(244,63,94,.08);
      color:#be123c;
    }
    .chp-collect .composition-summary{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:10px;
      margin-bottom:14px;
    }
    .chp-collect .composition-kpi{
      border:1px solid #ecebff;
      border-radius:14px;
      background:#fff;
      padding:12px 14px;
    }
    .chp-collect .composition-kpi-label{
      font-size:12px;
      font-weight:700;
      color:#64748b;
      margin-bottom:4px;
    }
    .chp-collect .composition-kpi-value{
      font-size:18px;
      font-weight:800;
      color:#111827;
      line-height:1.2;
    }
    .chp-collect .composition-columns{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:12px;
    }
    .chp-collect .composition-card{
      border:1px solid #ecebff;
      border-radius:16px;
      background:#fff;
      padding:14px;
    }
    .chp-collect .composition-card--good{
      border-color:rgba(34,197,94,.22);
      background:linear-gradient(180deg,rgba(34,197,94,.08),rgba(255,255,255,1));
    }
    .chp-collect .composition-card--warn{
      border-color:rgba(245,158,11,.24);
      background:linear-gradient(180deg,rgba(245,158,11,.08),rgba(255,255,255,1));
    }
    .chp-collect .composition-card--bad{
      border-color:rgba(244,63,94,.22);
      background:linear-gradient(180deg,rgba(244,63,94,.07),rgba(255,255,255,1));
    }
    .chp-collect .composition-card--neutral{
      background:linear-gradient(180deg,#f8fafc 0%,#fff 100%);
    }
    .chp-collect .composition-card-title{
      font-size:14px;
      font-weight:800;
      color:#111827;
      margin-bottom:8px;
    }
    .chp-collect .composition-empty{
      font-size:13px;
      color:#64748b;
      line-height:1.5;
    }
    .chp-collect .composition-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin:0;
      padding:0;
      list-style:none;
    }
    .chp-collect .composition-item{
      border:1px solid #ecebff;
      border-radius:12px;
      background:#fff;
      padding:10px 12px;
    }
    .chp-collect .composition-item-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:6px;
    }
    .chp-collect .composition-key{
      font-size:13px;
      font-weight:800;
      color:#111827;
    }
    .chp-collect .composition-meta{
      font-size:12px;
      color:#64748b;
      line-height:1.5;
    }
    .chp-collect .composition-entry + .composition-entry{

    }

      color:#4c1d95;

    }
    .chp-collect .composition-item a:hover{

    }
    .chp-collect .composition-inline-list{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-top:6px;
    }
    .chp-collect .composition-pill{
      display:inline-flex;
      align-items:center;
      gap:4px;
      padding:3px 8px;
      border-radius:999px;
      background:#f8fafc;

      color:#475569;
    }

<body class="min-h-screen chp-collect">
  <div class="max-w-screen-2xl mx-auto px-4 py-6">
    <header class="flex items-center justify-between gap-3 flex-wrap">
      <div class="brand-badge">
        <span class="brand-dot"></span>
        <div>
          <div class="flex items-center gap-2 flex-wrap">
            <div class="font-extrabold leading-tight">Сбор ЧП</div>
            <span class="inline-flex items-center gap-1 text-[11px] font-semibold px-2 py-0.5 rounded-full bg-white/70 ring-1 ring-[#ecebff] text-slate-600">
              <span>v1.0.3</span>
            </span>
          </div>
          <div class="hint">Черепики</div>
        </div>
      </div>
    </header>

    <main class="mt-5 grid grid-cols-1 gap-4">
      <section class="card p-5 space-y-4">
        <div class="flex items-start justify-between gap-3 flex-wrap">
          <div>

            <div class="grid grid-cols-1 md:grid-cols-12 gap-3 items-end">
              <div class="md:col-span-4">

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                  <input id="startRel" class="input" placeholder="От, напр. 7.3.3000" value="7.3.3000">
                  <input id="endRel" class="input" placeholder="До, напр. 7.3.4000" value="7.3.4000">
                </div>

              </div>

              </div>

              <div class="md:col-span-6">
                <div class="flex items-center justify-between gap-3 mb-1">

                </div>

            <div class="hint">Сводка по платформам и итоговая выгрузка по черепикам.</div>
          </div>
          <div class="flex items-center gap-2 flex-wrap">
            <button id="checkCompositionBtn" type="button" class="btn btn-soft text-xs px-3 py-2">Проверить состав ЧП</button>
            <button id="uploadDriveBtn" type="button" class="btn btn-soft text-xs px-3 py-2" disabled>Выгрузить в Google Disk</button>

  <div id="toastBox" class="toast" role="status" aria-live="polite"></div>

<script>
/* ==============================
   Сбор ЧП (Черепики) — v1.0.3
   - логи: "Запрос deploy-lab [200 OK]" / "Запрос youtrack [200 OK]"
   - при ошибке: лог + тело ответа
   - "Открыть Google Disk" рядом с выгрузкой (после успешной выгрузки)
   ============================== */

const $ = (id)=>document.getElementById(id);

function showToast(msg){
  const t = $('toastBox');
  if(!t) return;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

const logLine = (msg, cls='')=>{
  const el = $('logs');
  const s = document.createElement('div');
  s.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  if(cls) s.className = cls;
  el.appendChild(s);
  el.scrollTop = el.scrollHeight;
};

const setStatus = (t, cls='')=>{
  const s = $('status');
  s.classList.remove('ok','err','warn');
  if(cls) s.classList.add(cls);
  s.textContent = t;
};

const setProgress = (p)=>{
  const i = $('progressBar');
  if(!i) return;
  const v = Math.max(0, Math.min(100, Number(p||0)));
  i.style.width = v + '%';
};

/* === localStorage === */
const STORAGE_KEYS = ['chp_turtles_v1_0_3','chp_turtles_v1_0_2'];
const STORAGE_KEY_WRITE = STORAGE_KEYS[0];
let __saveTimer = null;

function saveToStorage(){
  try{
    const data = {
      startRel: $('startRel').value || '',
      endRel: $('endRel').value || '',
      dlToken: $('dlToken').value || '',
      ytToken: $('ytToken').value || '',
      gitlabToken: $('gitlabToken').value || '',
      savedAt: Date.now()
    };
    localStorage.setItem(STORAGE_KEY_WRITE, JSON.stringify(data));
  }catch(_){}
}

function scheduleSave(){
  clearTimeout(__saveTimer);
  __saveTimer = setTimeout(saveToStorage, 250);
}

function loadFromStorage(){
  try{
    let raw = null;
    for (const k of STORAGE_KEYS){
      raw = localStorage.getItem(k);
      if(raw) break;
    }
    if(!raw) return;
    const data = JSON.parse(raw);
    if(data.startRel) $('startRel').value = data.startRel;
    if(data.endRel) $('endRel').value = data.endRel;
    if(typeof data.dlToken === 'string') $('dlToken').value = data.dlToken;
    if(typeof data.ytToken === 'string') $('ytToken').value = data.ytToken;
    if(typeof data.gitlabToken === 'string') $('gitlabToken').value = data.gitlabToken;
  }catch(_){}
}

loadFromStorage();
['startRel','endRel','dlToken','ytToken','gitlabToken'].forEach(id=>{
  $(id).addEventListener('input', scheduleSave);
  $(id).addEventListener('change', saveToStorage);
});

/* === Константы (захардкожены) === */
const DL_BASE = 'https://deploy-lab-api.wb.ru';
const YT_BASE = 'https://youtrack.wildberries.ru';
const GITLAB_BASE_URL = 'https://gitlab.wildberries.ru';
const PROXY_BASE = 'http://localhost:8787';
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxyeF_6k6bag74Np_GdHUS17xT7AJLIsDG2gP8JfP3iNtne4MlM1O9jQ__TOl3YYI6v/exec';
const GOOGLE_DRIVE_URL = 'https://drive.google.com/drive/home';
const GITLAB_MR_PAGE_SIZE = 100;
const GITLAB_PROJECTS = [
  { platform:'Android', fullPath:'mobile/androidnative/androidnative' },
  { platform:'iOS', fullPath:'mobile/ios/marketplace' }
];
const ISSUE_KEY_PREFIX_MAP = {
  'ANDR':'ANDR',
  'IOS':'IOS'
};
const YT_RELEASE_FIELD_BY_PLATFORM = {
  'Android':['{Версия релиза (ex. Sprint) Android}', 'Версия релиза Android', 'Версия релиза'],
  'iOS':['{Версия релиза (ex. Sprint) iOS}', 'Версия релиза iOS', 'Версия релиза']
};

function escapeHtml(value){
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function normalizeGitlabToken(raw){
  return String(raw || '')
    .replace(/^PRIVATE-TOKEN\s*:\s*/i, '')
    .trim();
}

function formatDateTime(value){
  if(!value) return '—';
  const d = new Date(value);
  if(Number.isNaN(d.getTime())) return String(value);
  return d.toLocaleString('ru-RU');
}

function normalizePlatformLabel(raw){
  const value = String(raw || '').trim().toLowerCase();
  if(['android','andr'].includes(value)) return 'Android';
  if(['ios'].includes(value)) return 'iOS';
  return String(raw || '').trim();
}

function normalizeIssueKey(raw){
  const m = String(raw || '').trim().match(/^([A-Za-z][A-Za-z0-9]*)-(\d+)$/);
  if(!m) return '';
  const prefix = String(m[1] || '').trim().toUpperCase();
  const number = String(m[2] || '').trim();
  const canonicalPrefix = ISSUE_KEY_PREFIX_MAP[prefix] || prefix;
  if(!canonicalPrefix || !number) return '';
  return `${canonicalPrefix}-${number}`;
}

function extractReleaseIssueKeysFromTitle(title){
  const out = new Set();
  const src = String(title || '');
  const re = /\b((?:ANDR|IOS)-\d+)\b/ig;
  let m;
  while((m = re.exec(src))){
    const normalized = normalizeIssueKey(m[1]);
    if(normalized) out.add(normalized);
  }
  return Array.from(out);
}

function isReleaseTargetMR(mr){
  return /^release\/\d+\.\d+\.\d+$/i.test(String(mr?.target_branch || '').trim());
}

function youTrackIssueUrl(key){
  const normalized = normalizeIssueKey(key);
  if(!normalized) return '';
  return `${YT_BASE.replace(/\/+$/,'')}/issue/${encodeURIComponent(normalized)}/`;
}

function normalizeReleaseForCompare(raw){
  const text = String(raw || '').trim();
  if(!text) return '';
  const match = text.match(/(\d+\.\d+\.\d{1,4})/);
  if(!match) return '';
  const parsed = parseRelease(match[1]);
  if(!parsed) return '';
  return `${parsed[0]}.${parsed[1]}.${String(parsed[2]).padStart(4,'0')}`;
}

function issueFieldName(field){
  return String(field?.name || field?.projectCustomField?.field?.name || '').trim();
}

function issueFieldAliases(field){
  const raw = field?.projectCustomField?.field?.aliases;
  if(Array.isArray(raw)){
    return raw.map((it)=>String(it || '').trim()).filter(Boolean);
  }
  return String(raw || '')
    .split(',')
    .map((it)=>it.trim())
    .filter(Boolean);
}

function extractFieldText(value){
  if(typeof value === 'string') return value;
  if(!value) return '';
  if(Array.isArray(value)){
    return value.map((item)=>extractFieldText(item)).filter(Boolean).join(' ');
  }
  if(typeof value.text === 'string') return value.text;
  if(typeof value.markdownText === 'string') return value.markdownText;
  if(typeof value.name === 'string') return value.name;
  if(typeof value.localizedName === 'string') return value.localizedName;
  if(typeof value.presentation === 'string') return value.presentation;
  return '';
}

function platformByIssueKey(key, fallback=''){
  const normalized = normalizeIssueKey(key);
  if(normalized.startsWith('ANDR-')) return 'Android';
  if(normalized.startsWith('IOS-')) return 'iOS';
  return fallback || '';
}

function collectIssueReleaseVersionsFromFields(fields){
  const versions = [];
  const matchedFieldNames = new Set();

  for(const field of fields){
    const fieldName = issueFieldName(field);
    if(!fieldName) continue;
    matchedFieldNames.add(fieldName);
    const values = Array.isArray(field?.value) ? field.value : [field?.value];
    for(const value of values){
      const normalized = normalizeReleaseForCompare(extractFieldText(value));
      if(normalized) versions.push(normalized);
    }
  }

  return {
    versions: Array.from(new Set(versions)),
    matchedFieldNames: Array.from(matchedFieldNames)
  };
}

function isGenericReleaseField(field){
  return issueFieldName(field) === 'Версия релиза';
}

function isPlatformReleaseField(field, platform){
  const fieldName = issueFieldName(field);
  const fieldNameLc = fieldName.toLowerCase();
  const aliases = issueFieldAliases(field).map((it)=>it.toLowerCase());
  const exactNames = (YT_RELEASE_FIELD_BY_PLATFORM[platform] || []).map((it)=>String(it || '').trim()).filter(Boolean);
  const exactNameSet = new Set(exactNames);

  if(exactNameSet.has(fieldName) && !isGenericReleaseField(field)) return true;

  if(platform === 'Android'){
    if(aliases.includes('fixversion-android')) return true;
    if(fieldNameLc.includes('версия релиза') && fieldNameLc.includes('android')) return true;
  }
  if(platform === 'iOS'){
    if(aliases.includes('fixversion-ios')) return true;
    if(fieldNameLc.includes('версия релиза') && fieldNameLc.includes('ios')) return true;
  }

  return false;
}

function readIssueReleaseInfo(issue, platform){
  const fields = Array.isArray(issue?.fields) ? issue.fields : [];
  const platformFields = fields.filter((field)=>isPlatformReleaseField(field, platform));
  if(platformFields.length){
    return collectIssueReleaseVersionsFromFields(platformFields);
  }
  const genericFields = fields.filter((field)=>isGenericReleaseField(field));
  if(genericFields.length){
    return collectIssueReleaseVersionsFromFields(genericFields);
  }
  return {
    versions: [],
    matchedFieldNames: []
  };
}

function findPrimaryIssueKeyForItem(item){
  const targetKey = normalizeIssueKey(item?.key);
  if(!targetKey) return '';
  const entries = Array.isArray(item?.entries) ? item.entries : [];

  for(const entry of entries){
    if(isRevertGitlabEntry(entry)) continue;
    const keys = Array.isArray(entry?.keys) ? entry.keys.map((key)=>normalizeIssueKey(key)).filter(Boolean) : [];
    const keyIndex = keys.indexOf(targetKey);
    if(keyIndex > 0) return keys[0] || '';
  }

  return '';
}

function collectPreviousHotfixReleases(targetRelease, releases){
  const normalizedTarget = normalizeReleaseForCompare(targetRelease);
  const parsedTarget = parseRelease(normalizedTarget);
  if(!parsedTarget) return [];

  const [major, minor, build] = parsedTarget;
  const previousBaseBuild = Math.floor(build / 1000) * 1000 - 1000;
  if(previousBaseBuild < 0) return [];

  return Array.from(new Set((Array.isArray(releases) ? releases : [])
    .map((release)=>normalizeReleaseForCompare(release))
    .filter((release)=>{
      if(!release || release === normalizedTarget) return false;
      const parsed = parseRelease(release);
      if(!parsed) return false;
      return parsed[0] === major && parsed[1] === minor && parsed[2] > previousBaseBuild && parsed[2] < build;
    })))
    .sort(compareReleaseLabels);
}

async function enrichGitlabOnlyWithYtReasons(items, targetBranch){
  if(!Array.isArray(items) || !items.length) return items;
  if(!$('ytToken').value.trim()) return items;

  const targetRelease = normalizeReleaseForCompare(String(targetBranch || '').replace(/^release\//i, ''));

  const enriched = await withPool(items, 6, async (item)=>{
    const firstEntry = item?.entries?.[0] || {};
    const platform = platformByIssueKey(item?.key, firstEntry.platform);
    const issue = await fetchIssueBrief(item?.key);
    const hasIssueData = Boolean(issue?.idReadable || (Array.isArray(issue?.fields) && issue.fields.length));
    const releaseInfo = readIssueReleaseInfo(issue, platform);
    const ytReleases = releaseInfo.versions;
    const previousHotfixReleases = collectPreviousHotfixReleases(targetRelease, ytReleases);
    const secondaryOf = findPrimaryIssueKeyForItem(item);
    const isHotfixItem = Boolean(previousHotfixReleases.length) && (!targetRelease || !ytReleases.includes(targetRelease));
    let reason = '';

    if(secondaryOf){
      reason = `Второстепенная задача ${secondaryOf}`;
    }else if(hasIssueData && !releaseInfo.matchedFieldNames.length){
      reason = 'Не найдена версия релиза в задаче';
    }else if(hasIssueData && !ytReleases.length){
      reason = 'Не найдена версия релиза в задаче';
    }else if(hasIssueData && targetRelease && !ytReleases.includes(targetRelease) && !isHotfixItem){
      reason = 'Версия релиза в YT не равна ветке в гите';
    }

    return {
      ...item,
      reason,
      ytReleases,
      previousHotfixReleases,
      isHotfixItem
    };
  });

  return enriched.filter(Boolean);
}

/* Диапазон релизов */
function parseRelease(s){
  const m=String(s).trim().match(/^(\d+)\.(\d+)\.(\d{1,4})$/);
  if(!m) return null;
  return [Number(m[1]),Number(m[2]),Number(m[3])];
}
function expandReleaseRange(start,end){
  let A=parseRelease(start), B=parseRelease(end);
  if(!A||!B) throw new Error('Неверный формат релизов. Пример: 7.3.3000');
  const cmp=(x,y)=>x[0]-y[0]||x[1]-y[1]||x[2]-y[2];
  if(cmp(A,B)>0){const t=A;A=B;B=t;}
  const toStr=(t)=>`${t[0]}.${t[1]}.${String(t[2]).padStart(4,'0')}`;
  const inc=(t)=>{
    t=t.slice();
    t[2]+=1000;
    if(t[2]>=10000){
      t[2]=0;
      t[1]++;
      if(t[1]>=10){t[1]=0; t[0]++;}
    }
    return t;
  };
  const out=[];
  let cur=A;
  for(;;){
    out.push(toStr(cur));
    if(cur[0]===B[0]&&cur[1]===B[1]&&cur[2]===B[2]) break;
    cur=inc(cur);
  }
  return out;
}
const displayRelease = (rel)=>{
  const parts=String(rel).split('.');
  if(parts.length!==3) return String(rel);
  const [a,b,c]=parts;
  const n=Number(c);
  return `${a}.${b}.${(n>=1000 ? ((n/1000)|0) : n)}`;
};
const toKey = (rel)=>{
  const p=String(rel).split('.');
  return p.length===3 ? displayRelease(rel) : String(rel);
};
const compareReleaseLabels = (a,b)=>{
  const pa=String(a).split('.').map(Number);
  const pb=String(b).split('.').map(Number);
  return (pa[0]||0)-(pb[0]||0) || (pa[1]||0)-(pb[1]||0) || (pa[2]||0)-(pb[2]||0);
};

/* Proxy/HTTP */
function proxify(url){
  const base = PROXY_BASE.replace(/\/+$/,'');
  if(url.startsWith(base + '/')) return url;
  return `${base}/prefix/${url}`;
}
function shortenBody(text, max=2000){
  const s = String(text ?? '');
  if(s.length <= max) return s;
  return s.slice(0,max) + '…';
}
async function safeReadText(resp){
  try{ return await resp.text(); }catch{ return ''; }
}
function svcName({dl, yt, service}){
  if(service) return service;
  if(dl) return 'deploy-lab';
  if(yt) return 'youtrack';
  return 'unknown';
}

async function httpJSON(url, {headers={}, method='GET', yt=false, dl=false, service=''}={}){
  const h=new Headers(headers||{});
  if(dl){
    const t = $('dlToken').value.trim();
    if(!t) throw new Error('Пустой DeployLab токен');
    h.set('Authorization-Deploy-Lab','Bearer ' + t);
  }
  if(yt){
    const t = $('ytToken').value.trim();
    if(!t) throw new Error('Пустой YouTrack токен');
    h.set('Authorization','Bearer ' + t);
    h.set('Accept','application/json');
  }

  const final = proxify(url);
  const r = await fetch(final, {method, headers:h});

  const serviceName = svcName({dl, yt, service});
  if(r.ok){
    logLine(`Запрос ${serviceName} [${r.status} OK]`, 'ok');
  }else{
    logLine(`Запрос ${serviceName} [${r.status} ${r.statusText}]`, 'err');
    const body = await safeReadText(r);
    if(body) logLine('Тело ответа: ' + shortenBody(body), 'err');
    throw new Error(`${r.status} ${r.statusText}`);
  }

  const ct=(r.headers.get('content-type')||'').toLowerCase();
  if(ct.includes('application/json')) return r.json();

  const tx = await safeReadText(r);
  try{ return JSON.parse(tx); }
  catch{ throw new Error(`HTML вместо JSON: ${shortenBody(tx, 200)}`); }
}

function gitlabHeaders(){
  const token = normalizeGitlabToken($('gitlabToken').value);
  if(!token) throw new Error('Пустой GitLab token');
  return {
    'PRIVATE-TOKEN': token,
    'Accept': 'application/json'
  };
}

function gitlabMergeRequestsURL(fullPath, targetBranch, page=1){
  const base = GITLAB_BASE_URL.replace(/\/+$/,'');
  const url = new URL(`${base}/api/v4/projects/${encodeURIComponent(fullPath)}/merge_requests`);
  url.searchParams.set('state', 'merged');
  url.searchParams.set('target_branch', targetBranch);
  url.searchParams.set('scope', 'all');
  url.searchParams.set('per_page', String(GITLAB_MR_PAGE_SIZE));
  url.searchParams.set('page', String(page));
  url.searchParams.set('order_by', 'updated_at');
  url.searchParams.set('sort', 'desc');
  return url.toString();
}

async function fetchGitlabMergedMRs(project, targetBranch){

function addDeployKey(map, key, platform, release){
  const norm = normalizeIssueKey(String(key || '').trim()) || String(key || '').trim().toUpperCase();

  if(!map.has(norm)){
    map.set(norm, {
      key:norm,
      platforms:new Set(),
      releases:new Set()
    });
  }
  const entry = map.get(norm);
  entry.platforms.add(normalizePlatformLabel(platform));
  entry.releases.add(release);
}

function buildDeployCompositionCache(releases, androidIssueKeysByRelease={}, iosIssueKeysByRelease={}, onlyRelease=''){
  const relKeys = onlyRelease ? [toKey(onlyRelease)] : releases.map(toKey);
  const map = new Map();
  for(const relKey of relKeys){
    for(const key of (androidIssueKeysByRelease[relKey] || [])){
      addDeployKey(map, key, 'Android', relKey);
    }
    for(const key of (iosIssueKeysByRelease[relKey] || [])){
      addDeployKey(map, key, 'iOS', relKey);
    }
  }
  return {
    rangeKey: onlyRelease ? `last:${toKey(onlyRelease)}` : releases.join('|'),
    relKeys,
    map,
    androidIssueKeysByRelease,
    iosIssueKeysByRelease,
    onlyRelease: onlyRelease ? toKey(onlyRelease) : ''
  };
}

/* DeployLab */
function dlReleaseURL(platform, rel){
  const base = DL_BASE.replace(/\/+$/,'');
  const prefix = platform==='Android' ? 'ANDROID' : 'IOS';
  return `${base}/releaseboss/admin_panel/release/${prefix}_${rel}`;
}
function dlIssuesURL(platform, rel){
  const base = DL_BASE.replace(/\/+$/,'');
  const prefix = platform==='Android' ? 'ANDROID' : 'IOS';
  return `${base}/releaseboss/admin_panel/release/${prefix}_${rel}/issues`;
}
async function fetchReleaseCutoff(platform, rel){
  try{
    const data=await httpJSON(dlReleaseURL(platform, rel), {dl:true});
    for (const [k,v] of Object.entries(data||{})){
      if(String(k).toLowerCase().includes('cutoff')){
        if (typeof v==='number'){
          const ts = v>10000000000 ? v/1000 : v;
          return new Date(ts*1000).toISOString();
        }
        if (typeof v==='string'){
          const d=new Date(v);
          if(!isNaN(d)) return d.toISOString();
        }
      }
    }
  }catch(e){
    logLine(`[warn] cutoff ${platform} ${rel}: ${e.message}`,'warn');
  }
  return null;
}
async function fetchDeployIssueKeys(platform, rel){
  try{
    const list=await httpJSON(dlIssuesURL(platform, rel), {dl:true});
    const keys=[];
    if(Array.isArray(list)){
      for (const it of list){
        if (it && it.merged_after_cutoff===true){
          const k = normalizeIssueKey(String(it.key || '').trim()) || String(it.key || '').trim().toUpperCase();
          if(k) keys.push(k.toUpperCase());
        }
      }
    }
    return keys;
  }catch(e){
    logLine(`[err] issues ${platform} ${rel}: ${e.message}`,'err');
    return [];
  }
}

/* YouTrack */
function ytIssueURL(key){
  const base = YT_BASE.replace(/\/+$/,'');
  const fields = [
    'idReadable',
    'summary',
    'tags(name)',
    'fields(name,projectCustomField(field(name,aliases,localizedName)),value(name,localizedName,text,markdownText,presentation,id,$type),$type)'
  ].join(',');
  return `${base}/api/issues/${encodeURIComponent(key)}?fields=${encodeURIComponent(fields)}&$top=-1`;
}
async function fetchIssueBrief(key){
  window.__chp_issueBriefCache = window.__chp_issueBriefCache || new Map();
  const cacheKey = normalizeIssueKey(key) || String(key || '').trim();
  if(window.__chp_issueBriefCache.has(cacheKey)){
    return window.__chp_issueBriefCache.get(cacheKey);
  }
  try{
    const issue = await httpJSON(ytIssueURL(key), {yt:true});
    window.__chp_issueBriefCache.set(cacheKey, issue || {});
    return issue || {};
  }catch(e){
    if(/404/.test(e.message)){
      window.__chp_issueBriefCache.set(cacheKey, {});
      return {};
    }
    logLine(`[err] YT ${key}: ${e.message}`,'err');
    window.__chp_issueBriefCache.set(cacheKey, {});
    return {};
  }
}
function pickFieldNames(issue, target){
  const out=[];
  const arr=issue?.fields||[];
  for (const f of arr){
    const fld=f?.projectCustomField?.field||{};
    if ((fld.name||'').trim()===target){
      const val=f.value;
      if (Array.isArray(val)){
        for (const v of val){ const n=v?.name; if(n) out.push(n); }
      } else if (val && typeof val==='object'){
        const n=val.name; if(n) out.push(n);
      }
    }
  }
  return out;
}
function pickFirstSubstreamField(issue){
  const arr=issue?.fields||[];
  for (const f of arr){
    const name=(f?.projectCustomField?.field?.name||'').toLowerCase();
    if (name.includes('substream')){
      const out=[];
      const val=f.value;
      if (Array.isArray(val)){
        for (const v of val){ const n=v?.name; if(n) out.push(n); }
      } else if (val && typeof val==='object'){
        const n=val.name; if(n) out.push(n);
      }
      return out;
    }
  }
  return [];
}
function pickSubstreamDynamic(issue, streamName){
  if (String(streamName||'').trim().toLowerCase()==='финтех'){
    const vals=pickFieldNames(issue, 'Product Финтех');
    return vals||[];
  }
  return pickFirstSubstreamField(issue);
}
function normalizeStream(streams){
  if(!streams||!streams.length) return '';
  const s=streams[0];
  if (s.toLowerCase().includes('paygate') && s.includes('.')) return s.split('.').pop().trim();
  return s;
}

/* Pool */
async function withPool(items, limit, worker){
  const ret=[];
  let i=0, active=0;
  let resolve;
  const done=new Promise((res)=>{resolve=res;});
  const push=async ()=>{
    if(i>=items.length){ if(active===0) resolve(ret); return; }
    const idx=i++;
    const item=items[idx];
    active++;
    try{ ret[idx]=await worker(item, idx); }
    catch{ ret[idx]=undefined; }
    finally{ active--; push(); }
  };
  for (let k=0;k<Math.min(limit, items.length);k++) push();
  return done;
}

/* Counts */
async function computeReleaseCounts(platform, rel){
  const cutoff = await fetchReleaseCutoff(platform, rel);
  const keys = await fetchDeployIssueKeys(platform, rel);
  if (!keys.length) return {row_counts:{}, total:0, cutoff, issue_keys:[]};
  const uniq=[...new Set(keys)];
  const rows={};
  const results = await withPool(uniq, 8, async (k)=>{
    const issue = await fetchIssueBrief(k);
    const stream = normalizeStream(pickFieldNames(issue,'Stream'));
    const subs = pickSubstreamDynamic(issue, stream);
    const sub = subs[0]||'';
    const rowKey = sub ? `${stream} | ${sub}` : (stream||'');
    return rowKey || null;
  });
  for (const rk of results){
    if(!rk) continue;
    rows[rk]=(rows[rk]||0)+1;
  }
  const total = Object.values(rows).reduce((s,v)=>s+v,0);
  return {row_counts:rows, total, cutoff, issue_keys:uniq};
}

async function buildCountsForPlatform(platform, releases){
  const counts={};
  const totalsByRelease={};
  const cutoffs={};
  const issueKeysByRelease={};
  await Promise.all(releases.map(async rel=>{
    try{
      const res=await computeReleaseCounts(platform, rel);
      const key=toKey(rel);
      totalsByRelease[key]=Number(res.total||0);
      cutoffs[key]=res.cutoff||null;
      issueKeysByRelease[key]=Array.isArray(res.issue_keys) ? res.issue_keys.slice() : [];
      for (const [rowKey,n] of Object.entries(res.row_counts||{})){
        counts[rowKey]=counts[rowKey]||{};
        counts[rowKey][key]=(counts[rowKey][key]||0)+Number(n||0);
      }
    }catch(e){
      logLine(`[err] compute ${platform} ${rel}: ${e.message}`,'err');
    }
  }));
  return {counts, totalsByRelease, cutoffs, issueKeysByRelease};
}

/* ====== План колонок и рендер таблиц (без изменений) ====== */
const RU_MONTH_ABBR = {1:"янв.",2:"фев.",3:"мар.",4:"апр.",5:"май",6:"июн.",7:"июл.",8:"авг.",9:"сен.",10:"окт.",11:"ноя.",12:"дек."};
function monthFromIso(iso){ if(!iso) return null; const d=new Date(iso); return isNaN(d)? null : (d.getMonth()+1); }
function quarterFromMonth(m){ if(!m) return 1; if(m<=3) return 1; if(m<=6) return 2; if(m<=9) return 3; return 4; }

function buildColumnPlanJS(releases, cutoffs){
  const plan=[], qSpans=[];
  let currentQ=null, qStartCol=null, curMonth=null;
  let colIdx=1;
  const closeMonth=(qnum,mnum)=>{ if(mnum!=null) plan.push({kind:'month_total', label:`ИТОГО ${RU_MONTH_ABBR[mnum]||''}`, q:qnum, m:mnum}); };
  const closeQuarter=(qnum)=>{ plan.push({kind:'quarter_total', label:`ИТОГО Q${qnum}`, q:qnum}); };

  for (const rel of releases){
    const iso = (cutoffs||{})[rel];
    const mnum = monthFromIso(iso) ?? (curMonth ?? 1);
    const qnum = quarterFromMonth(mnum);

    if(currentQ===null){ currentQ=qnum; qStartCol=colIdx; curMonth=mnum; }
    else if(qnum!==currentQ){
      closeMonth(currentQ, curMonth); colIdx++;
      closeQuarter(currentQ); colIdx++;
      qSpans.push([qStartCol, colIdx-1, currentQ]);
      currentQ=qnum; qStartCol=colIdx; curMonth=mnum;
    }
    if(mnum!==curMonth){ closeMonth(currentQ, curMonth); colIdx++; curMonth=mnum; }

    plan.push({kind:'release', label:displayRelease(rel), rel, q:currentQ, m:curMonth}); colIdx++;
  }
  if(currentQ!==null){
    closeMonth(currentQ, curMonth); colIdx++;
    closeQuarter(currentQ); colIdx++;
    qSpans.push([qStartCol, colIdx-1, currentQ]);
  }
  return {plan, qSpans};
}

function renderPlatformTable(targetId, title, releases, counts, cutoffs){
  const {plan, qSpans} = buildColumnPlanJS(releases, cutoffs);
  const target = document.getElementById(targetId);
  if(!target) return;

  const streamRows = Object.keys(counts||{});
  const base = (rk)=> (rk.split(" | ")[0]||"").trim();
  streamRows.sort((a,b)=> (base(a).toLowerCase().localeCompare(base(b).toLowerCase()) || a.toLowerCase().localeCompare(b.toLowerCase())));

  let html = `<div class="platform-title">${title}</div><div class="table-wrap"><table class="table"><thead>`;
  html += `<tr><th class="qhdr"> </th>`;
  for (const [c1,c2,qnum] of qSpans){
    html += `<th class="qhdr" colspan="${(c2-c1+1)}">Q${qnum}</th>`;
  }
  html += `</tr>`;

  html += `<tr><th class="relhdr">Стрим</th>`;
  for (const p of plan){
    html += `<th class="${p.kind==='release' ? 'relhdr' : 'itogo-hdr'}">${p.label}</th>`;
  }
  html += `</tr>`;

  html += `<tr><th class="subhdr"> </th>`;
  for (let i=0;i<plan.length;i++){
    html += (i===0) ? `<th class="subhdr">количество черепиков</th>` : `<th class="subhdr"> </th>`;
  }
  html += `</tr></thead><tbody>`;

  const idxToKind = plan.map((p,i)=>({col:i+1, def:p}));

  function findMonthRange(i){
    let left = null;
    for (let j=i-1; j>=0; j--){
      const cdef = idxToKind[j].def;
      const cur  = idxToKind[i].def;
      if (cdef.kind==='release' && cdef.q===cur.q && cdef.m===cur.m){
        left = left==null ? idxToKind[j].col : Math.min(left, idxToKind[j].col);
      } else if (cdef.kind==='month_total' || cdef.kind==='quarter_total'){
        break;
      }
    }
    if(left==null) return null;
    const right = idxToKind[i-1].col;
    return [left, right];
  }

  function quarterReleaseRangesBefore(i){
    const qnum = idxToKind[i].def.q;
    const ranges=[]; let runStart=null, prev=null;
    for (let j=0; j<i; j++){
      const c = idxToKind[j];
      if (c.def.q===qnum && c.def.kind==='release'){
        if(runStart==null){ runStart=c.col; prev=c.col; }
        else if (c.col === prev+1){ prev=c.col; }
        else { ranges.push([runStart, prev]); runStart=c.col; prev=c.col; }
      } else {
        if(runStart!=null){ ranges.push([runStart, prev]); runStart=null; prev=null; }
      }
    }
    if(runStart!=null) ranges.push([runStart, prev]);
    return ranges;
  }

  function valAt(rowKey, label){
    const row = (counts||{})[rowKey] || {};
    return Number(row[label]||0);
  }

  for (const rk of (streamRows.length ? streamRows : [''])){
    html += `<tr><td>${rk ? rk : '&nbsp;'}</td>`;
    for (let c=0;c<plan.length;c++){
      const coldef = plan[c];
      if(coldef.kind==='release'){
        const v=valAt(rk, coldef.label);
        html += v>0 ? `<td class="num">${v}</td>` : `<td class="num"> </td>`;
      } else if(coldef.kind==='month_total'){
        const rng = findMonthRange(c);
        if(rng){
          const [L,R] = rng;
          let sum=0;
          for (let j=L-1; j<=R-1; j++){
            const p = plan[j];
            if(p && p.kind==='release') sum += valAt(rk, p.label);
          }
          html += sum>0 ? `<td class="itogo num">${sum}</td>` : `<td class="itogo num"> </td>`;
        } else html += `<td class="itogo"> </td>`;
      } else if(coldef.kind==='quarter_total'){
        const ranges = quarterReleaseRangesBefore(c);
        let sum=0;
        for (const [A,B] of ranges){
          for (let j=A-1;j<=B-1;j++){
            const p = plan[j];
            if(p && p.kind==='release') sum += valAt(rk, p.label);
          }
        }
        html += sum>0 ? `<td class="itogo num">${sum}</td>` : `<td class="itogo num"> </td>`;
      }
    }
    html += `</tr>`;
  }

  html += `<tr><td class="itogo-hdr" style="font-weight:800">ИТОГО</td>`;
  for (let c=0;c<plan.length;c++){
    const coldef = plan[c];
    let sum=0;
    if(coldef.kind==='release'){
      for (const rk of streamRows) sum += valAt(rk, coldef.label);
      html += `<td class="num">${sum}</td>`;
    } else if(coldef.kind==='month_total'){
      const rng = findMonthRange(c);
      if(rng){
        const [L,R] = rng;
        for (const rk of streamRows){
          for (let j=L-1; j<=R-1; j++){
            const p = plan[j];
            if(p && p.kind==='release') sum += valAt(rk, p.label);
          }
        }
        html += sum>0 ? `<td class="itogo num">${sum}</td>` : `<td class="itogo num"> </td>`;
      } else html += `<td class="itogo"> </td>`;
    } else if(coldef.kind==='quarter_total'){
      const ranges = quarterReleaseRangesBefore(c);
      for (const rk of streamRows){
        for (const [A,B] of ranges){
          for (let j=A-1;j<=B-1;j++){
            const p = plan[j];
            if(p && p.kind==='release') sum += valAt(rk, p.label);
          }
        }
      }
      html += sum>0 ? `<td class="itogo num">${sum}</td>` : `<td class="itogo num"> </td>`;
    }
  }
  html += `</tr></tbody></table></div></div>`;
  target.innerHTML = html;
}

async function getDeployCompositionForRelease(release){
  const relKey = toKey(release);
  const rangeKey = `last:${relKey}`;
  if(window.__chp_deployCompositionCache?.rangeKey === rangeKey){
    return window.__chp_deployCompositionCache;
  }
  const [androidIssueKeysByRelease, iosIssueKeysByRelease] = await Promise.all([
    fetchDeployIssueKeysForRange('Android', [release]),
    fetchDeployIssueKeysForRange('iOS', [release])
  ]);
  const cache = buildDeployCompositionCache([release], androidIssueKeysByRelease, iosIssueKeysByRelease, release);
  window.__chp_deployCompositionCache = cache;
  return cache;
}

async function collectGitlabComposition(targetBranch){
  const all = await Promise.all(GITLAB_PROJECTS.map(async (project)=>{
    const items = await fetchGitlabMergedMRs(project, targetBranch);
    return items
      .filter(isReleaseTargetMR)
      .map((mr)=>normalizeGitlabMR(project, mr));
  }));

  const entries = all.flat();
  const keyMap = new Map();
  const withoutKeys = [];

  for(const entry of entries){
    if(!entry.keys.length){
      withoutKeys.push(entry);
      continue;
    }
    for(const key of entry.keys){
      if(!keyMap.has(key)){
        keyMap.set(key, { key, entries:[] });
      }
      keyMap.get(key).entries.push(entry);
    }
  }

  for(const group of keyMap.values()){
    group.entries.sort((a,b)=> String(b.mergedAt).localeCompare(String(a.mergedAt)));
  }

  withoutKeys.sort((a,b)=> String(b.mergedAt).localeCompare(String(a.mergedAt)));

  return {
    keyMap,
    entries,
    withoutKeys
  };
}

function compareComposition(deployComposition, gitlabComposition, targetBranch, lastRelease){
  const deployMap = deployComposition.map || new Map();
  const gitlabMap = gitlabComposition.keyMap || new Map();
  const withoutKeys = gitlabComposition.withoutKeys || [];

  const gitlabOnly = Array.from(gitlabMap.values())
    .filter((item)=> !deployMap.has(item.key))
    .filter((item)=>{
      const latestEntry = Array.isArray(item.entries) ? item.entries[0] : null;
      return !isRevertGitlabEntry(latestEntry);
    })
    .sort((a,b)=> a.key.localeCompare(b.key));

  const matchedCount = Array.from(gitlabMap.keys()).filter((key)=> deployMap.has(key)).length;
  const releaseLabel = lastRelease ? displayRelease(lastRelease) : '—';

  return {
    branch: targetBranch,
    releaseLabel,
    deployUniqueCount: deployMap.size,
    gitlabUniqueCount: gitlabMap.size,
    matchedCount,
    gitlabOnly,
    hotfixItems: [],
    withoutKeys,
    hasDiff: gitlabOnly.length > 0 || withoutKeys.length > 0
  };
}

function renderMrLink(entry){
  const mrLabel = entry.iid ? `${entry.platform} !${entry.iid}` : `${entry.platform} MR`;
  if(entry.webUrl){
    return `<a href="${escapeHtml(entry.webUrl)}" target="_blank" rel="noreferrer">${escapeHtml(mrLabel)}</a>`;
  }
  return `<span>${escapeHtml(mrLabel)}</span>`;
}

function renderIssueLink(key){
  const url = youTrackIssueUrl(key);
  if(url){
    return `<a href="${escapeHtml(url)}" target="_blank" rel="noreferrer">${escapeHtml(key)}</a>`;
  }
  return `<span>${escapeHtml(key)}</span>`;
}

function isRevertGitlabEntry(entry){
  const sourceBranch = String(entry?.sourceBranch || '').trim();
  const title = String(entry?.title || '').trim();
  return /revert/i.test(sourceBranch) || /^\s*revert\b/i.test(title);
}

function renderGitlabOnlyItems(items){
  if(!items.length){
    return '<div class="composition-empty">MR вне DeployLab, кроме ЧПиков из ХФ, не найдено.</div>';
  }
  return `<ul class="composition-list">${
    items.map((item)=>{
      const entries = item.entries
        .filter((entry)=> !isRevertGitlabEntry(entry))
        .map((entry)=>`
        <div class="composition-entry composition-meta">
          МР: ${renderMrLink(entry)}<br/>
          Задача: ${renderIssueLink(item.key)}
        </div>
      `).join('');
      const reason = item.reason
        ? `<div class="composition-meta">Причина: ${escapeHtml(item.reason)}</div>`
        : '';
      return `
        <li class="composition-item">
          ${reason}
          ${entries}
        </li>`;
    }).join('')
  }</ul>`;
}

function renderHotfixItems(items){
  if(!items.length){
    return '<div class="composition-empty">ЧПики из ХФ не найдены.</div>';
  }
  return `<ul class="composition-list">${
    items.map((item)=>{
      const entries = item.entries
        .filter((entry)=> !isRevertGitlabEntry(entry))
        .map((entry)=>`
        <div class="composition-entry composition-meta">
          МР: ${renderMrLink(entry)}<br/>
          Задача: ${renderIssueLink(item.key)}
        </div>
      `).join('');
      const releases = Array.from(new Set(item.previousHotfixReleases || [])).sort(compareReleaseLabels);
      const releaseMeta = releases.length
        ? `<div class="composition-meta">Релиз в YT: ${escapeHtml(releases.join(', '))}</div>`
        : '';
      return `
        <li class="composition-item">
          ${releaseMeta}
          ${entries}
        </li>`;
    }).join('')
  }</ul>`;
}

function renderWithoutKeysItems(items){
  if(!items.length){
    return '<div class="composition-empty">Все MR в релизной ветке удалось привязать к ANDR-/IOS-ключам из title.</div>';
  }
  return `<ul class="composition-list">${
    items.map((entry)=>{
      return `
        <li class="composition-item">
          <div class="composition-meta">
            МР: ${renderMrLink(entry)}<br/>
            ${entry.title ? `title: ${escapeHtml(entry.title)}` : 'title: —'}
          </div>
        </li>`;
    }).join('')
  }</ul>`;
}

function renderCompositionResult(model){
  const box = $('compositionResult');
  if(!box) return;
  if(!model){
    box.hidden = true;
    box.innerHTML = '';
    return;
  }

  box.hidden = false;

  if(model.state === 'loading'){
    box.innerHTML = `
      <div class="composition-head">
        <div>
          <div class="text-sm font-semibold text-slate-900">Проверка состава ЧП</div>
          <div class="hint">Собираю merged MR в ${escapeHtml(model.branch || 'release/*')} и сравниваю с DeployLab.</div>
        </div>
        <span class="composition-badge">в работе</span>
      </div>
      <div class="composition-empty">Запросы к GitLab и DeployLab выполняются. Результат появится здесь.</div>
    `;
    return;
  }

  if(model.state === 'error'){
    box.innerHTML = `
      <div class="composition-head">
        <div>
          <div class="text-sm font-semibold text-slate-900">Проверка состава ЧП</div>
          <div class="hint">Не удалось собрать сравнение состава.</div>
        </div>
        <span class="composition-badge composition-badge--err">ошибка</span>
      </div>
      <div class="composition-card composition-card--bad">
        <div class="composition-card-title">Что пошло не так</div>
        <div class="composition-empty">${escapeHtml(model.message || 'Неизвестная ошибка')}</div>
      </div>
    `;
    return;
  }

  const gitlabOnlyItems = Array.isArray(model.gitlabOnly) ? model.gitlabOnly : [];
  const hotfixItems = Array.isArray(model.hotfixItems) ? model.hotfixItems : [];
  const withoutKeysItems = Array.isArray(model.withoutKeys) ? model.withoutKeys : [];
  const summaryBadgeClass = model.hasDiff ? 'composition-badge composition-badge--warn' : 'composition-badge composition-badge--ok';
  const summaryBadgeText = model.hasDiff ? 'есть расхождения' : 'состав сходится';

  box.innerHTML = `
    <div class="composition-head">
      <div>
        <div class="text-sm font-semibold text-slate-900">Проверка состава ЧП</div>
        <div class="hint">Сравнение merged MR в ветке <span class="mono">${escapeHtml(model.branch)}</span> с составом DeployLab только для релиза <span class="mono">${escapeHtml(model.releaseLabel)}</span>. Ключ задачи ищется только в title MR по шаблону <span class="mono">ANDR-12345</span> или <span class="mono">IOS-12345</span>.</div>
      </div>
      <span class="${summaryBadgeClass}">${summaryBadgeText}</span>
    </div>

    <div class="composition-summary">
      <div class="composition-kpi">
        <div class="composition-kpi-label">Ветка проверки</div>
        <div class="composition-kpi-value mono">${escapeHtml(model.branch)}</div>
      </div>
      <div class="composition-kpi">
        <div class="composition-kpi-label">Уникальных ключей в GitLab</div>
        <div class="composition-kpi-value">${escapeHtml(model.gitlabUniqueCount)}</div>
      </div>
      <div class="composition-kpi">
        <div class="composition-kpi-label">Уникальных ключей в DeployLab</div>
        <div class="composition-kpi-value">${escapeHtml(model.deployUniqueCount)}</div>
      </div>
      <div class="composition-kpi">
        <div class="composition-kpi-label">Совпало ключей</div>
        <div class="composition-kpi-value">${escapeHtml(model.matchedCount)}</div>
      </div>
    </div>

    <div class="composition-columns">
      <section class="composition-card ${gitlabOnlyItems.length ? 'composition-card--bad' : 'composition-card--good'}">
        <div class="composition-card-title">Есть в GitLab, но нет в DeployLab</div>
        ${renderGitlabOnlyItems(gitlabOnlyItems)}
      </section>

      <section class="composition-card ${hotfixItems.length ? 'composition-card--warn' : 'composition-card--good'}">
        <div class="composition-card-title">ЧПики из ХФ</div>
        ${renderHotfixItems(hotfixItems)}
      </section>

      <section class="composition-card composition-card--neutral">
        <div class="composition-card-title">MR релизной ветки без ANDR-/IOS-ключа в title</div>
        ${renderWithoutKeysItems(withoutKeysItems)}
      </section>
    </div>
  `;
}

/* ====== Google Disk upload ====== */
let __lastSheetUrl = null;

function setDriveLink(url){
  __lastSheetUrl = url || null;
}

async function uploadToGoogleDisk(){
  const btn = $('uploadDriveBtn');
  const payload = window.__chp_drive_payload;
  if(!payload){ showToast('Сначала запустите сбор'); return; }

  setDriveLink(null);

  const prevText = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Выгружаю…';

  try{
    setStatus('Выгружаю в Google Disk…');
    setProgress(85);

    const url = proxify(APPS_SCRIPT_URL);
    const body = JSON.stringify({ payload });

    const r = await fetch(url, { method:'POST', body });
    const txt = await r.text();
    let js=null; try{ js=JSON.parse(txt); }catch{}

    if(!r.ok){
      logLine(`Запрос google-disk [${r.status} ${r.statusText}]`, 'err');
      if(txt) logLine('Тело ответа: ' + shortenBody(txt), 'err');
      throw new Error((js && js.error) ? js.error : (r.status + ' ' + r.statusText));
    }
    if(!js || js.ok !== true){
      logLine(`Запрос google-disk [INVALID RESPONSE]`, 'err');
      if(txt) logLine('Тело ответа: ' + shortenBody(txt), 'err');
      throw new Error((js && js.error) ? js.error : 'Пустой/невалидный ответ Apps Script');
    }

    logLine(`Запрос google-disk [${r.status} OK]`, 'ok');

    const link = js.sheetUrl || js.spreadsheetUrl || null;
    setDriveLink(link);

    setStatus('Выгружено в Google Disk','ok');
    showToast('Выгружено в Google Disk');
  }catch(e){
    setStatus('Ошибка выгрузки','err');
    logLine(`Google Disk ERR: ${e.message||e}`, 'err');
    showToast('Ошибка выгрузки');
  }finally{
    btn.textContent = prevText;
    btn.disabled = false;
    setProgress(100);
  }
}

async function checkCompositionAgainstGitlab(){
  const btn = $('checkCompositionBtn');
  const prevText = btn.textContent;

  try{
    saveToStorage();
    window.__chp_issueBriefCache = new Map();

    const start = $('startRel').value.trim();
    const end = $('endRel').value.trim();
    const releases = expandReleaseRange(start, end);
    const lastRelease = releases[releases.length - 1];
    const targetBranch = `release/${lastRelease}`;

    if(!$('dlToken').value.trim()){
      throw new Error('Для проверки состава ЧП заполните DeployLab токен');
    }
    if(!$('ytToken').value.trim()){
      throw new Error('Для проверки состава ЧП заполните YouTrack токен');
    }
    if(!normalizeGitlabToken($('gitlabToken').value)){
      throw new Error('Для проверки состава ЧП заполните GitLab token');
    }

    btn.disabled = true;
    btn.textContent = 'Проверяю состав…';
    setStatus('Проверяю состав ЧП…');
    setProgress(15);
    renderCompositionResult({ state:'loading', branch:targetBranch });

    const [deployComposition, gitlabComposition] = await Promise.all([
      getDeployCompositionForRelease(lastRelease),
      collectGitlabComposition(targetBranch)
    ]);

    setProgress(85);

    const result = compareComposition(deployComposition, gitlabComposition, targetBranch, lastRelease);
    result.hotfixItems = [];
    if(result.gitlabOnly.length){
      const enriched = await enrichGitlabOnlyWithYtReasons(result.gitlabOnly, targetBranch);
      result.hotfixItems = enriched.filter((item)=> item.isHotfixItem);
      result.gitlabOnly = enriched.filter((item)=> !item.isHotfixItem);
    }
    result.hasDiff = result.gitlabOnly.length > 0 || result.hotfixItems.length > 0 || result.withoutKeys.length > 0;
    renderCompositionResult(result);

    if(result.hasDiff){
      setStatus('Есть расхождения состава', 'warn');
      logLine(`Проверка состава: GitLab-only ${result.gitlabOnly.length}, HF ${result.hotfixItems.length}, без ключа ${result.withoutKeys.length}`, 'warn');
      showToast('Есть расхождения состава');
    }else{
      setStatus('Состав ЧП совпадает', 'ok');
      logLine(`Проверка состава: совпало ${result.matchedCount} ключей`, 'ok');
      showToast('Состав ЧП совпадает');
    }

    setProgress(100);
  }catch(e){
    renderCompositionResult({ state:'error', message:e.message || String(e) });
    setStatus('Ошибка проверки состава', 'err');
    logLine(`Проверка состава ERR: ${e.message || e}`, 'err');
    showToast('Ошибка проверки состава');
  }finally{
    btn.textContent = prevText;
    btn.disabled = false;
  }
}

/* ====== Events ====== */
$('uploadDriveBtn').addEventListener('click', uploadToGoogleDisk);

$('checkCompositionBtn').addEventListener('click', checkCompositionAgainstGitlab);

$('openDriveBtn').addEventListener('click', ()=>{
  window.open(__lastSheetUrl || GOOGLE_DRIVE_URL, '_blank');
});

$('checkProxy').addEventListener('click', async ()=>{
  try{
    setStatus('Проверяю прокси…');
    const base = PROXY_BASE.replace(/\/+$/,'');
    const r = await fetch(base + '/health');
    const js = await r.json();

    if(!r.ok) throw new Error(r.status + ' ' + r.statusText);
    if(js && js.ok === true && Number(js.port) === 8787){
      setStatus('Прокси OK','ok');
      logLine(`Прокси OK`, 'ok');
      showToast('Прокси OK');
    }else{
      throw new Error('Неожиданный ответ /health: ' + JSON.stringify(js));
    }
  }catch(e){
    setStatus('Прокси ошибка','err');
    logLine('Proxy ERR: ' + (e.message||e), 'err');
    showToast('Прокси ошибка');
  }
});

$('runBtn').addEventListener('click', async ()=>{
  const runBtn = $('runBtn');
  const uploadDriveBtn = $('uploadDriveBtn');

  try{
    saveToStorage();
    setDriveLink(null);
    renderCompositionResult(null);

    setProgress(8);
    runBtn.disabled = true;
    uploadDriveBtn.disabled = true;
    uploadDriveBtn.textContent = 'Выгрузить в Google Disk';
    window.__chp_drive_payload = null;

    setStatus('Собираю…');

    const start=$('startRel').value.trim();
    const end=$('endRel').value.trim();
    const releases=expandReleaseRange(start,end);

    const [A, I] = await Promise.all([
      buildCountsForPlatform('Android', releases),
      buildCountsForPlatform('iOS', releases),
    ]);

    setProgress(55);

    const order = (a,b)=>{
      const pa=a.split('.').map(Number), pb=b.split('.').map(Number);
      return pa[0]-pb[0]||pa[1]-pb[1]||pa[2]-pb[2];
    };
    const allRels = Array.from(new Set([
      ...Object.keys(A.totalsByRelease||{}),
      ...Object.keys(I.totalsByRelease||{})
    ])).sort(order);

    const rows = allRels.map(rel=>{
      const a = Number((A.totalsByRelease||{})[rel]||0);
      const i = Number((I.totalsByRelease||{})[rel]||0);
      return [rel, a, i, a+i];
    });

    const headers = ['Релиз','Android','iOS','Итого'];
    const widths = headers.map(h=>h.length);
    for(const r of rows){
      widths[0] = Math.max(widths[0], String(r[0]).length);
      widths[1] = Math.max(widths[1], String(r[1]).length);
      widths[2] = Math.max(widths[2], String(r[2]).length);
      widths[3] = Math.max(widths[3], String(r[3]).length);
    }
    function padCell(val, idx){
      const s = String(val);
      return idx===0 ? s.padEnd(widths[idx], ' ') : s.padStart(widths[idx], ' ');
    }
    const sep = widths.map(w=>'—'.repeat(w)).join(' ─ ');
    const lines = [
      headers.map((h,i)=> (i===0?h.padEnd(widths[i]):h.padStart(widths[i])) ).join(' | '),
      sep
    ];
    for(const r of rows){
      lines.push( r.map((v,i)=>padCell(v,i)).join(' | ') );
    }
    $('totalsBox').textContent = lines.join('\n');
    const relKeys = releases.map(toKey);
    const lastRelease = releases[releases.length - 1];
    window.__chp_deployCompositionCache = buildDeployCompositionCache(releases, A.issueKeysByRelease, I.issueKeysByRelease, lastRelease);

    window.__chp_drive_payload = {
      releases: relKeys,
      and_counts: A.counts,
      and_totals: A.totalsByRelease,
      and_cutoffs: A.cutoffs,
      and_issue_keys: A.issueKeysByRelease,
      ios_counts: I.counts,
      ios_totals: I.totalsByRelease,
      ios_cutoffs: I.cutoffs,
      ios_issue_keys: I.issueKeysByRelease
    };
    uploadDriveBtn.disabled = false;

    setProgress(100);
    setStatus('Готово.','ok');
    logLine('Готово', 'ok');
    showToast('Готово');
  }catch(e){
    setStatus('Ошибка', 'err');
    logLine('Ошибка: ' + (e.message||e), 'err');
    uploadDriveBtn.disabled = true;
    showToast('Ошибка');
  }finally{
    runBtn.disabled = false;
  }
});

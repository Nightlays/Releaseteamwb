server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index youtrack-wiki-v4.html;

    location = / {
        try_files /youtrack-wiki-v4.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location = /health {
        proxy_pass http://proxy:8787/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /proxy {
        proxy_pass http://proxy:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /llm/ {
        proxy_pass http://llm:8789/;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
